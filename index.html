<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>达播专场四步流程交互图</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --line: #e4eaf2;
      --soft: #f4f7fb;
      --text: #00152e;
      --muted: #8b95a6;
      --orange: #ff7f00;
      --orange-soft: #fff4e8;
      --green: #2acb62;
      --green-soft: #e7f8ec;
      --red: #ff4246;
      --red-soft: #ffe9eb;
      --blue: #1583ee;
      --blue-soft: #eaf4ff;
      --purple: #7c5ce6;
      --purple-soft: #f1ebff;
      --shadow: 0 4px 14px rgba(15, 35, 65, 0.04);
      --radius: 20px;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-size: 14px; letter-spacing: 0; }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .shell { min-height: 100vh; display: grid; grid-template-rows: 60px 1fr; }
    .topbar {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dfe6ef;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand { display: flex; align-items: center; gap: 8px; min-width: 98px; font-size: 24px; font-weight: 900; color: #050505; line-height: 1; }
    .brand-mark { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; color: white; background: #ff7800; font-size: 22px; font-weight: 900; }
    .workbench { font-size: 18px; font-weight: 800; color: #0b1424; white-space: nowrap; }
    .nav {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav button {
      min-height: 60px;
      width: auto;
      padding: 0 22px;
      border-radius: 0;
      background: transparent;
      color: #8b95a6;
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      text-align: center;
      position: relative;
    }
    .nav button.active { color: var(--orange); background: #fff; }
    .nav button.active:before {
      content: "";
      width: 56px;
      height: 1px;
      border-radius: 99px;
      background: var(--orange);
      position: absolute;
      left: 50%;
      top: auto;
      bottom: 0;
      transform: translateX(-50%);
    }
    .top-actions { margin-left: auto; display: flex; align-items: center; gap: 14px; color: #00152e; font-size: 16px; white-space: nowrap; }
    .link-btn { color: #00152e; background: transparent; font-size: 16px; }
    .admin-badge { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; color: #fff; background: #9b7df5; font-size: 13px; font-weight: 900; }
    .user { display: none; align-items: center; gap: 8px; font-size: 15px; font-weight: 750; white-space: nowrap; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, #ffd9c2 0 23%, transparent 24%),
        radial-gradient(circle at 43% 33%, #2f241f 0 3%, transparent 4%),
        radial-gradient(circle at 57% 33%, #2f241f 0 3%, transparent 4%),
        radial-gradient(circle at 50% 78%, #226fca 0 30%, transparent 31%),
        linear-gradient(135deg, #b8dbe8, #e7c5f5);
      border: 2px solid #fff;
      box-shadow: 0 2px 7px rgba(0,0,0,.14);
    }

    main { width: auto; max-width: none; margin: 0; padding: 30px 26px 48px; min-height: calc(100vh - 60px); }
    .head { display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 24px; }
    .head h1 { font-size: 26px; font-weight: 500; line-height: 1.35; margin: 0; color: #00152e; }
    .actions { display: flex; gap: 10px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      border-radius: 7px;
      background: #f7f9fc;
      color: #00152e;
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
    }
    .btn.primary { color: white; background: var(--orange); box-shadow: none; }
    .btn.ghost { background: #fff; border: 1px solid #d9e1eb; }
    .btn.green { color: white; background: var(--green); }
    .btn.danger { color: var(--red); background: var(--red-soft); border: 1px solid rgba(240, 68, 68, .24); }
    .btn:disabled { opacity: .48; cursor: not-allowed; box-shadow: none; }

    .process {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }
    .step-card {
      min-height: 120px;
      padding: 18px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: var(--shadow);
      text-align: left;
      color: inherit;
      position: relative;
      display: grid;
      gap: 12px;
    }
    .step-card.active { border-color: var(--orange); background: #fff8ef; box-shadow: none; }
    .step-index { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 50%; color: var(--orange); background: var(--orange-soft); font-weight: 700; }
    .step-card strong { font-size: 16px; font-weight: 600; line-height: 1.3; }
    .step-card span { color: var(--muted); line-height: 1.5; }

    .stats { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .stat {
      min-height: 114px;
      padding: 22px 28px;
      border-radius: var(--radius);
      border: 0;
      background: #fff;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .stat-icon { display: none; }
    .stat strong { display: block; font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 8px; color: #00152e; }
    .stat span { color: var(--muted); font-size: 14px; }
    .my-task-stats { grid-template-columns: repeat(4, minmax(128px, 1fr)); }
    .my-task-stats.has-work-switch { grid-template-columns: repeat(5, minmax(128px, 1fr)); }
    .my-task-stats.workflow-tab-stats {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 2px 2px 12px;
      scrollbar-width: thin;
    }
    .my-task-stats.workflow-tab-stats .stat {
      flex: 1 0 142px;
      min-width: 142px;
      min-height: 104px;
      padding: 20px 22px;
      cursor: pointer;
    }
    .my-task-stats.workflow-tab-stats .stat strong { font-size: 26px; }
    .my-task-stats button.stat.active {
      box-shadow: 0 0 0 1px #ff8200 inset, 0 10px 28px rgba(255, 130, 0, .16);
      background: #fff8ef;
    }
    .list-stats .stat { min-height: 112px; padding: 22px 28px; align-items: flex-start; }
    .list-stats { grid-template-columns: repeat(5, minmax(128px, 1fr)); }
    .list-stats button.stat::after {
      content: "筛选日历";
      position: absolute;
      right: 22px;
      bottom: 18px;
      color: #9aa5b4;
      font-size: 12px;
      opacity: 0;
      transition: opacity .16s ease, transform .16s ease;
    }
    .list-stats button.stat:hover::after,
    .list-stats button.stat:focus-visible::after {
      opacity: 1;
      transform: translateY(-2px);
    }
    .list-stats button.stat.active {
      outline: 2px solid rgba(240, 130, 0, .24);
      box-shadow: 0 10px 24px rgba(15, 35, 65, .08);
    }
    .stat.stat-orange strong { color: var(--orange); }
    .stat.stat-green strong { color: var(--green); }
    .stat.stat-blue strong { color: var(--blue); }
    .stat.stat-red strong { color: var(--red); }
    .stat.stat-purple strong { color: var(--purple); }
    .stat.stat-gray strong { color: #6d7889; }
    button.stat {
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease;
    }
    button.stat:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(15, 35, 65, .1); }
    button.stat:focus-visible { outline: 3px solid rgba(255, 122, 0, .28); outline-offset: 3px; }
    .list-stat-detail {
      display: grid;
      gap: 12px;
    }
    .list-stat-empty {
      min-height: 180px;
      display: grid;
      place-items: center;
      border: 1px dashed #dce5ef;
      border-radius: 14px;
      color: var(--muted);
      background: #fbfdff;
    }
    .list-stat-item {
      display: grid;
      grid-template-columns: minmax(260px, 1.35fr) minmax(0, 2fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border: 1px solid #e5ebf3;
      border-radius: 14px;
      background: #fff;
    }
    .list-stat-item-main {
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .list-stat-item-title {
      color: #00152e;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .list-stat-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .list-stat-field-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      min-width: 0;
    }
    .list-stat-field {
      min-width: 0;
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f8fafc;
    }
    .list-stat-field span {
      color: var(--muted);
      font-size: 12px;
    }
    .list-stat-field strong {
      color: #00152e;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .panel {
      border: 0;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      min-height: 56px;
      padding: 16px 20px;
      border-bottom: 1px solid #e8eef5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-title { margin: 0; font-size: 18px; font-weight: 500; line-height: 1.35; color: #00152e; }
    .panel-body { padding: 18px 20px; }
    .panel-actions { margin-top: 16px; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }

    .grid-2 { display: grid; grid-template-columns: 380px minmax(0, 1fr); gap: 18px; align-items: start; }
    .grid-main { display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 18px; align-items: start; }
    .detail-main { display: grid; grid-template-columns: 1fr; gap: 18px; align-items: start; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(170px, 1fr)); gap: 14px; }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .stack { display: grid; gap: 12px; }
    .special-sync-panel {
      display: grid;
      grid-template-columns: minmax(220px, .9fr) minmax(0, 1.6fr);
      gap: 14px;
      padding: 14px;
      border: 1px solid #dce8f5;
      border-radius: 10px;
      background: linear-gradient(135deg, #f7fbff 0%, #fffaf6 100%);
    }
    .special-sync-copy { display: grid; gap: 6px; }
    .special-sync-copy strong { color: #00152e; font-weight: 600; }
    .special-sync-copy span { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .special-sync-people { display: flex; align-items: center; align-content: flex-start; flex-wrap: wrap; gap: 8px; }
    .sync-person-chip {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #eef6ff;
      color: var(--blue);
      padding: 0 10px;
      font-size: 13px;
      white-space: nowrap;
    }
    .sync-person-chip.is-business { background: var(--orange-soft); color: var(--orange); }
    .info-editor-fields { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .info-editor-note {
      display: grid;
      gap: 8px;
      padding: 12px 14px;
      border: 1px solid #ffd5ab;
      border-radius: 10px;
      background: #fff8f0;
      color: #5f3308;
      line-height: 1.5;
    }
    .info-editor-note strong { color: var(--orange); }

    .list-panel { overflow: visible; }
    .list-toolbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }
    .list-controls {
      display: grid;
      grid-template-columns: minmax(300px, 380px) minmax(260px, 1fr) minmax(120px, 150px);
      align-items: end;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .toolbar-field {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar-field .input { min-height: 44px; }
    .list-toolbar .seg-group {
      margin-left: auto;
      padding: 4px;
      border-radius: 15px;
      background: #f1f4f8;
      gap: 2px;
    }
    .list-toolbar .seg {
      min-height: 36px;
      border-radius: 12px;
      background: transparent;
      font-size: 15px;
    }
    .list-toolbar .seg.active { background: #fff; color: var(--orange); box-shadow: none; }
    .list-search {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid #d9e1eb;
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
    }
    .list-search input {
      width: 100%;
      height: 42px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
    }
    .list-date-field { position: relative; min-width: 0; }
    .list-range-picker { position: relative; }
    .list-range-trigger {
      width: 100%;
      min-height: 44px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border: 1px solid #d9e1eb;
      border-radius: 6px;
      background: #fff;
      color: #00152e;
      text-align: left;
    }
    .list-range-trigger.active {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 122, 0, .12);
    }
    .list-range-trigger strong {
      min-width: 0;
      color: #00152e;
      font-size: 15px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list-range-trigger b,
    .list-range-trigger i,
    .list-range-trigger em {
      color: var(--muted);
      font-style: normal;
      font-weight: 500;
    }
    .list-range-panel {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      z-index: 35;
      width: min(680px, calc(100vw - 80px));
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr);
      border: 1px solid #d9e1eb;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 38px rgba(15, 35, 65, .14);
      overflow: visible;
    }
    .list-range-panel:before {
      content: "";
      position: absolute;
      top: -6px;
      left: 34px;
      width: 10px;
      height: 10px;
      border-left: 1px solid #d9e1eb;
      border-top: 1px solid #d9e1eb;
      background: #fff;
      transform: rotate(45deg);
    }
    .list-range-shortcuts {
      display: grid;
      align-content: start;
      gap: 4px;
      padding: 12px;
      border-right: 1px solid #e8eef5;
      background: #fbfcfe;
    }
    .list-range-shortcut {
      min-height: 38px;
      padding: 0 10px;
      border-radius: 9px;
      color: #00152e;
      font-size: 14px;
      text-align: left;
    }
    .list-range-shortcut.active {
      background: #fff5ec;
      color: var(--orange);
      font-weight: 600;
    }
    .list-range-main {
      display: grid;
      gap: 12px;
      padding: 12px;
    }
    .list-range-fields {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }
    .list-range-box {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      border: 1px solid #d9e1eb;
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
    }
    .list-range-box strong { color: #00152e; font-weight: 500; white-space: nowrap; }
    .list-range-fields i { color: var(--muted); font-style: normal; }
    .list-range-calendars {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .list-mini-calendar {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid #e8eef5;
      border-radius: 10px;
      background: #fff;
    }
    .list-mini-title {
      color: #00152e;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }
    .list-mini-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
      text-align: center;
      color: #00152e;
      font-size: 12px;
    }
    .list-mini-grid span {
      min-height: 26px;
      display: grid;
      place-items: center;
      border-radius: 7px;
    }
    .list-mini-grid .weekday,
    .list-mini-grid .muted { color: #a6afbd; }
    .list-mini-grid .in-range { background: #fff2e4; color: var(--orange); }
    .list-mini-grid .is-edge { background: var(--orange); color: #fff; font-weight: 700; }
    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 14px;
    }
    .project-card {
      min-height: 208px;
      padding: 22px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      display: grid;
      gap: 16px;
      text-align: left;
      color: inherit;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .project-card:hover { border-color: #ffc36f; box-shadow: 0 8px 24px rgba(15, 35, 65, .08); transform: translateY(-1px) scale(1.012); }
    .project-card-head,
    .project-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .project-card-head { align-items: flex-start; }
    .project-card h2 { margin: 0; color: var(--text); font-size: 17px; font-weight: 400; line-height: 1.35; }
    .project-title-line { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .project-title-line h2 { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-percent { color: var(--orange); font-size: 18px; font-weight: 800; }
    .project-main { display: grid; gap: 10px; min-width: 0; }
    .project-meta-line { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; color: var(--muted); font-size: 13px; }
    .project-meta-line strong { color: var(--text); font-weight: 400; }
    .project-card > .project-meta-line { padding-top: 2px; justify-content: space-between; gap: 10px; }
    .project-card .progress { margin-top: 2px; }
    .project-card-foot { padding-top: 2px; }
    .project-card-foot-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .project-meta-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0; }
    .project-date { margin-left: auto; white-space: nowrap; }
    .project-product-line {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 6px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 13px;
    }
    .project-product-line strong { color: var(--text); font-size: 14px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .record-card, .need-card, .module-card, .task-card, .field {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
    }
    .record-card, .need-card, .module-card, .task-card { padding: 16px; display: grid; gap: 10px; text-align: left; width: 100%; color: inherit; }
    .record-card.active, .module-card.active { background: #fff8ef; border-color: var(--orange); box-shadow: none; }
    .module-status-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .module-status-line strong { color: #00152e; font-weight: 500; }
    .module-task-mini {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 22px;
      color: var(--muted);
      font-size: 12px;
    }
    .module-task-dialog { display: grid; gap: 16px; }
    .module-task-dialog-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f5f7fa;
      overflow-x: auto;
    }
    .module-task-dialog-tabs .task-module-tab {
      flex: 1 0 112px;

    function monthCalendar(month, monthRecords, group = null) {
      const [year, rawMonth] = month.split("-").map(Number);
      const first = new Date(year, rawMonth - 1, 1);
      const last = new Date(year, rawMonth, 0);
      const startOffset = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const totalCells = Math.ceil((startOffset + last.getDate()) / 7) * 7;
      const weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
      const cells = Array.from({ length: totalCells }, (_, index) => {
        const day = index - startOffset + 1;
        const inMonth = day >= 1 && day <= last.getDate();
        const dateText = inMonth ? `${month}-${String(day).padStart(2, "0")}` : "";
        const dayRecords = inMonth
          ? monthRecords.filter(record => record.liveTime.slice(0, 10) === dateText).sort((a, b) => a.liveTime.localeCompare(b.liveTime))

        const expanded = state.calendarExpandedDay === dateText;
        const visibleRecords = expanded ? dayRecords : dayRecords.slice(0, 2);
        const hiddenCount = dayRecords.length - visibleRecords.length;
        const moreButton = hiddenCount > 0
          ? `<button class="calendar-more" data-calendar-day-toggle="${dateText}">还有 ${hiddenCount} 场</button>`

    function listMiniCalendar(month) {
      const [year, rawMonth] = month.split("-").map(Number);
      const first = new Date(year, rawMonth - 1, 1);
      const startOffset = first.getDay();
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      const cells = Array.from({ length: 42 }, (_, index) => {
        const date = new Date(year, rawMonth - 1, index - startOffset + 1);
        const key = dateKey(date);
        const inMonth = date.getMonth() === rawMonth - 1;
        const inRange = inDateRange(key, state.listStart, state.listEnd);
        const isEdge = key === state.listStart || key === state.listEnd;
        const cls = `${inMonth ? "" : "muted"} ${inRange ? "in-range" : ""} ${isEdge ? "is-edge" : ""}`;
        return `<span class="${cls.trim()}">${date.getDate()}</span>`;
      }).join("");
      return `<div class="list-mini-calendar">
        <div class="list-mini-title">${year} 年 ${rawMonth} 月</div>
        <div class="list-mini-grid">${weekdays.map(day => `<span class="weekday">${day}</span>`).join("")}${cells}</div>
      </div>`;
    }

    function monthRange(month) {
      const [year, rawMonth] = month.split("-").map(Number);
      return { start: `${month}-01`, end: dateKey(new Date(year, rawMonth, 0)) };
    }

    function shiftMonth(month, offset) {
      const [year, rawMonth] = month.split("-").map(Number);
      return dateKey(new Date(year, rawMonth - 1 + offset, 1)).slice(0, 7);
    }

    function dateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function recordLiveRoom(record) {

      const source = record.id || record.uid || record.talent || "";
      const seed = Array.from(source).reduce((sum, char) => sum + char.charCodeAt(0), 0);
      return liveRoomOptions[seed % liveRoomOptions.length] || liveRoomOptions[0];
    }

      const normalized = formatDate(value);

        return `<div class="calendar-progress-workflow">

          <strong>${escapeHtml((supportNeeds[key]?.title || modules[key]?.name || "任务").replace(/需求|支持/g, ""))}任务状态</strong>
        </div>
        <span class="calendar-progress-current-status">${escapeHtml(taskStatusDisplayLabel(key, status))}</span>
      </div>`;
      }).join("");
      return `<div class="calendar-progress-popover has-workflow ${moduleKey ? "" : "is-overview"}" role="tooltip">
        ${workflows}
      </div>`;
    }

    function taskCalendarFeedbackKeys(moduleKey, currentStatus) {
      if (moduleKey === "content" && currentStatus === "千川待审核") return ["edit", "ads"];
      if (moduleKey === "edit" && currentStatus === "待办任务") return ["content"];
      if (moduleKey === "ads" && currentStatus === "待办任务") return ["content", "edit"];
      return [];
    }

    function calendarWorkflowStatus(record, moduleKey, taskList = []) {
      if (!moduleKey) return "";
      const items = taskList.map((task, index) => ({ record, moduleKey, task, index }));
      return items.length ? myTaskGroupStatus(items) : workflowStartStatus(moduleKey);
    }

    function listFilterButton(key, label, count) {
      return `<button class="seg ${state.listFilter === key ? "active" : ""}" data-list-filter="${key}">${label} ${count}</button>`;
    }

    function talentGrade(record) {
      return talentGradeFromSales(record.expectedGmv || record.sales);
    }

    function talentGradeFromSales(salesText) {
      const salesValue = gmvAmount(salesText) || 0;
      if (salesValue > 300) return "S+";
      if (salesValue >= 151) return "S";
      if (salesValue >= 100) return "A";
      if (salesValue >= 51) return "B";
      return "C";
    }

    function gradeRank(level) {
      return { "S+": 0, S: 1, A: 2, B: 3, C: 4 }[String(level || "C").toUpperCase()] ?? 5;
    }

    function urgencyClass(level) {
      const map = { "S+": "red", S: "red", A: "orange", B: "blue", C: "green" };
      return map[(level || "B").toUpperCase()] || "orange";
    }

    function urgencyBadge(level) {
      const value = (level || "B").toUpperCase();
      return badge(value, urgencyClass(value));
    }

    function projectCard(record) {
      const displayStatus = record.scheduleStatus || record.status;
      const cls = displayStatus === "待复盘" ? "green" : displayStatus === "派工中" ? "blue" : displayStatus === "已取消" || displayStatus === "已延期" ? "red" : "orange";

        <div class="project-card-head">
          <div class="project-main">
            <div class="project-title-line">${urgencyBadge(talentGrade(record))}<h2>${record.title}</h2></div>
          </div>

        </div>
        <div class="project-product-line"><span>主推产品</span><strong>${record.product}</strong></div>
        <div class="progress"><span style="width:${record.progress}%"></span></div>
        <div class="project-card-foot"><span class="project-card-foot-left">${badge(displayStatus, cls)}</span><span class="muted">${record.sales}</span></div>
        <div class="project-meta-line"><span class="project-meta-left"><span>达人 <strong>${record.talent}</strong></span></span><span class="project-date">${record.liveTime}</span></div>
      </button>`;

    function entryDocumentFiles() {
      const files = state.entryDocs || [];
      if (!files.length) return `<div class="entry-upload-empty">未上传文件</div>`;
      return `<div class="entry-file-list">${files.map(file => {
        const name = escapeHtml(file.name);
        const type = escapeHtml(file.type || file.ext || "本地文件");
        return `<div class="entry-file-chip">
          <div class="entry-file-main"><strong title="${name}">${name}</strong><span>${formatFileSize(file.size)} · ${type}</span></div>
          <button class="file-remove" data-remove-entry-doc="${file.id}" aria-label="删除${name}">x</button>
        </div>`;
      }).join("")}</div>`;
    }

    function recognizeEntryDocs() {
      const fileText = (state.entryDocs || []).map(file => file.name).join("\n");
      const parsed = extractEntryFieldsFromText(fileText);
      return hasRecognizedFields(parsed) ? parsed : sampleEntryRecognition();
    }

    function isFeishuLink(value) {
      return /(?:^https?:\/\/)?[\w.-]*(?:feishu\.cn|larksuite\.com)\//i.test(String(value || "").trim());
    }

    function sampleEntryRecognition() {
      return {
        uid: "dy26060101",
        talent: "河北卫视中华好诗词",
        liveAt: "2026-06-01T20:00",
        business: "刘则宇黄娇",
        status: "已排期",
        type: "专场",
        liveRoom: "直播间C",
        product: "防晒素颜霜（化学款-老）",
        mechanism: "买二送一，前20分钟加赠旅行装",
        targetSales: "¥180万",
        trial: "正装试用",
        luckyBag: "飞机盒礼盒（价值599元）"
      };
    }

    function hasRecognizedFields(fields) {
      return Object.entries(fields || {}).some(([key, value]) => key !== "raw" && String(value || "").trim());
    }

    function extractEntryFieldsFromText(raw) {
      const text = String(raw || "").replace(/\r/g, "\n");
      const compact = text.replace(/\s+/g, " ");
      const fields = {
        uid: pickRecognizedLine(text, ["达人 UID", "达人UID", "UID", "达人抖音号", "抖音号"]),
        talent: pickRecognizedLine(text, ["达人昵称", "达人名称", "达人名", "达人"]),
        liveAt: parseEntryDateTime(pickRecognizedLine(text, ["专场排期（时间）", "专场排期", "排期时间", "直播时间", "开播时间", "专场时间", "时间"]) || compact),
        business: pickRecognizedLine(text, ["负责商务", "跟进商务", "商务"]),
        status: pickRecognizedLine(text, ["状态"]) || inferEntryStatus(compact),
        type: pickRecognizedLine(text, ["类型"]) || inferEntryType(compact),
        liveRoom: pickRecognizedLine(text, ["直播间"]) || inferEntryLiveRoom(compact),
        product: standardProductName(pickRecognizedLine(text, ["主推产品", "商品", "产品"]) || inferEntryProduct(compact)),
        mechanism: pickRecognizedLine(text, ["主推机制", "活动机制", "专场机制", "机制"]),
        targetSales: pickRecognizedLine(text, ["目标销售额", "预估销售额", "预计销售额", "目标GMV", "GMV"]) || inferEntrySales(compact),
        trial: standardTrialOption(pickRecognizedLine(text, ["是否有试用", "试用类型", "试用"]) || inferEntryTrial(compact)),
        luckyBag: pickRecognizedLine(text, ["福袋需求", "福袋礼盒", "福利礼盒", "礼盒"]) || inferEntryLuckyBag(compact)
      };
      const uidMatch = compact.match(/\bdy\d{5,}\b/i);
      if (!fields.uid && uidMatch) fields.uid = uidMatch[0];
      return fields;
    }

    function pickRecognizedLine(text, labels) {
      const parts = String(text || "").split(/[\n；;]+/).map(item => item.trim()).filter(Boolean);
      for (const part of parts) {
        for (const label of labels) {
          const re = new RegExp(`^${escapeRegExp(label)}(?:\\s|[:：])+(.+)$`, "i");
          const match = part.match(re);
          if (match) return cleanRecognizedValue(match[1]);
        }
      }
      for (const label of labels) {
        const re = new RegExp(`${escapeRegExp(label)}\\s*[:：]\\s*([^\\n；;]+)`, "i");
        const match = String(text || "").match(re);
        if (match) return cleanRecognizedValue(match[1]);
      }
      return "";
    }

    function cleanRecognizedValue(value) {
      return String(value || "").replace(/^[：:\s]+/, "").replace(/\s+/g, " ").trim();
    }

    function parseEntryDateTime(value) {
      const text = String(value || "");
      const match = text.match(/(20\d{2})[年/.-](\d{1,2})[月/.-](\d{1,2})(?:日)?(?:\s*(\d{1,2})[:：](\d{2}))?/);
      if (!match) return "";
      return `${match[1]}-${padTimePart(match[2])}-${padTimePart(match[3])}T${padTimePart(match[4] || "20")}:${padTimePart(match[5] || "00")}`;
    }

    function inferEntryStatus(text) {
      if (text.includes("已取消")) return "已取消";
      if (text.includes("已延期")) return "已延期";
      if (text.includes("已排期") || text.includes("排期")) return "已排期";
      return "";
    }

    function inferEntryType(text) {
      if (text.includes("新闻号")) return "新闻号";
      if (text.includes("单品直播间")) return "单品直播间";
      if (text.includes("专场")) return "专场";
      return "";
    }

    function inferEntryLiveRoom(text) {
      const match = String(text || "").match(/直播间\s*[:：]?\s*(?:直播间)?\s*([A-D])/i);
      return match ? `直播间${match[1].toUpperCase()}` : "";
    }

    function inferEntryProduct(text) {
      const normalizedText = normalizeProductText(text);
      return productOptions.find(option => normalizedText.includes(normalizeProductText(option))) || "";
    }

    function standardProductName(value) {
      const normalizedValue = normalizeProductText(value);
      if (!normalizedValue) return "";
      return productOptions.find(option => normalizeProductText(option) === normalizedValue)
        || productOptions.find(option => normalizeProductText(option).includes(normalizedValue) || normalizedValue.includes(normalizeProductText(option)))
        || value;
    }

    function inferEntryTrial(text) {
      return trialOptions.find(option => String(text || "").includes(option)) || "";
    }

    function standardTrialOption(value) {
      const normalizedValue = normalizeProductText(value);
      if (!normalizedValue) return "";
      return trialOptions.find(option => normalizeProductText(option) === normalizedValue)
        || trialOptions.find(option => normalizeProductText(option).includes(normalizedValue) || normalizedValue.includes(normalizeProductText(option)))
        || "";
    }

    function inferEntryLuckyBag(text) {
      const source = String(text || "");
      const normalizedSource = normalizeProductText(source);
      return luckyBagOptions.find(option => {
        if (option === "其他") return false;
        const normalizedOption = normalizeProductText(option);
        const optionAlias = normalizedOption.replace(/价值\d+元/g, "");
        return source.includes(option) || normalizedSource.includes(normalizedOption) || normalizedSource.includes(optionAlias);
      }) || "";
    }

    function standardLuckyBagOption(value) {
      const normalizedValue = normalizeProductText(value);
      if (!normalizedValue) return "";
      return luckyBagOptions.find(option => option !== "其他" && normalizeProductText(option) === normalizedValue)
        || luckyBagOptions.find(option => option !== "其他" && (normalizeProductText(option).includes(normalizedValue) || normalizedValue.includes(normalizeProductText(option))))
        || "其他";
    }

    function normalizeProductText(value) {
      return String(value || "").toLowerCase().replace(/[()\s（）\-—_、，,]/g, "");
    }

    function inferEntrySales(text) {
      const source = String(text || "");
      const labeled = source.match(/(?:目标销售额|预估销售额|预计销售额|目标GMV|GMV)\s*[:：]?\s*(¥?\d+(?:\.\d+)?\s*(?:万|w|W|百万)?)/i);
      if (labeled) return labeled[1].replace(/[wW]/, "万");
      const amount = source.match(/¥?\d+(?:\.\d+)?\s*(?:万|w|W|百万)/);
      return amount ? amount[0].replace(/[wW]/, "万") : "";
    }

    function applyEntryRecognition(fields, sourceLabel) {
      const applied = [];
      const assign = (label, value, transform = item => item) => {
        const next = transform(value);
        if (!String(next || "").trim()) return;
        const group = specialDetailGroups.find(item => item.title === "专场信息");
        const field = group ? group.fields.find(item => item.label === label) : null;
        if (!field) return;
        field.value = next;
        applied.push(label);
      };
      assign("达人 UID", fields.uid);
      assign("达人昵称", fields.talent);
      assign("专场排期（时间）", fields.liveAt);
      assign("负责商务", fields.business);
      assign("状态", fields.status, value => ["已排期", "已延期", "已取消"].includes(value) ? value : "");
      assign("类型", fields.type, value => ["专场", "新闻号", "单品直播间"].includes(value) ? value : "");
      assign("直播间", fields.liveRoom, value => liveRoomOptions.includes(value) ? value : "");
      assign("主推产品", fields.product, standardProductName);
      assign("主推机制", fields.mechanism);
      assign("目标销售额", fields.targetSales, normalizeGmvText);
      assign("是否有试用", fields.trial, standardTrialOption);
      assign("福袋需求", fields.luckyBag, standardLuckyBagOption);
      if (standardLuckyBagOption(fields.luckyBag) === "其他") assign("其他福袋需求", fields.luckyBag);
      toast(applied.length ? `${sourceLabel}已识别并回填 ${applied.length} 项` : `未从${sourceLabel}中识别到可回填字段`);
      render();
    }

    function specialDetailSection() {
      return `<section class="panel entry-detail-panel" style="margin-top:18px">
        <div class="panel-head">
          <div><h2 class="panel-title">专场详情</h2></div>
        </div>
        <div class="panel-body">
          <div class="detail-groups">${specialDetailGroups.map((group, groupIndex) => detailCard(group, groupIndex)).join("")}</div>
          <div class="panel-actions"><button class="btn primary" data-action="createProjectFromEntry">发布需求</button></div>
        </div>
      </section>`;
    }

    function detailCard(group, groupIndex) {
      const enabled = !group.supportKey || entrySupportEnabled[group.supportKey] !== false;
      const isSpecialInfo = group.title === "专场信息";
      return `<div class="detail-card ${isSpecialInfo ? "special-info-card " : ""}${enabled ? "" : "is-collapsed"}">
        <div class="detail-card-head">
          <h3>${group.title}</h3>
          ${group.supportKey ? supportSwitch(group.supportKey, group.switchLabel) : ""}
        </div>
        ${enabled ? (isSpecialInfo ? specialInfoFields(group, groupIndex) : `<div class="detail-fields">${group.fields.map((item, fieldIndex) => detailField(groupIndex, fieldIndex, item)).join("")}</div>`) : ""}
      </div>`;
    }

    function specialInfoFields(group, groupIndex) {
      const sections = [
        { title: "基础信息", labels: ["专场名称", "达人 UID", "达人昵称"] },
        { title: "排期与归属", labels: ["专场排期（时间）", "负责商务", "类型", "直播间"] },
        { title: "商品与销售", labels: ["主推产品", "主推机制", "目标销售额"] },
        { title: "配合与福利", labels: ["是否有试用", "福袋需求", "其他福袋需求", "福利品（即秒杀品）", "达人配合度"] }
      ];
      return `<div class="special-info-layout">${sections.map(section => {
        const fields = section.labels.map(label => {
          const fieldIndex = group.fields.findIndex(item => item.label === label);
          return fieldIndex >= 0 ? detailField(groupIndex, fieldIndex, group.fields[fieldIndex]) : "";
        }).join("");
        return `<section class="special-info-section">
          <div class="special-info-section-title">${section.title}</div>
          <div class="special-info-fields">${fields}</div>
        </section>`;
      }).join("")}</div>`;
    }

    function supportSwitch(key, label) {
      return `<label class="support-switch">
        <input type="checkbox" data-detail-support-toggle="${key}" ${entrySupportEnabled[key] !== false ? "checked" : ""}>
        <span class="switch-track"></span>
        <span>${label}</span>
      </label>`;
    }

    function padTimePart(value) {
      return String(value || "").padStart(2, "0");
    }

    function normalizedDateValue(value) {
      const match = String(value || "").trim().match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
      return match ? `${match[1]}-${padTimePart(match[2])}-${padTimePart(match[3])}` : "";
    }

    function normalizedDateTimeValue(value) {
      const match = String(value || "").trim().match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})(?:[ T](\d{1,2}):(\d{2}))?/);
      if (!match) return "";
      return `${match[1]}-${padTimePart(match[2])}-${padTimePart(match[3])}T${padTimePart(match[4] || "00")}:${padTimePart(match[5] || "00")}`;
    }

    function normalizedTimeValue(value) {
      const match = String(value || "").trim().match(/^(\d{1,2}):(\d{2})$/);
      return match ? `${padTimePart(match[1])}:${padTimePart(match[2])}` : "";
    }

    function timeRangeValue(value) {
      const match = String(value || "").trim().match(/^(\d{1,2}:\d{2})\s*(?:-|~|—|至)\s*(\d{1,2}:\d{2})$/);
      return match ? { start: normalizedTimeValue(match[1]), end: normalizedTimeValue(match[2]) } : null;
    }

    function detailTimeType(item) {
      if (item.type === "datetime-local" || item.type === "date" || item.type === "time") return item.type;
      const label = item.label || "";
      const value = String(item.value || "").trim();
      if (!/[日期时间]/.test(label)) return "";
      if (timeRangeValue(value)) return "time-range";
      if (normalizedDateTimeValue(value) && (label.includes("时间") || value.includes(":"))) return "datetime-local";
      if (normalizedDateValue(value) && label.includes("日期")) return "date";
      if (normalizedTimeValue(value)) return "time";
      return "";
    }

    function detailFieldLabel(item) {
      return `<span class="detail-field-label">${item.label}${item.required ? `<i class="required">*</i>` : ""}</span>`;
    }

    function detailGroupField(groupIndex, label) {
      const group = specialDetailGroups[groupIndex];
      return group ? group.fields.find(field => field.label === label) : null;
    }

    function shouldShowDetailField(groupIndex, item) {
      if (!item.showWhen) return true;
      const target = detailGroupField(groupIndex, item.showWhen.label);
      if (!target) return true;
      const expected = Array.isArray(item.showWhen.value) ? item.showWhen.value : [item.showWhen.value];
      return expected.includes(target.value);
    }

    function shootCountRule() {
      const amount = gmvAmount(specialValue("目标销售额", specialValue("预估销售额", "0")));
      if (!Number.isFinite(amount)) return { count: "待填写目标销售额", level: "系统将根据 GMV 自动计算" };
      if (amount < 50) return { count: "1条", level: "C级：小于50w" };
      if (amount < 100) return { count: "2-3条", level: "B级：50w-90w" };
      if (amount <= 150) return { count: "4-5条", level: "A级：100w-150w" };
      return { count: "可全部承接（大场撞一起另协调）", level: "S级：150w+" };
    }

    function shootCountAutoText() {
      const rule = shootCountRule();
      return `${rule.count}\n${rule.level}`;
    }

    function editableShootCountValue(item) {
      const autoValue = shootCountAutoText();
      if (!item.value || item.value === item.autoValue) {
        item.autoValue = autoValue;
        item.value = autoValue;
      }
      return item.value;
    }

    function detailField(groupIndex, fieldIndex, item, disabled = false) {
      if (!shouldShowDetailField(groupIndex, item)) return "";
      const cls = item.wide ? ` ${item.wide}` : "";
      const key = `${groupIndex}:${fieldIndex}`;
      if (item.type === "computed-shot-count") {
        const value = editableShootCountValue(item);
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <textarea class="shot-count-input" data-special-detail="${key}" ${disabled ? "disabled" : ""}>${escapeHtml(value)}</textarea>
          <span class="detail-auto-note">系统按目标销售额自动计算，可手动编辑</span>
        </label>`;
      }
      if (item.type === "select") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <select class="select" data-special-detail="${key}" ${disabled ? "disabled" : ""}>${item.options.map(option => `<option ${option === item.value ? "selected" : ""}>${option}</option>`).join("")}</select>
        </label>`;
      }
      if (item.type === "text") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="text" value="${escapeHtml(item.value)}" placeholder="${escapeHtml(item.placeholder || "")}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      if (item.type === "datetime-local") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="datetime-local" value="${normalizedDateTimeValue(item.value)}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      const timeType = detailTimeType(item);
      if (timeType === "datetime-local") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="datetime-local" value="${normalizedDateTimeValue(item.value)}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      if (timeType === "date") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="date" value="${normalizedDateValue(item.value)}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      if (timeType === "time") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="time" value="${normalizedTimeValue(item.value)}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      if (timeType === "time-range") {
        const range = timeRangeValue(item.value);
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <div class="time-range-row">
            <input class="input" type="time" value="${range.start}" data-special-detail-range="${key}" data-range-part="start" ${disabled ? "disabled" : ""}>
            <em class="time-range-separator">至</em>
            <input class="input" type="time" value="${range.end}" data-special-detail-range="${key}" data-range-part="end" ${disabled ? "disabled" : ""}>
          </div>
        </label>`;
      }
      if (item.type === "product") {
        return `<div class="detail-field${cls} product-field">
          ${detailFieldLabel(item)}
          <div class="product-select-row">
            <select class="select" data-special-detail="${key}" ${disabled ? "disabled" : ""}>${item.options.map(option => `<option ${option === item.value ? "selected" : ""}>${option}</option>`).join("")}</select>
            <button class="btn ghost" data-product-toggle>${state.productPanelOpen ? "收起商品栏" : "展开商品栏"}</button>
          </div>
          ${state.productPanelOpen ? `<div class="product-panel">
            <div class="product-panel-head"><strong>标准主推产品</strong><span>点击商品可回填到下拉框</span></div>
            <div class="product-options">${item.options.map(option => `<button class="product-chip ${option === item.value ? "active" : ""}" data-product-option="${option}" data-product-field="${key}">${option}</button>`).join("")}</div>
          </div>` : ""}
        </div>`;
      }
      return `<label class="detail-field${cls}">
        ${detailFieldLabel(item)}
        <textarea data-special-detail="${key}" ${disabled ? "disabled" : ""}>${item.value}</textarea>
      </label>`;
    }

    function pageDetail() {
      const record = selectedRecord();
      const progressRows = projectTaskRecords(record);
      return `${projectHeader(record)}
      ${recordCancelPanel(record)}
      ${projectDetailPanel(record)}
      <section class="detail-main">

          </div>

        </div>
      </section>`;

    function recordStakeholders(record) {
      const people = new Map();
      const addPerson = (name, role, primary = false) => {
        const normalized = String(name || "").trim();
        if (!normalized || ["待分配", "待填写", "暂无", "无"].includes(normalized)) return;
        if (!people.has(normalized)) {
          people.set(normalized, { name: normalized, roles: [], primary });
        }
        const item = people.get(normalized);
        if (!item.roles.includes(role)) item.roles.push(role);
        item.primary = item.primary || primary;
      };
      addPerson(record.business, "负责商务", true);
      moduleOrder.forEach(moduleKey => {
        const supportName = supportNeeds[moduleKey].title;
        addPerson(modules[moduleKey].owner, `${supportName}负责人`);
        addPerson(dispatchAssignments[record.id]?.[moduleKey]?.owner || defaultOwnerFor(record.id, moduleKey), `${supportName}派发负责人`);
        (dispatchTasks[record.id]?.[moduleKey] || []).forEach(task => addPerson(task.owner, `${supportName}执行人`));
      });
      return Array.from(people.values()).map(item => ({
        name: item.name,
        role: item.roles.join(" / "),
        primary: item.primary
      }));
    }

    function specialInfoSyncPanel(record) {
      const stakeholders = recordStakeholders(record);
      const synced = record.infoSync;
      const summary = synced
        ? `${synced.actor || "商务"} 于 ${formatDate(synced.time)} 提交编辑，已同步 ${stakeholders.length} 位关联人员。`
        : `提交后自动同步负责商务、四类需求负责人、派发负责人和执行组员，共 ${stakeholders.length} 位关联人员。`;
      const chips = stakeholders.map(person => `<span class="sync-person-chip ${person.primary ? "is-business" : ""}" title="${escapeHtml(person.role)}">${escapeHtml(person.name)}</span>`).join("");
      return `<div class="special-sync-panel">
        <div class="special-sync-copy">
          <strong>信息同步</strong>
          <span>${summary}</span>
        </div>
        <div class="special-sync-people">${chips}</div>
      </div>`;
    }

    function specialInfoValue(record, key) {
      const fallback = {
        specialName: record.specialName || record.title,
        liveRoom: recordLiveRoom(record),
        scheduleStatus: record.scheduleStatus || record.status || "已排期",
        cancelReason: record.cancelReason || "",
        type: record.type || "专场",
        mechanism: record.mechanism || "按商务文档机制执行",
        expectedGmv: record.expectedGmv || record.sales || "",
        trial: record.trial || "不支持试用",
        luckyBag: record.luckyBag || "飞机盒礼盒（价值599元）",
        luckyBagOther: record.luckyBagOther || "",
        cooperation: record.cooperation || "高，可配合提前预热、直播口播和短视频确认"
      };
      return fallback[key] ?? record[key] ?? "";
    }

    function infoEditorOptions(item, value) {
      const options = [...(item.options || [])];
      if (value && !options.includes(value)) options.unshift(value);
      return options;
    }

    function specialInfoEditorField(record, item) {
      const value = specialInfoValue(record, item.key);
      const cls = item.wide ? " long" : "";
      const required = item.required ? `<em class="required">*</em>` : "";
      const placeholder = item.placeholder ? ` placeholder="${escapeHtml(item.placeholder)}"` : "";
      const label = `<span class="detail-field-label">${escapeHtml(item.label)}${required}</span>`;
      if (item.type === "select") {
        return `<label class="detail-field${cls}">${label}
          <select class="select" data-info-edit="${item.key}">${infoEditorOptions(item, value).map(option => `<option value="${escapeHtml(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option)}</option>`).join("")}</select>
        </label>`;
      }
      if (item.type === "datetime-local") {
        return `<label class="detail-field${cls}">${label}
          <input class="input" type="datetime-local" value="${escapeHtml(normalizedDateTimeValue(value))}" data-info-edit="${item.key}">
        </label>`;
      }
      if (item.type === "textarea") {
        return `<label class="detail-field${cls}">${label}
          <textarea class="input" data-info-edit="${item.key}"${placeholder}>${escapeHtml(value)}</textarea>
        </label>`;
      }
      return `<label class="detail-field${cls}">${label}
        <input class="input" type="text" value="${escapeHtml(value)}" data-info-edit="${item.key}"${placeholder}>
      </label>`;
    }

    function openSpecialInfoEditor(recordId) {
      const record = records.find(item => item.id === recordId) || selectedRecord();
      const stakeholders = recordStakeholders(record);
      const body = `<div class="stack">
        <div class="info-editor-note">
          <strong>商务角色可编辑</strong>
          <span>提交后会同步更新专场列表、日历、我的任务、需求派发和数据中心中的同一条专场信息，并通知 ${stakeholders.length} 位关联人员。</span>
        </div>
        <div class="detail-fields info-editor-fields">${businessEditableFields.map(item => specialInfoEditorField(record, item)).join("")}</div>
      </div>`;
      openDrawer(
        "商务编辑专场信息",
        body,
        `<button class="btn ghost" data-close>取消</button><button class="btn primary" data-save-info-editor="${record.id}">提交并同步</button>`,
        true,
        true
      );
    }

    function currentSyncTime() {
      return new Date().toLocaleString("zh-CN", { hour12: false }).replace(/\//g, "-");
    }

    function normalizeSpecialInfoValues(values) {
      const liveTime = String(values.liveTime || "").replace("T", " ").trim();
      const type = String(values.type || "专场").trim() || "专场";
      const product = String(values.product || "").trim();
      const talent = String(values.talent || "").trim();
      const generatedTitle = `${talent || "待填写达人"} ${liveTime.slice(5, 10).replace("-", "/")} ${product || "待填写产品"}${type}`;
      return {
        specialName: String(values.specialName || "").trim() || generatedTitle,
        uid: String(values.uid || "").trim(),
        talent,
        liveTime,
        business: String(values.business || "").trim(),
        scheduleStatus: String(values.scheduleStatus || "已排期").trim() || "已排期",
        cancelReason: String(values.cancelReason || "").trim(),
        type,
        liveRoom: String(values.liveRoom || liveRoomOptions[0]).trim(),
        product,
        mechanism: String(values.mechanism || "按商务文档机制执行").trim(),
        expectedGmv: normalizeGmvText(values.expectedGmv || values.sales || ""),
        trial: String(values.trial || "不支持试用").trim(),
        luckyBag: String(values.luckyBag || "").trim(),
        luckyBagOther: String(values.luckyBagOther || "").trim(),
        cooperation: String(values.cooperation || "").trim()
      };
    }

    function applySpecialInfoValues(record, rawValues, actorLabel = "商务") {
      const values = normalizeSpecialInfoValues(rawValues);
      const syncTime = currentSyncTime();
      record.specialName = values.specialName;
      record.title = values.specialName;
      record.uid = values.uid;
      record.talent = values.talent;
      record.liveTime = values.liveTime;
      record.business = values.business;
      record.scheduleStatus = values.scheduleStatus;
      record.status = values.scheduleStatus;
      record.cancelReason = values.cancelReason;
      if (values.scheduleStatus === "已取消") {
        record.canceledAt = record.canceledAt || syncTime;
      } else {
        delete record.canceledAt;
      }
      record.type = values.type;
      record.liveRoom = values.liveRoom;
      record.product = values.product;
      record.mechanism = values.mechanism;
      record.expectedGmv = values.expectedGmv;
      record.sales = values.expectedGmv;
      record.trial = values.trial;
      record.luckyBag = values.luckyBag;
      record.luckyBagOther = values.luckyBagOther;
      record.cooperation = values.cooperation;
      record.urgency = talentGrade(record);

      const stakeholders = recordStakeholders(record);
      record.infoSync = {
        time: syncTime,
        actor: record.business || actorLabel,
        people: stakeholders.map(person => person.name)
      };
      Object.values(dispatchTasks[record.id] || {}).flat().forEach(task => {
        task.specialInfoSyncedAt = syncTime;
      });
      pushFeishuSpecialInfoMessage(record, stakeholders, syncTime, actorLabel);
      logs.push({
        time: syncTime,
        user: record.business || actorLabel,
        action: `编辑了 ${record.title} 专场信息，并同步 ${stakeholders.length} 位关联人员`,
        color: "green"
      });
      return { stakeholders, syncTime };
    }

    function pushFeishuSpecialInfoMessage(record, stakeholders, syncTime, actorLabel) {
      const recipients = stakeholders.map(person => person.name);
      const payload = {
        id: `FS-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        time: syncTime,
        recordId: record.id,
        moduleKey: "specialInfo",
        taskTitle: "专场信息修改",
        recipients,
        message: `【专场信息变更】${record.title} 的专场信息已由${record.business || actorLabel}提交修改，请对应支持人员同步查看。`
      };
      state.feishuPushLog = [payload, ...(state.feishuPushLog || [])].slice(0, 80);
    }

    function saveSpecialInfoEditor(recordId) {
      const record = records.find(item => item.id === recordId);
      if (!record) return;
      const values = {};
      document.querySelectorAll("#drawer [data-info-edit]").forEach(input => {
        values[input.dataset.infoEdit] = input.type === "datetime-local" ? input.value.replace("T", " ") : input.value.trim();
      });
      const missing = businessEditableFields.find(item => item.required && !values[item.key]);
      if (missing) {
        const target = document.querySelector(`#drawer [data-info-edit="${missing.key}"]`);
        if (target) target.focus();
        toast(`请填写${missing.label}`);
        return;
      }
      if (values.scheduleStatus === "已取消" && !values.cancelReason) {
        const target = document.querySelector(`#drawer [data-info-edit="cancelReason"]`);
        if (target) target.focus();
        toast("状态改为已取消时，请填写取消原因");
        return;
      }

      const { stakeholders } = applySpecialInfoValues(record, values);
      closeDrawer();
      toast(`已提交编辑，并同步 ${stakeholders.length} 位关联人员`);
      render();
    }

    function projectHeader(record) {

    function recordCancelPanel(record) {

      if (record.cancelEditing) {

          <div class="panel-head"><div><h2 class="panel-title">取消专场</h2><div class="muted">取消原因将留存在专场记录和月度统计中</div></div>${badge("必填", "red")}</div>
          <div class="panel-body stack">
            <label class="task-field">

              <textarea class="input" placeholder="请填写取消原因，例如达人临时取消、档期冲突、商务策略调整等" data-cancel-record-reason="${record.id}">${escapeHtml(record.cancelDraft || record.cancelReason || "")}</textarea>
            </label>
            <div class="panel-actions"><button class="btn ghost" data-dismiss-cancel-record="${record.id}">取消</button><button class="btn danger" data-save-cancel-record="${record.id}">确认取消专场</button></div>
          </div>

        </div>

    function projectProgress(record) {
      return `<section class="panel" style="margin-bottom:18px">
        <div class="panel-body">
          <div class="row"><span class="muted">${record.nodesDone}/${record.nodesTotal} 节点</span><strong style="color:var(--orange)">${record.progress}%</strong></div>
          <div style="height:10px"></div>
          <div class="progress"><span style="width:${record.progress}%"></span></div>
        </div>
      </section>`;
    }

    function projectTaskRecords(record) {
      const recordTasks = dispatchTasks[record.id] || {};
      const rows = [];
      moduleOrder.forEach(moduleKey => {
        const module = modules[moduleKey];
        const support = supportNeeds[moduleKey];
        const taskList = recordTasks[moduleKey] || [];
        taskList.forEach((task, index) => {
          const status = task.status || "待处理";
          const due = task.delayDue || task.due || assignmentFor(record.id, moduleKey).due;
          rows.push({
            id: `${record.id}:${moduleKey}:${index}`,
            name: task.title,
            moduleKey,
            moduleName: support.title,
            moduleOwner: module.owner,
            owner: task.owner || assignmentFor(record.id, moduleKey).owner,
            status,
            date: timelineTaskDate(due),
            fullDate: due,
            note: `${support.title} · ${task.owner || module.owner}负责执行`
          });
        });
      });
      return rows.length ? rows : projectNodes.map((node, index) => {
        const status = nodeStatus(record, index);
        return { ...node, owner: node.owner, status, date: node.date, fullDate: node.date, moduleName: "流程节点", moduleOwner: node.owner };
      });
    }

    function timelineTaskDate(value) {
      if (!value) return "";
      if (value.includes("-")) return value.slice(5, 10).replace("-", "/");
      if (value.includes("/")) {
        const parts = value.split("/");
        return parts.length >= 3 ? `${parts[1]}/${parts[2]}` : value;
      }
      return value;
    }

    function nodeStatus(record, index) {
      return index < record.nodesDone ? "已完成" : index === record.nodesDone ? "执行中" : "待执行";
    }

    function nodeStatusClass(status) {
      return taskStatusClass(status);
    }

    function taskStatusClass(status) {
      if (status === "已完成" || status === "已发布" || status === "已投放" || status === "审核通过") return "green";
      if (status === "延期中" || status === "已取消") return "red";
      if (status === "待审核" || status === "千川待审核" || status === "千川审核中") return "purple";
      if (status === "进行中" || status === "执行中" || status === "已派发" || status === "编写中" || status === "待拍摄" || status === "剪辑中" || status === "待发布" || status === "待投放") return "blue";
      if (status === "待处理" || status === "待派发" || status === "待执行" || status === "待办任务") return "orange";
      return "gray";
    }

    function nodeTimeline(record) {
      const rows = projectTaskRecords(record);
      const dates = timelineDates(rows);
      const today = "06/08";
      return `<div class="node-timeline">
        <div class="timeline-grid" style="--timeline-cols:${dates.length};min-width:${230 + dates.length * 58}px">
          <div class="timeline-head timeline-title">任务名称</div>
          ${dates.map(date => `<div class="timeline-head ${date === today ? "today-head" : ""}">${date}</div>`).join("")}
          ${rows.map(row => {
            const cls = nodeStatusClass(row.status);
            return `<div class="timeline-task">
              <div class="timeline-task-name">${row.name}</div>
              <div class="timeline-task-meta">${row.moduleName} · ${row.owner}</div>
              ${badge(row.status, cls === "gray" ? "" : cls)}
            </div>
            ${dates.map(date => `<div class="timeline-cell ${date === today ? "today-cell" : ""}">
              ${date === row.date ? `<button class="timeline-marker ${cls}" data-node-detail="${row.id}" aria-label="${row.name} ${row.status}"></button>` : ""}
            </div>`).join("")}`;
          }).join("")}
        </div>
      </div>`;
    }

    function timelineDates(rows) {
      const today = parseTimelineDate("06/08");
      const nodeDates = rows.map(row => parseTimelineDate(row.date)).filter(date => !Number.isNaN(date.getTime()));
      const start = new Date(Math.min(today.getTime(), ...nodeDates.map(date => date.getTime())));
      const end = new Date(Math.max(today.getTime(), ...nodeDates.map(date => date.getTime())));
      const dates = [];
      for (let date = new Date(start); date <= end; date = addTimelineDay(date, 1)) {
        dates.push(formatTimelineDate(date));
      }
      return dates;
    }

    function parseTimelineDate(value) {
      const [month, day] = value.split("/").map(Number);
      return new Date(2026, month - 1, day);
    }

    function addTimelineDay(date, amount) {
      const next = new Date(date);
      next.setDate(next.getDate() + amount);
      return next;
    }

    function formatTimelineDate(date) {
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${month}/${day}`;
    }

      ${stats()}
      <section class="grid-2">
        <div class="panel">
          <div class="panel-head"><div><h2 class="panel-title">专场记录表</h2></div>${badge("商务填写", "orange")}</div>
          <div class="panel-body stack">
            ${records.map(item => `<button class="record-card ${item.id === state.selected ? "active" : ""}" data-record="${item.id}">
              <div class="row"><span class="title">${item.title}</span>${badge(item.status, item.status === "待复盘" ? "green" : item.status === "派工中" ? "blue" : "orange")}</div>
              <div class="meta"><span>${item.talent}</span><span>${item.uid}</span><span>${item.liveTime}</span></div>
              <div class="progress"><span style="width:${item.progress}%"></span></div>
              <span class="muted">${item.source}</span>
            </button>`).join("")}
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><div><h2 class="panel-title">${record.title}</h2></div><button class="btn ghost" data-drawer="record">查看原始记录</button></div>
          <div class="panel-body stack">
            <div class="field-grid">${field("达人 UID", record.uid)}${field("开播时间", record.liveTime)}${field("直播间", escapeHtml(recordLiveRoom(record)))}${field("负责商务", record.business)}${field("状态", record.scheduleStatus || record.status)}${field("类型", record.type || "专场")}${field("目标销售额", record.expectedGmv || record.sales)}${field("主推产品", record.product)}</div>
            <div class="upload"><div><strong>专场记录表入口</strong><button class="btn primary" data-go="analysis">提交需求识别</button></div></div>
          </div>
        </div>
      </section>`;
    }

    function pageAnalysis() {
      return `${head("需求识别", `<button class="btn primary" data-action="runAnalysis">重新识别字段</button><button class="btn ghost" data-go="dispatch">进入需求派发</button>`)}
      <section class="grid-main">
        <div class="panel">
          <div class="panel-head"><div><h2 class="panel-title">需求识别结果</h2></div>${badge("7 条需求", "blue")}</div>
          <div class="panel-body">
            <div class="grid-4">${Object.entries(modules).map(([key, module]) => moduleNeedSummary(key, module, selectedRecord())).join("")}</div>
            <div style="height:18px"></div>
            <div class="stack">${needs.map(needCard).join("")}</div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2 class="panel-title">识别依据</h2>${badge("字段分析", "orange")}</div>
          <div class="panel-body stack">
            ${field("内容判断", "出现视频条数、达人内容偏好、预热时间，因此存在内容需求。")}
            ${field("剪辑判断", "出现素材与视频版本交付，因此存在剪辑需求。")}
            ${field("投放判断", "出现千川合作码、粉丝画像、费比，因此存在投放需求。")}
            ${field("运营判断", "出现设备、镜像、化妆、福利品、样品，因此存在运营需求。")}
          </div>
        </div>
      </section>`;
    }

    function moduleNeedSummary(key, module, record = selectedRecord()) {
      const list = needs.filter(item => item.module === key && item.exists);
      const summary = moduleTaskSummary(record, key);
      return `<button class="module-card ${state.module === key ? "active" : ""}" data-open-module-tasks="${record.id}:${key}">
        <div class="row"><span class="module-card-title"><strong>${module.name}</strong>${summaryNoticeDot(summary.noticeCount, "该需求有新增子任务提醒")}</span>${badge(`${summary.total || list.length} 条`, summary.badgeCls || module.cls)}</div>
        <div class="progress"><span style="width:${summary.progress}%"></span></div>
        <div class="module-status-line"><span>负责人：${module.owner}</span><strong>${summary.label}</strong></div>
        <div class="module-task-mini">${summary.chips.map(chip => `<span>${chip}</span>`).join("")}</div>
      </button>`;
    }

    function moduleTaskSummary(record, moduleKey) {
      const taskList = (dispatchTasks[record.id] && dispatchTasks[record.id][moduleKey]) || [];
      const total = taskList.length;
      const done = taskList.filter(task => task.status === "已完成").length;
      const delayed = taskList.filter(task => task.status === "延期中").length;
      const canceled = taskList.filter(task => task.status === "已取消").length;
      const uploaded = taskList.filter(task => (task.files || []).length && task.status !== "已完成" && task.status !== "已取消").length;
      const noticeCount = taskNoticeCount(taskList);
      const assignment = assignmentFor(record.id, moduleKey);
      const progress = total ? Math.round(done / total * 100) : (assignment.status === "已完成" ? 100 : 0);
      const label = total
        ? `${done}/${total} 已完成`
        : assignment.status === "待派发"
          ? "待派发"
          : assignment.status;
      const badgeCls = delayed || canceled ? "red" : done === total && total ? "green" : uploaded ? "blue" : assignment.status === "待派发" ? "orange" : modules[moduleKey].cls;
      const chips = [
        total ? `子任务 ${total}` : "暂无子任务",
        uploaded ? `已上传 ${uploaded}` : "",
        delayed ? `延期 ${delayed}` : "",
        canceled ? `取消 ${canceled}` : ""
      ].filter(Boolean);
      return { total, done, delayed, canceled, uploaded, noticeCount, progress, label, badgeCls, chips };
    }

    const moduleTaskSampleStatuses = {
      content: ["编写中", "待审核", "待拍摄", "千川待审核"],
      edit: ["待办任务", "剪辑中", "千川待审核", "审核通过"],
      ads: ["待办任务", "千川待审核", "待投放", "已投放"],
      ops: ["初始", "待办任务", "待办任务", "已完成"]
    };

    function ensureModuleTaskSamples(recordId, moduleKey) {
      const record = records.find(item => item.id === recordId) || selectedRecord();
      const taskList = tasksFor(record.id, moduleKey);
      const templates = taskTemplates[moduleKey];
      const sampleStatuses = moduleTaskSampleStatuses[moduleKey];
      const members = moduleMembers[moduleKey] || [modules[moduleKey].owner];
      while (taskList.length < 4) {
        const index = taskList.length;
        const title = templates.find(name => !taskList.some(task => task.title === name)) || `${modules[moduleKey].name}子任务 ${index + 1}`;
        const workflowStatus = sampleStatuses[index];
        taskList.push({
          title,
          owner: members[index % members.length] || modules[moduleKey].owner,
          due: assignmentFor(record.id, moduleKey).due || defaultDue(record),
          status: isTaskWorkflowDone(workflowStatus) ? "已完成" : "待处理",
          workflowStatus,
          completedAt: isTaskWorkflowDone(workflowStatus) ? actionDate : "",
          isNew: true,
          businessNotice: "new"
        });
      }
      taskList.slice(0, 4).forEach((task, index) => {
        if (!task.owner) task.owner = members[index % members.length] || modules[moduleKey].owner;
        if (!task.workflowStatus && task.status !== "已完成" && task.status !== "延期中" && task.status !== "已取消") {
          task.workflowStatus = sampleStatuses[index];
        }
      });
      return taskList.slice(0, 4);
    }

    function moduleTaskDialogTabs(recordId, activeModuleKey) {
      const labels = { content: "内容", edit: "剪辑", ads: "投放", ops: "运营" };
      return `<div class="module-task-dialog-tabs" role="tablist" aria-label="子任务类型切换">${moduleOrder.map(moduleKey => {
        const count = ensureModuleTaskSamples(recordId, moduleKey).length;
        return `<button class="task-module-tab ${activeModuleKey === moduleKey ? "active" : ""}" role="tab" aria-selected="${activeModuleKey === moduleKey}" data-module-task-tab="${recordId}:${moduleKey}">${labels[moduleKey]}<i>${count}</i></button>`;
      }).join("")}</div>`;
    }

    function openModuleTaskDialog(key) {
      const [recordId, moduleKey] = key.split(":");
      const record = records.find(item => item.id === recordId) || selectedRecord();
      const module = modules[moduleKey];
      moduleOrder.forEach(item => ensureModuleTaskSamples(record.id, item));
      const taskList = ensureModuleTaskSamples(record.id, moduleKey);
      const summary = moduleTaskSummary(record, moduleKey);
      state.module = moduleKey;
      const rows = taskList.map((task, index) => moduleTaskDetailRow(record.id, moduleKey, task, index)).join("");
      openDrawer(
        `${record.title} · 子任务详情`,
        `<div class="module-task-dialog">
          ${moduleTaskDialogTabs(record.id, moduleKey)}
          <div class="module-task-summary">
            ${field("达人专场", record.title)}
            ${field("需求负责人", module.owner)}
            ${field("完成情况", summary.label)}
          </div>
          <div class="module-task-state-machine">
            <strong>${module.name}状态机</strong>
            ${workflowPathStrip(moduleKey, taskWorkflowStatus({ record, moduleKey, task: taskList[0] }))}
          </div>
          <div class="module-task-detail-list">${rows || `<div class="upload"><div><strong>暂无子任务</strong></div></div>`}</div>
        </div>`,
        `<button class="btn primary" data-close>关闭</button>`,
        true,
        true
      );
    }

    function taskBusinessNotice(task) {
      const status = task.status || "";
      if (task.businessNotice) return task.businessNotice;
      if (status === "已取消" && task.statusChangedAt) return "status";
      if (status === "已完成") return "done";
      if (status === "待审核") return "done";
      if ((task.files || []).length) return "uploaded";
      if (task.isNew) return "new";
      return "";
    }

    function taskNoticeCount(taskList) {
      return taskList.filter(task => taskBusinessNotice(task)).length;
    }

    function taskNoticeLabel(notice) {
      return {
        new: "新增任务，提醒商务关注",
        uploaded: "子任务已上传附件，提醒商务查看",
        submitted: "子任务已上传完成，提醒商务查看",
        done: "子任务已完成，提醒商务查看",
        updated: "子任务信息已修改，提醒关联人员查看",
        status: "子任务状态已变更，提醒关联人员查看"
      }[notice] || "子任务有更新，提醒商务查看";
    }

    function summaryNoticeDot(count, label) {
      return count ? `<span class="summary-notice-dot" title="${label} ${count} 条" aria-label="${label} ${count} 条"></span>` : "";
    }

    function taskIndexNotice(index, task) {
      const notice = taskBusinessNotice(task);
      const label = taskNoticeLabel(notice);
      return `<span class="task-index-wrap">${notice ? `<span class="business-notice-dot" title="${label}" aria-label="${label}"></span>` : ""}<span class="task-index">${index + 1}</span></span>`;
    }

    function notifyTaskStatusChange(item, previousStatus, nextStatus, reason = "状态变更") {
      if (!item || !item.task || !item.record || !item.moduleKey || previousStatus === nextStatus) return;
      const task = item.task;
      task.businessNotice = "status";
      task.noticeAt = actionDate;
      task.statusChangedAt = actionDate;
      task.statusHistory = [...(task.statusHistory || []), {
        time: actionDate,
        from: previousStatus || "未创建",
        to: nextStatus || "待同步",
        user: currentOperatorName(item),
        reason
      }];
      pushFeishuBotStatusMessage(item, previousStatus, nextStatus, reason);
    }

    function currentOperatorName(item) {
      return state.taskScope === "mine" ? state.taskUser : (item.task.owner || modules[item.moduleKey]?.owner || "系统");
    }

    function relatedTaskRecipients(item) {
      return [...new Set([
        item.record.business,
        modules[item.moduleKey]?.owner,
        item.task.owner,
        assignmentFor(item.record.id, item.moduleKey).owner
      ].filter(Boolean))];
    }

    function pushFeishuBotStatusMessage(item, previousStatus, nextStatus, reason) {
      const recipients = relatedTaskRecipients(item);
      const payload = {
        id: `FS-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        time: actionDate,
        recordId: item.record.id,
        moduleKey: item.moduleKey,
        taskTitle: item.task.title || "未命名任务",
        recipients,
        message: `【专场子任务状态变更】${item.record.title}｜${supportNeeds[item.moduleKey].title}｜${item.task.title || "未命名任务"}：${previousStatus || "未创建"} → ${nextStatus || "待同步"}。原因：${reason}。`
      };
      state.feishuPushLog = [payload, ...(state.feishuPushLog || [])].slice(0, 80);
      item.task.feishuPushHistory = [...(item.task.feishuPushHistory || []), payload];
    }

    function moduleTaskDetailRow(recordId, moduleKey, task, index) {
      const module = modules[moduleKey];
      const record = records.find(item => item.id === recordId) || selectedRecord();
      const due = task.delayDue || task.due || assignmentFor(recordId, moduleKey).due;
      const status = taskWorkflowStatus({ record, moduleKey, task });
      const note = moduleTaskDetailNote(moduleKey, task);
      const key = `${recordId}:${moduleKey}:${index}`;
      return `<article class="module-task-detail-item">
        ${taskIndexNotice(index, task)}
        <div class="module-task-title">
          <strong>${escapeHtml(task.title || taskTemplates[moduleKey][0])}</strong>
          <span>${supportNeeds[moduleKey].title} · 负责人：${escapeHtml(module.owner)}</span>
        </div>
        <div class="module-task-cell"><span>执行人</span><strong>${escapeHtml(task.owner || module.owner)}</strong></div>
        <div class="module-task-cell"><span>预计截止日期</span><strong>${formatDate(due)}</strong></div>
        <div class="module-task-cell"><span>状态</span>${badge(taskStatusDisplayLabel(moduleKey, status), taskStatusClass(status))}</div>
        <div class="module-task-actions"><button class="btn ghost" data-toggle-module-task-log="${key}">${task.logOpen ? "收起记录" : "查看记录"}</button></div>
        ${note ? `<div class="module-task-note">${note}</div>` : ""}
        ${task.logOpen ? moduleTaskLogPanel(task, moduleKey) : ""}
      </article>`;
    }

    function moduleTaskDetailNote(moduleKey, task) {
      const files = task.files || [];
      const pieces = [];
      if (task.status === "已取消") pieces.push(`取消原因：${escapeHtml(task.cancelReason || "原因待补充")}`);
      if (task.status === "延期中") pieces.push(`延期原因：${escapeHtml(task.delayReason || "原因待补充")}`);
      if (task.status === "待审核") pieces.push(`已上传完成${task.submittedAt ? `，提交时间：${formatDate(task.submittedAt)}` : ""}`);
      if (task.status === "已完成" && moduleKey === "content") pieces.push("内容文档和备注已提交，任务已完成");
      if (task.reviewResult) pieces.push(`完成记录：${escapeHtml(task.reviewResult)}`);
      if (task.docNote) pieces.push(`备注：${escapeHtml(task.docNote)}`);
      if (files.length) pieces.push(`已上传：${files.map(escapeHtml).join("、")}`);
      return pieces.join("；");
    }

    function moduleTaskLogPanel(task, moduleKey) {
      const delayText = task.delayReason
        ? `${task.originalDue ? `原计划 ${formatDate(task.originalDue)}；` : ""}${task.delayDue ? `调整至 ${formatDate(task.delayDue)}；` : ""}${escapeHtml(task.delayReason)}`
        : task.status === "延期中"
          ? "原因待补充"
          : "暂无延期";
      const records = moduleTaskLogRecords(task, moduleKey);
      const recordHtml = records.length
        ? records.map(item => `<div class="module-task-log-item"><span>${item.meta}</span>${item.text}</div>`).join("")
        : `<div class="module-task-log-empty">暂无备忘或编辑记录</div>`;
      const fileHtml = (task.files || []).length
        ? task.files.map(name => `<span class="file-chip"><span class="file-chip-name">${escapeHtml(name)}</span></span>`).join("")
        : `<span class="module-task-log-empty">暂无上传附件</span>`;
      return `<div class="module-task-log">
        <div class="module-task-log-block"><strong>延期原因</strong><span class="module-task-log-text">${delayText}</span></div>
        <div class="module-task-log-block"><strong>备忘 / 编辑记录</strong>${recordHtml}</div>
        <div class="module-task-log-block"><strong>完成附件</strong><span class="task-observe-files">${fileHtml}</span></div>
      </div>`;
    }

    function moduleTaskLogRecords(task, moduleKey) {
      const records = [];
      if (task.memoHistory && task.memoHistory.length) {
        task.memoHistory.slice().reverse().forEach(item => records.push({
          meta: `${formatDate(item.time)} · ${escapeHtml(item.user || task.owner || "记录人")}`,
          text: escapeHtml(item.text)
        }));
      }
      if (task.docNote) {
        records.push({ meta: "完成备注", text: escapeHtml(task.docNote) });
      }
      if (task.reviewResult) {
        records.push({ meta: "完成记录", text: escapeHtml(task.reviewResult) });
      }
      if (task.statusHistory && task.statusHistory.length) {
        task.statusHistory.slice().reverse().forEach(item => records.push({
          meta: `${formatDate(item.time)} · 状态变更 · ${escapeHtml(item.user || "系统")}`,
          text: `${escapeHtml(item.from)} → ${escapeHtml(item.to)}${item.reason ? `；${escapeHtml(item.reason)}` : ""}`
        }));
      }
      if (task.feishuPushHistory && task.feishuPushHistory.length) {
