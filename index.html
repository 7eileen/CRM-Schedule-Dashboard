        <div class="stat stat-green"><div><strong>${done}</strong><span>已完成</span></div></div>
        <div class="stat stat-red"><div><strong>${delayed}</strong><span>延期中</span></div></div>
      </section>
      <section class="panel">
        <div class="panel-head"><div><h2 class="panel-title">${taskScopeTitle()}的达人专场任务</h2><div class="muted">已按${taskSortTitle()}排序</div></div>${badge(`${myItems.length} 条任务`, "orange")}</div>
        <div class="panel-body">
          ${myItems.length ? `<div class="my-task-list">${myItems.map(myTaskCard).join("")}</div>` : `<div class="upload"><div><strong>暂无任务</strong></div></div>`}
        </div>
      </section>`;
    }

    function scopedTaskItems() {
      const items = allDispatchTaskItems();
      const scopeModule = { contentLead: "content", editLead: "edit", adsLead: "ads" }[state.taskScope];
      if (scopeModule) return items.filter(item => item.moduleKey === scopeModule);
      if (state.taskScope === "manager") return items;
      return items.filter(item => item.task.owner === state.taskUser);
    }

    function taskScopeTitle() {
      const option = taskScopeOptions.find(item => item.id === state.taskScope);
      if (state.taskScope === "mine") return state.taskUser;
      if (state.taskScope === "contentLead") return "内容组长";
      if (state.taskScope === "editLead") return "剪辑组长";
      if (state.taskScope === "adsLead") return "投放组长";
      if (state.taskScope === "manager") return "管理者";
      return option ? option.label : state.taskUser;
    }

    function taskSortTitle() {
      const option = taskSortOptions.find(item => item.id === state.taskSort);
      return option ? option.label : "紧急程度优先";
    }

    function taskStatusFilterButton(key, label, count) {
      return `<button class="seg ${state.taskStatusFilter === key ? "active" : ""}" data-task-status-filter="${key}">${label} ${count}</button>`;
    }

    function filteredMyTaskItems(items) {
      const statusMap = {
        pending: "待处理",
        running: "进行中",
        reviewing: "待审核",
        done: "已完成",
        delayed: "延期中"
      };
      const keyword = state.taskSearch.trim().toLowerCase();
      return items.filter(item => {
        const statusMatched = state.taskStatusFilter === "all" || item.task.status === statusMap[state.taskStatusFilter];
        const moduleMatched = state.taskModuleFilter === "all" || item.moduleKey === state.taskModuleFilter;
        const searchText = [item.record.title, item.record.talent, item.record.uid, item.record.product, supportNeeds[item.moduleKey].title, item.task.title, item.task.status, item.task.owner, talentGrade(item.record)].join(" ").toLowerCase();
        return statusMatched && moduleMatched && (!keyword || searchText.includes(keyword));
      }).sort(taskCompareByMode);
    }

    function taskCompareByMode(a, b) {
      if (state.taskSort === "demandDate") return taskDemandCompare(a, b) || taskUrgencyCompare(a, b);
      if (state.taskSort === "grade") return taskGradeCompare(a, b) || taskDemandCompare(a, b);
      return taskUrgencyCompare(a, b);
    }

    function taskUrgencyCompare(a, b) {
      const gradeDelta = taskGradeCompare(a, b);
      if (gradeDelta) return gradeDelta;
      const dateDelta = taskDemandCompare(a, b);
      if (dateDelta) return dateDelta;
      return a.record.liveTime.localeCompare(b.record.liveTime);
    }

    function taskGradeCompare(a, b) {
      return gradeRank(talentGrade(a.record)) - gradeRank(talentGrade(b.record));
    }

    function taskDemandCompare(a, b) {
      return taskDemandDate(a).localeCompare(taskDemandDate(b));
    }

    function taskDemandDate(item) {
      return item.task.delayDue || item.task.due || item.record.liveTime.slice(0, 10);
    }

    function myTaskCard(item) {
      const { record, moduleKey, task, key } = item;
      const module = modules[moduleKey];
      const isContentTask = moduleKey === "content";
      const statusCls = taskStatusClass(task.status);
      const actionContent = task.status === "已完成"
        ? `<span class="muted">${isContentTask ? "内容文档已提交" : "负责人已审核通过"}</span>`
        : task.status === "待审核"
          ? `<span class="muted">等待${module.owner}审核</span>`
          : `<button class="btn ghost" data-delay-task="${key}">${task.status === "延期中" ? "继续编辑延期" : "延期"}</button><button class="btn primary" data-complete-task="${key}">${isContentTask ? "提交文档" : "提交完成"}</button>`;
      return `<article class="my-task-card">
        <div class="my-task-head">
          <div>
            <h3>${record.title}</h3>
            <div class="meta">${urgencyBadge(talentGrade(record))}<span>${record.talent}</span><span>${record.liveTime}</span><span>${record.product}</span>${badge(supportNeeds[moduleKey].title, module.cls)}</div>
          </div>
          ${badge(task.status, statusCls)}
        </div>
        <div class="my-task-body">
          <div class="row">
            <div>
              <div class="task-name">${task.title}</div>
              <div class="meta"><span>执行人：${task.owner}</span><span>组长：${module.owner}</span><span>需求时间：${formatDate(taskDemandDate(item))}</span>${task.submittedAt ? `<span>提交于：${formatDate(task.submittedAt)}</span>` : ""}${task.reviewedAt ? `<span>审核于：${formatDate(task.reviewedAt)}</span>` : ""}${task.rejectedAt ? `<span>驳回于：${formatDate(task.rejectedAt)}</span>` : ""}</div>
            </div>
          </div>
          <div class="task-note">${demandText(record, moduleKey)}</div>
          ${taskReviewNotice(task, module, moduleKey)}
          ${taskUpload(key, task, moduleKey)}
          ${isContentTask ? contentDocForm(key, record, task, module) : ""}
          ${task.delayEditing ? delayForm(key, task) : ""}
          <div class="my-task-actions">
            ${actionContent}
          </div>
        </div>
      </article>`;
    }

    function taskReviewNotice(task, module, moduleKey) {
      if (task.status === "待审核") {
        return `<div class="task-review-result is-reviewing">已提交给${module.owner}审核，负责人通过后任务才会进入已完成。</div>`;
      }
      if (task.rejectReason) {
        return `<div class="task-review-result is-rejected">驳回原因：${task.rejectReason}</div>`;
      }
      if (moduleKey === "content" && task.status === "已完成" && task.reviewResult === "无需审核") {
        return `<div class="task-review-result is-approved">内容文档和备注已提交，无需审核；文档仅按权限范围查看。</div>`;
      }
      if (task.status === "已完成" && task.reviewedAt) {
        return `<div class="task-review-result is-approved">${module.owner}已审核通过，本任务已闭环。</div>`;
      }
      return "";
    }

    function taskUpload(key, task, moduleKey) {
      const files = task.files || [];
      const isContentTask = moduleKey === "content";
      return `<div class="task-upload">
        <div class="task-upload-main">
          <span class="task-upload-title">${isContentTask ? "内容文档" : "完成文件"}</span>
          <span class="task-files">${files.length ? files.map((name, index) => `<span class="file-chip"><span class="file-chip-name">${name}</span><button class="file-remove" data-remove-task-file="${key}:${index}" aria-label="删除${name}">x</button></span>`).join("") : `<span class="muted">未上传文件</span>`}</span>
        </div>
        <label class="task-upload-btn">
          ${isContentTask ? "上传内容文档" : "上传完成文件"}
          <input type="file" multiple data-task-upload="${key}">
        </label>
      </div>`;
    }

    function contentDocForm(key, record, task, module) {
      const isDone = task.status === "已完成";
      return `<div class="content-doc-flow">
        <label class="content-doc-note">
          <span>编导备注信息</span>
          <textarea data-task-doc-note="${key}" placeholder="填写文档链接、脚本说明或交付备注" ${isDone ? "disabled" : ""}>${escapeHtml(task.docNote || "")}</textarea>
        </label>
        <div class="doc-permission-note">
          <strong>文档权限</strong>
          <span>仅${escapeHtml(task.owner)} / ${escapeHtml(record.business || "负责商务")} / ${escapeHtml(module.owner)}可查看，其他商务不可查看。</span>
        </div>
      </div>`;
    }

    function delayForm(key, task) {
      return `<div class="delay-form">
        <label class="task-field"><span>新的完成时间</span><input class="input" type="date" value="${task.delayDue || task.due}" data-delay-due="${key}"></label>
        <label class="task-field"><span>延期原因</span><input class="input" value="${task.delayReason || ""}" placeholder="填写无法按期完成的原因" data-delay-reason="${key}"></label>
        <div class="delay-form-actions"><button class="btn ghost" data-cancel-delay="${key}">取消</button><button class="btn primary" data-save-delay="${key}">保存延期</button></div>
      </div>`;
    }

    function pageDataCenter() {
      const items = filteredDataItems();
      const total = items.length;
      const done = items.filter(item => item.task.status === "已完成").length;
      const delayed = items.filter(item => item.task.status === "延期中").length;
      const pending = total - done;
      const rate = total ? Math.round(done / total * 100) : 0;
      return `${dataCenterTabs()}
      ${state.dataCenterTab === "specialStats" ? monthlySpecialStatsPanel() : dataBlockDashboard(items, total, done, delayed, pending, rate)}`;
    }

    function dataCenterTabs() {
      return `<div class="data-center-tabs">
        <button class="data-center-tab ${state.dataCenterTab === "specialStats" ? "active" : ""}" data-data-center-tab="specialStats">专场统计</button>
        <button class="data-center-tab ${state.dataCenterTab === "dataBlocks" ? "active" : ""}" data-data-center-tab="dataBlocks">数据板块</button>
      </div>`;
    }

    function dataBlockDashboard(items, total, done, delayed, pending, rate) {
      return `<section class="stats">
        <button class="stat stat-orange is-clickable" data-action="openTaskDetails"><div><strong>${total}</strong><span>任务总数</span></div></button>
        <button class="stat stat-green is-clickable" data-action="openCompletedSpecials"><div><strong>${done}</strong><span>已完成</span></div></button>
        <div class="stat stat-blue"><div><strong>${rate}%</strong><span>完成率</span></div></div>
        <div class="stat stat-red"><div><strong>${delayed}</strong><span>延期中</span></div></div>
      </section>
      <section class="analysis-grid support-analysis-grid">
        <div class="panel">
          <div class="panel-head"><h2 class="panel-title">支持类型完成情况</h2>${badge(`${pending} 待处理`, pending ? "orange" : "green")}</div>
          <div class="panel-body">${moduleCompletionBars(items)}</div>
        </div>
      </section>
      ${dataToolbar()}
      <section class="data-block-stack">
        ${dataMetricTabs()}
        ${dataMetricPanel()}
      </section>`;
    }

    function dataMetricTabs() {
      const tabs = [
        { id: "special", label: "专场达标率" },
        { id: "ads", label: "投放预估达标率" },
        { id: "member", label: "成员承接达标率" }
      ];
      return `<div class="data-center-tabs data-metric-tabs">
        ${tabs.map(tab => `<button class="data-center-tab ${state.dataMetricTab === tab.id ? "active" : ""}" data-data-metric-tab="${tab.id}">${tab.label}</button>`).join("")}
      </div>`;
    }

    function dataMetricPanel() {
      if (state.dataMetricTab === "ads") return adsForecastPanel();
      if (state.dataMetricTab === "member") return teamAchievementPanel();
      return specialAchievementPanel();
    }

    function dataRangeModeTitle() {
      return state.dataRangeMode === "week" ? "周度承接" : "月度承接";
    }

    function dataRangeOptions() {
      if (state.dataRangeMode === "week") {
        return [
          { label: "本周", start: "2026-06-22", end: "2026-06-28" },
          { label: "上周", start: "2026-06-15", end: "2026-06-21" },
          { label: "06/08 - 06/14", start: "2026-06-08", end: "2026-06-14" },
          { label: "06/02 - 06/08", start: "2026-06-02", end: "2026-06-08" }
        ];
      }
      return [
        { label: "2026年06月", start: "2026-06-01", end: "2026-06-30" },
        { label: "2026年05月", start: "2026-05-01", end: "2026-05-31" },
        { label: "全部", start: "2026-05-01", end: "2026-06-30" }
      ];
    }

    function dataRangePanel() {
      const options = dataRangeOptions();
      return `<div class="data-range-panel">
        <div class="data-range-tabs">
          <button class="data-range-tab ${state.dataRangeMode === "week" ? "active" : ""}" data-data-range-mode="week">周度承接</button>
          <button class="data-range-tab ${state.dataRangeMode === "month" ? "active" : ""}" data-data-range-mode="month">月度承接</button>
        </div>
        <div class="data-range-list">
          ${options.map(option => {
            const active = state.dataStart === option.start && state.dataEnd === option.end;
            return `<button class="data-range-option ${active ? "active" : ""}" data-data-range-option="${option.start}|${option.end}">
              <span>${option.label}</span>
              <em>${formatDate(option.start)} - ${formatDate(option.end)}</em>
            </button>`;
          }).join("")}
        </div>
      </div>`;
    }

    function dataToolbar() {
      return `<section class="panel data-filter-panel">
        <div class="panel-body">
          <div class="data-toolbar">
            <div class="filter-field data-range-field">
              <div class="data-range-picker">
                <div class="data-range-combo">
                  <button class="data-range-kind" data-data-range-toggle>
                    <span>上传时间</span><i>⌄</i>
                  </button>
                  <button class="data-range-trigger data-range-box ${state.dataRangeOpen ? "active" : ""}" data-data-range-toggle aria-label="${dataRangeModeTitle()} ${formatDate(state.dataStart)} 至 ${formatDate(state.dataEnd)}">
                    <span class="range-clock">◷</span>
                    <strong>${formatDate(state.dataStart)}</strong>
                    <em>-</em>
                    <strong>${formatDate(state.dataEnd)}</strong>
                  </button>
                  ${state.dataRangeOpen ? dataRangePanel() : ""}
                </div>
              </div>
            </div>
            <label class="filter-field"><span>支持类型</span><select class="select" data-data-module><option value="all">全部</option>${moduleOrder.map(key => `<option value="${key}" ${state.dataModule === key ? "selected" : ""}>${supportNeeds[key].title}</option>`).join("")}</select></label>
            <label class="filter-field"><span>成员</span><select class="select" data-data-member><option value="all">全部</option>${ownersWithTasks(allDispatchTaskItems()).map(owner => `<option ${state.dataMember === owner ? "selected" : ""}>${owner}</option>`).join("")}</select></label>
            <label class="filter-field"><span>状态</span><select class="select" data-data-status>${["all:全部", "待处理:待处理", "进行中:进行中", "待审核:待审核", "延期中:延期中", "已完成:已完成"].map(item => { const [value, label] = item.split(":"); return `<option value="${value}" ${state.dataStatus === value ? "selected" : ""}>${label}</option>`; }).join("")}</select></label>
          </div>
        </div>
      </section>`;
    }

    function monthlySpecialStatsPanel() {
      const rows = monthlySpecialRows();
      const stats = monthlySpecialStats(rows);
      const businessOptions = monthlyBusinessOptions();
      const typeOptions = monthlyTypeOptions();
      const productOptionsForFilter = monthlyProductOptions();
      return `<section class="panel monthly-special-panel">
        <div class="panel-head">
          <div><h2 class="panel-title">月度专场统计</h2></div>
          <div class="row">${badge("商务可查看", "green")}<span class="data-note">统计已完成和未完成专场</span></div>
        </div>
        <div class="panel-body">
          <div class="monthly-toolbar">
            <label class="filter-field"><span>统计月份</span><input class="input" type="month" value="${state.monthlyMonth}" data-monthly-month></label>
            <label class="filter-field"><span>负责商务</span><select class="select" data-monthly-business><option value="all">全部</option>${businessOptions.map(value => `<option value="${value}" ${state.monthlyBusiness === value ? "selected" : ""}>${value}</option>`).join("")}</select></label>
            <label class="filter-field"><span>状态</span><select class="select" data-monthly-status>${["all:全部", "done:已完成", "unfinished:未完成", "delayed:已延期", "canceled:已取消"].map(item => { const [value, label] = item.split(":"); return `<option value="${value}" ${state.monthlyStatus === value ? "selected" : ""}>${label}</option>`; }).join("")}</select></label>
            <label class="filter-field"><span>类型</span><select class="select" data-monthly-type><option value="all">全部</option>${typeOptions.map(value => `<option value="${value}" ${state.monthlyType === value ? "selected" : ""}>${value}</option>`).join("")}</select></label>
            <label class="filter-field"><span>主推产品</span><select class="select" data-monthly-product><option value="all">全部</option>${productOptionsForFilter.map(value => `<option value="${value}" ${state.monthlyProduct === value ? "selected" : ""}>${value}</option>`).join("")}</select></label>
            <button class="btn primary" data-action="downloadMonthlyReport">导出月报</button>
          </div>
          <div class="monthly-summary">
            <div class="stat stat-orange"><div><strong>${stats.total}</strong><span>本月专场总数</span></div></div>
            <div class="stat stat-green"><div><strong>${stats.done}</strong><span>已完成</span></div></div>
            <div class="stat stat-blue"><div><strong>${stats.unfinished}</strong><span>未完成</span></div></div>
            <div class="stat stat-red"><div><strong>${stats.delayed}</strong><span>已延期</span></div></div>
            <div class="stat"><div><strong>${stats.canceled}</strong><span>已取消</span></div></div>
            <div class="stat stat-blue"><div><strong>${stats.rate}%</strong><span>完成率</span></div></div>
          </div>
          <div class="table-wrap">${monthlySpecialTable(rows)}</div>
        </div>
      </section>`;
    }

    function monthlySpecialRows() {
      return records
        .filter(record => record.liveTime && record.liveTime.slice(0, 7) === state.monthlyMonth)
        .map(record => ({ record, status: monthlySpecialStatus(record), reason: monthlyUnfinishedReason(record) }))
        .filter(item => {
          const record = item.record;
          const businessMatched = state.monthlyBusiness === "all" || (record.business || "待填写") === state.monthlyBusiness;
          const statusMatched = state.monthlyStatus === "all"
            || item.status.key === state.monthlyStatus
            || (state.monthlyStatus === "unfinished" && item.status.countsAsUnfinished);
          const typeMatched = state.monthlyType === "all" || (record.type || "专场") === state.monthlyType;
          const productMatched = state.monthlyProduct === "all" || record.product === state.monthlyProduct;
          return businessMatched && statusMatched && typeMatched && productMatched;
        })
        .sort((a, b) => a.record.liveTime.localeCompare(b.record.liveTime));
    }

    function monthlySpecialStats(rows) {
      const total = rows.length;
      const done = rows.filter(item => item.status.key === "done").length;
      const delayed = rows.filter(item => item.status.key === "delayed").length;
      const canceled = rows.filter(item => item.status.key === "canceled").length;
      const unfinished = rows.filter(item => item.status.countsAsUnfinished).length;
      const denominator = total - canceled;
      return { total, done, unfinished, delayed, canceled, rate: denominator ? Math.round(done / denominator * 100) : 0 };
    }

    function monthlySpecialStatus(record) {
      const rawStatus = record.scheduleStatus || record.status || "未完成";
      if (rawStatus === "已取消") return { key: "canceled", label: "已取消", cls: "canceled", countsAsUnfinished: false };
      if (rawStatus === "已延期" || rawStatus.includes("延期") || recordDelayedTask(record)) return { key: "delayed", label: "已延期", cls: "delayed", countsAsUnfinished: true };
      if (record.completedDate || rawStatus === "待复盘" || rawStatus === "已完成" || Number.isFinite(attainmentRate(record))) {
        return { key: "done", label: "已完成", cls: "done", countsAsUnfinished: false };
      }
      return { key: "unfinished", label: "未完成", cls: "pending", countsAsUnfinished: true };
    }

    function monthlyUnfinishedReason(record) {
      const status = monthlySpecialStatus(record);
      if (status.key === "done") return "已完成，等待或已进入复盘";
      if (status.key === "canceled") return record.cancelReason || "已取消，取消原因待补充";
      const delayedTask = recordDelayedTask(record);
      if (status.key === "delayed") return delayedTask?.task.delayReason || "已延期，新的排期或延期原因待补充";
      const rawStatus = record.scheduleStatus || record.status || "";
      if (rawStatus === "待识别") return "需求待识别，尚未进入完整派工";
      if (rawStatus === "派工中") return "支持任务派工中，实际销售额待回填";
      if (rawStatus === "已排期") return "已排期，等待直播执行和数据回填";
      if (!Number.isFinite(gmvAmount(record.actualGmv))) return "实际销售额待回填";
      return "流程未闭环，原因待补充";
    }

    function monthlySpecialTable(rows) {
      if (!rows.length) return `<div class="upload"><div><strong>当前筛选暂无专场</strong></div></div>`;
      return `<table><colgroup><col style="width:7%"><col style="width:7%"><col style="width:11%"><col style="width:7%"><col style="width:7%"><col style="width:6%"><col style="width:11%"><col style="width:7%"><col style="width:7%"><col style="width:6%"><col style="width:16%"><col style="width:8%"></colgroup>
        <thead><tr><th>达人UID</th><th>达人昵称</th><th>专场时间</th><th>负责商务</th><th>状态</th><th>类型</th><th>主推产品</th><th>目标销售额</th><th>实际销售额</th><th>达标率</th><th>子任务负责人</th><th>未完成原因</th></tr></thead>
        <tbody>${rows.map(item => {
          const record = item.record;
          return `<tr><td>${record.uid}</td><td><strong>${record.talent}</strong></td><td>${record.liveTime}</td><td>${record.business || "待填写"}</td><td><span class="monthly-status ${item.status.cls}">${item.status.label}</span></td><td>${record.type || "专场"}</td><td><strong>${record.product}</strong></td><td>${record.expectedGmv || record.sales}</td><td>${record.actualGmv || "待回填"}</td><td>${ratePill(attainmentRate(record))}</td><td>${monthlyTaskBreakdownCell(record)}</td><td>${item.reason}</td></tr>`;
        }).join("")}</tbody></table>`;
    }

    function monthlyTaskBreakdown(record) {
      const recordTasks = dispatchTasks[record.id] || {};
      const rows = [];
      moduleOrder.forEach(moduleKey => {
        const assignment = assignmentFor(record.id, moduleKey);
        const taskList = recordTasks[moduleKey] && recordTasks[moduleKey].length
          ? recordTasks[moduleKey]
          : [{ title: taskTemplates[moduleKey][0], owner: assignment.owner, due: assignment.due, status: assignment.status }];
        taskList.forEach(task => {
          rows.push({
            module: supportNeeds[moduleKey].title,
            title: task.title || taskTemplates[moduleKey][0],
            owner: task.owner || assignment.owner || "待分配",
            status: task.status || assignment.status || "待处理"
          });
        });
      });
      return rows;
    }

    function monthlyTaskBreakdownCell(record) {
      const rows = monthlyTaskBreakdown(record);
      if (!rows.length) return `<span class="muted">暂无子任务</span>`;
      return `<div class="monthly-task-list">${rows.map(row => {
        const cls = taskStatusClass(row.status);
        return `<div class="monthly-task-row">
          <span class="monthly-task-module">${escapeHtml(row.module)}</span>
          <span class="monthly-task-main"><strong title="${escapeHtml(row.title)}">${escapeHtml(row.title)}</strong><em>${escapeHtml(row.owner)}</em></span>
          <span class="monthly-task-state ${cls}">${escapeHtml(row.status)}</span>
        </div>`;
      }).join("")}</div>`;
    }

    function monthlyTaskBreakdownText(record) {
      const rows = monthlyTaskBreakdown(record);
      return rows.length
        ? rows.map(row => `${row.module}-${row.title}-${row.owner}-${row.status}`).join("；")
        : "暂无子任务";
    }

    function recordDelayedTask(record) {
      const recordTasks = dispatchTasks[record.id] || {};

    function filteredSpecialRecords() {

    function adsOwnerFor(record) {
      const adsTasks = dispatchTasks[record.id]?.ads || [];
      return adsTasks.find(task => task.owner && task.owner !== "待分配")?.owner || dispatchAssignments[record.id]?.ads?.owner || "待分配";
    }

    function attainmentRate(record, actualKey = "actualGmv") {
      const target = gmvAmount(record.expectedGmv || record.sales);
      const actual = gmvAmount(record[actualKey]);
      if (!target || !actual) return null;
      return Math.round(actual / target * 100);
    }

    function averageRate(rates) {
      const validRates = rates.filter(rate => Number.isFinite(rate));
      if (!validRates.length) return null;
      return Math.round(validRates.reduce((sum, rate) => sum + rate, 0) / validRates.length);
    }

    function gmvAmount(value) {
      const text = String(value || "");
      const match = text.match(/[\d.]+/);
      if (!match) return null;
      const base = Number(match[0]);
      if (!Number.isFinite(base)) return null;
      return text.includes("亿") ? base * 10000 : base;
    }

    function ratePill(rate) {
      if (!Number.isFinite(rate)) return `<span class="rate-pill">待回填</span>`;
      const cls = rate >= 100 ? "green" : rate >= 90 ? "blue" : rate >= 80 ? "orange" : "red";
      return `<span class="rate-pill ${cls}">${rate}%</span>`;
    }

    function inDateRange(date, start, end) {
      return date && date >= start && date <= end;
    }

    function filteredDataItems() {
      return allDispatchTaskItems().filter(item => {
        const date = taskDataDate(item.task);
        const inRange = date >= state.dataStart && date <= state.dataEnd;
        const moduleMatched = state.dataModule === "all" || item.moduleKey === state.dataModule;
        const memberMatched = state.dataMember === "all" || item.task.owner === state.dataMember;
        const statusMatched = state.dataStatus === "all" || item.task.status === state.dataStatus;
        return inRange && moduleMatched && memberMatched && statusMatched;
      });
    }

    function taskDataDate(task) {
      return task.completedAt || task.reviewedAt || task.submittedAt || task.delayDue || task.due || "2026-06-01";
    }

    function ownersWithTasks(items) {

    function bind() {
      document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", () => { state.view = btn.dataset.view; render(); }));
      document.querySelectorAll("[data-go]").forEach(btn => btn.addEventListener("click", () => { state.view = btn.dataset.go; render(); }));
      document.querySelectorAll("[data-open-project]").forEach(btn => btn.addEventListener("click", () => { state.selected = btn.dataset.openProject; state.view = "detail"; render(); }));
      document.querySelectorAll("[data-record]").forEach(btn => btn.addEventListener("click", () => { state.selected = btn.dataset.record; render(); }));
      document.querySelectorAll("[data-list-filter]").forEach(btn => btn.addEventListener("click", () => { state.listFilter = btn.dataset.listFilter; render(); }));
      document.querySelectorAll("[data-list-month]").forEach(input => input.addEventListener("change", () => {
        state.listMonth = input.value;
        const range = monthRange(input.value);
        state.listStart = range.start;
        state.listEnd = range.end;
        const option = listRangeOptions().find(item => item.start === range.start && item.end === range.end);
        state.listRangePreset = option ? option.key : "custom";
        state.listRangeOpen = false;
        state.listFilter = "all";
        state.calendarExpandedDay = "";
        render();
      }));
      document.querySelectorAll("[data-list-range-toggle]").forEach(btn => btn.addEventListener("click", () => {
        state.listRangeOpen = !state.listRangeOpen;
        render();
      }));
      document.querySelectorAll("[data-list-range-option]").forEach(btn => btn.addEventListener("click", () => {
        const option = listRangeOptions().find(item => item.key === btn.dataset.listRangeOption);
        if (!option) return;
        state.listStart = option.start;
        state.listEnd = option.end;
        state.listRangePreset = option.key;
        state.listMonth = option.start.slice(0, 7);
        state.listRangeOpen = false;
        state.listFilter = "all";
        state.calendarExpandedDay = "";
        render();
      }));
      document.querySelectorAll("[data-calendar-toggle]").forEach(btn => btn.addEventListener("click", () => {
        state.calendarOpen = !state.calendarOpen;
        if (!state.calendarOpen) state.calendarExpandedDay = "";
        render();
      }));
      document.querySelectorAll("[data-calendar-day-toggle]").forEach(btn => btn.addEventListener("click", () => {
        state.calendarExpandedDay = state.calendarExpandedDay === btn.dataset.calendarDayToggle ? "" : btn.dataset.calendarDayToggle;
        render();
      }));
      document.querySelectorAll("[data-list-search]").forEach(input => input.addEventListener("input", () => {
        const cursor = input.selectionStart;
        state.listSearch = input.value;
        render();
        const next = document.querySelector("[data-list-search]");
        if (next) {
          next.focus();
          next.setSelectionRange(cursor, cursor);
        }
      }));
      document.querySelectorAll("[data-module]").forEach(btn => btn.addEventListener("click", () => { state.module = btn.dataset.module; state.dispatchOpen = ""; if (btn.dataset.go) state.view = btn.dataset.go; render(); }));
      document.querySelectorAll("[data-need]").forEach(btn => btn.addEventListener("click", () => openNeed(btn.dataset.need)));
      document.querySelectorAll("[data-task]").forEach(btn => btn.addEventListener("click", () => openTask(btn.dataset.task)));
      document.querySelectorAll("[data-task-done]").forEach(input => input.addEventListener("change", () => toggleTask(input.dataset.taskDone, input.checked)));
      document.querySelectorAll("[data-node-detail]").forEach(btn => btn.addEventListener("click", () => openNode(btn.dataset.nodeDetail)));
      document.querySelectorAll("[data-toggle-dispatch]").forEach(btn => btn.addEventListener("click", () => {
        state.dispatchOpen = state.dispatchOpen === btn.dataset.toggleDispatch ? "" : btn.dataset.toggleDispatch;
        render();
      }));
      document.querySelectorAll("[data-subtask-title]").forEach(input => input.addEventListener("input", () => {
        const [recordId, moduleKey, index] = input.dataset.subtaskTitle.split(":");
        tasksFor(recordId, moduleKey)[Number(index)].title = input.value;
      }));
      document.querySelectorAll("[data-subtask-owner]").forEach(input => input.addEventListener("change", () => {
        const [recordId, moduleKey, index] = input.dataset.subtaskOwner.split(":");
        tasksFor(recordId, moduleKey)[Number(index)].owner = input.value;
      }));
      document.querySelectorAll("[data-subtask-due]").forEach(input => input.addEventListener("change", () => {
        const [recordId, moduleKey, index] = input.dataset.subtaskDue.split(":");
        tasksFor(recordId, moduleKey)[Number(index)].due = input.value;
      }));
      document.querySelectorAll("[data-add-subtask]").forEach(btn => btn.addEventListener("click", () => addDispatchTask(btn.dataset.addSubtask)));
      document.querySelectorAll("[data-remove-subtask]").forEach(btn => btn.addEventListener("click", () => removeDispatchTask(btn.dataset.removeSubtask)));
      document.querySelectorAll("[data-assign-owner]").forEach(input => input.addEventListener("change", () => {
        const [recordId, moduleKey] = input.dataset.assignOwner.split(":");
        assignmentFor(recordId, moduleKey).owner = input.value;
      }));
      document.querySelectorAll("[data-assign-due]").forEach(input => input.addEventListener("change", () => {
        const [recordId, moduleKey] = input.dataset.assignDue.split(":");
        assignmentFor(recordId, moduleKey).due = input.value;
      }));
      document.querySelectorAll("[data-publish-dispatch]").forEach(btn => btn.addEventListener("click", () => publishDispatch(btn.dataset.publishDispatch)));
      document.querySelectorAll("[data-detail-support-toggle]").forEach(input => input.addEventListener("change", () => {
        supportNeeds[input.dataset.detailSupportToggle].enabled = input.checked;
        render();
      }));
      document.querySelectorAll("[data-special-detail]").forEach(input => {
        const updateSpecialDetail = event => {
          const [groupIndex, fieldIndex] = input.dataset.specialDetail.split(":").map(Number);
          const field = specialDetailGroups[groupIndex].fields[fieldIndex];
          field.value = input.type === "datetime-local" ? input.value.replace("T", " ") : input.value;
          if (field.label === "是否有达人美颜参数习惯？") {
            const params = detailGroupField(groupIndex, "美颜参数说明");
            if (params && field.value === "否") params.value = "无";
            if (params && field.value === "是" && params.value === "无") params.value = "";
          }
          if (["是否需要拍剪", "是否有达人美颜参数习惯？", "有无种草星图单"].includes(field.label) || (field.label === "目标销售额" && event.type === "change")) {
            render();
          }
        };
        input.addEventListener("input", updateSpecialDetail);
        input.addEventListener("change", updateSpecialDetail);
      });
      document.querySelectorAll("[data-special-detail-range]").forEach(input => {
        const updateSpecialDetailRange = () => {
          const [groupIndex, fieldIndex] = input.dataset.specialDetailRange.split(":").map(Number);
          const row = input.closest(".time-range-row");
          const start = row.querySelector('[data-range-part="start"]').value;
          const end = row.querySelector('[data-range-part="end"]').value;
          specialDetailGroups[groupIndex].fields[fieldIndex].value = start && end ? `${start}-${end}` : [start, end].filter(Boolean).join("-");

    function addDispatchTask(key) {
      const [recordId, moduleKey] = key.split(":");
      const list = tasksFor(recordId, moduleKey);
      const templates = taskTemplates[moduleKey];
      const template = templates[list.length % templates.length];
      list.push({
        title: template,
        owner: moduleMembers[moduleKey][0],
        due: dispatchDue(recordId, moduleKey)
      });
      state.dispatchOpen = key;
      render();
    }

    function removeDispatchTask(key) {
      const [recordId, moduleKey, index] = key.split(":");
      const list = tasksFor(recordId, moduleKey);
      list.splice(Number(index), 1);
      syncAssignmentStatus(recordId, moduleKey);
      state.dispatchOpen = `${recordId}:${moduleKey}`;
      toast("已删除该条任务");
      render();
    }

    function taskByKey(key) {
      const [recordId, moduleKey, index] = key.split(":");
      return tasksFor(recordId, moduleKey)[Number(index)];
    }

    function uploadTaskFiles(key, fileList) {
      const task = taskByKey(key);
      if (!task) return;
      const [, moduleKey] = key.split(":");
      const names = Array.from(fileList || []).map(file => file.name).filter(Boolean);
      if (!names.length) return;
      task.files = [...(task.files || []), ...names];
      toast(moduleKey === "content" ? "内容文档已上传" : "完成文件已上传");
      render();
    }

    function removeTaskFile(fileKey) {
      const parts = fileKey.split(":");
      const fileIndex = Number(parts.pop());
      const task = taskByKey(parts.join(":"));
      if (!task || !task.files || Number.isNaN(fileIndex)) return;
      task.files.splice(fileIndex, 1);
      toast("已删除上传文件");
      render();
    }

    function uploadEntryDocs(fileList) {
      const files = Array.from(fileList || []).filter(file => file.name);
      if (!files.length) return;
      const docs = files.map((file, index) => ({
        id: `DOC-${Date.now()}-${index}-${Math.random().toString(36).slice(2, 7)}`,
        name: file.name,
        size: file.size || 0,
        type: fileExt(file.name)
      }));
      state.entryDocs = [...(state.entryDocs || []), ...docs];
      toast(`已上传 ${docs.length} 个文档`);
      render();
    }

    function removeEntryDoc(id) {
      const before = state.entryDocs.length;
      state.entryDocs = state.entryDocs.filter(file => file.id !== id);
      if (state.entryDocs.length !== before) toast("已删除上传文档");
      render();
    }

    function fileExt(name) {
      const ext = String(name || "").split(".").pop();
      return ext && ext !== name ? ext.toUpperCase() : "本地文件";
    }

    function formatFileSize(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return "大小未知";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 102.4) / 10} KB`;
      return `${Math.round(bytes / 1024 / 102.4) / 10} MB`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function completeMyTask(key) {
      const task = taskByKey(key);
      const [, moduleKey] = key.split(":");
      if (!task) return;
      if (!task.files || !task.files.length) {
        toast(moduleKey === "content" ? "请先上传内容文档" : "请先上传完成文件");
        return;
      }
      if (moduleKey === "content") {
        if (!(task.docNote || "").trim()) {
          toast("请先填写编导备注信息");
          return;
        }
        task.status = "已完成";
        task.submittedAt = actionDate;
        task.completedAt = actionDate;
        task.reviewResult = "无需审核";
        delete task.reviewedAt;
        delete task.rejectedAt;
        delete task.rejectReason;
        delete task.delayEditing;
        task.reviewComment = "";
        syncAssignmentStatusFromTaskKey(key);
        toast("内容文档已提交并完成");
        render();
        return;
      }
      task.status = "待审核";
      task.submittedAt = actionDate;
      delete task.completedAt;
      delete task.reviewedAt;
      delete task.reviewResult;
      delete task.rejectedAt;
      delete task.rejectReason;
      delete task.delayEditing;
      task.reviewComment = "";
      syncAssignmentStatusFromTaskKey(key);
      toast("已提交负责人审核");
      render();
    }

    function approveTask(key) {
      const task = taskByKey(key);
      if (!task) return;
      task.status = "已完成";
      task.completedAt = actionDate;
      task.reviewedAt = actionDate;
      task.reviewResult = "通过";
      delete task.rejectReason;
      delete task.rejectedAt;
      task.reviewComment = "";
      syncAssignmentStatusFromTaskKey(key);
      toast("审核通过，任务已完成");
      render();
    }

    function rejectTask(key) {
      const task = taskByKey(key);
      if (!task) return;
      const reason = (task.reviewComment || "").trim();
      if (!reason) {
        toast("请先填写驳回原因");
        return;
      }
      task.status = "进行中";
      task.rejectReason = reason;
      task.rejectedAt = actionDate;
      delete task.completedAt;
      delete task.reviewedAt;
      delete task.reviewResult;
      task.reviewComment = "";
      syncAssignmentStatusFromTaskKey(key);
      toast("已驳回，任务退回组员修改");
      render();
    }

    function syncAssignmentStatusFromTaskKey(key) {
      const [recordId, moduleKey] = key.split(":");
      syncAssignmentStatus(recordId, moduleKey);
    }

    function syncAssignmentStatus(recordId, moduleKey) {
      const list = tasksFor(recordId, moduleKey);
      const assignment = assignmentFor(recordId, moduleKey);
      assignment.due = dispatchDue(recordId, moduleKey);
      if (!list.length) {
        assignment.status = "待派发";
        return;
      }
      if (list.every(task => task.status === "已完成")) {
        assignment.status = "已完成";
        return;
      }
      if (list.some(task => task.status === "待审核")) {
        assignment.status = "待审核";
        return;
      }
      if (list.some(task => task.status === "延期中")) {
        assignment.status = "延期中";
        return;
      }
      if (assignment.status !== "待派发") assignment.status = "已派发";
    }

    function startDelayTask(key) {
      const task = taskByKey(key);
      if (!task) return;
      if (!task.delayEditing) {
        task.delayBackup = {
          status: task.status,
          due: task.due,
          originalDue: task.originalDue,
          delayDue: task.delayDue,
          delayReason: task.delayReason
        };
      }
      task.delayEditing = true;
      task.status = "延期中";
      task.originalDue = task.originalDue || task.due;
      task.delayDue = task.delayDue || task.due;
      task.delayReason = task.delayReason || "";
      syncAssignmentStatusFromTaskKey(key);
      render();
    }

    function cancelDelayTask(key) {
      const task = taskByKey(key);
      if (!task) return;
      if (task.delayBackup) {
        task.status = task.delayBackup.status;
        task.due = task.delayBackup.due;
        task.originalDue = task.delayBackup.originalDue;
        task.delayDue = task.delayBackup.delayDue;
        task.delayReason = task.delayBackup.delayReason;
      }
      delete task.delayEditing;
      delete task.delayBackup;
      syncAssignmentStatusFromTaskKey(key);
      toast("已取消延期编辑");
      render();
    }

    function saveDelayTask(key) {
      const task = taskByKey(key);
      if (!task) return;
      if (!task.delayDue || !task.delayReason.trim()) {
        toast("请填写新的完成时间和延期原因");
        return;
      }
      task.due = task.delayDue;
      task.status = "延期中";
      delete task.delayEditing;
      delete task.delayBackup;
      syncAssignmentStatusFromTaskKey(key);
      toast("延期信息已回填");
      render();
    }

    function publishDispatch(key) {
      const [recordId, moduleKey] = key.split(":");
      const assignment = assignmentFor(recordId, moduleKey);
      const taskList = tasksFor(recordId, moduleKey);
      assignment.status = "已派发";
      assignment.owner = taskList[0]?.owner || assignment.owner;
      assignment.due = dispatchDue(recordId, moduleKey);
      const record = records.find(item => item.id === recordId);
      if (record && record.status === "待识别") record.status = "派工中";
      toast(`已发布${supportNeeds[moduleKey].title} ${taskList.length} 条任务`);
      render();
    }

          progress: 25,

        });
        state.selected = newId;
        state.module = "content";
        state.view = "dispatch";
        toast("需求已发布，进入支持组派工");
        render();

      }
      if (name === "runAnalysis") toast("已重新识别字段，并刷新四类需求判断");
      if (name === "archive") toast("复盘报告已生成");
      if (name === "openTaskDetails") {

    function downloadOrders() {
      const rows = completedSpecialRows();
      if (!rows.length) {
        toast("当前时间范围内暂无可下载订单");
        return;
      }
      const headers = ["完成日期", "专场名", "达人名称", "达人UID", "跟进商务", "预计GMV", "实际GMV", "子任务负责人"];
      const csvRows = rows.map(row => [formatDate(row.date), row.title, row.talent, row.uid, row.business, row.expectedGmv, row.actualGmv, row.taskOwners || "暂无子任务"]);

      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `达人专场订单_${state.dataStart}_${state.dataEnd}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();

        return [
          record.uid,
          record.talent,
          record.liveTime,
          record.business || "待填写",
          item.status.label,
          record.type || "专场",

          item.reason
        ];
      });
      const csv = [headers, ...csvRows].map(row => row.map(csvCell).join(",")).join("\n");

      const url = URL.createObjectURL(blob);

    function csvCell(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    function specialValue(label, fallback = "") {
      const infoGroup = specialDetailGroups.find(group => group.title === "专场信息");
      const item = infoGroup ? infoGroup.fields.find(field => field.label === label) : null;
      return item ? item.value : fallback;
    }

    function specialGroupValue(groupTitle, label, fallback = "") {
      const group = specialDetailGroups.find(item => item.title === groupTitle);
      const field = group ? group.fields.find(item => item.label === label) : null;
      return field ? field.value : fallback;
    }

    function entryRequiredErrors() {
      const errors = [];
      specialDetailGroups.forEach((group, groupIndex) => {
        if (group.supportKey && !supportNeeds[group.supportKey].enabled) return;
        group.fields.forEach(field => {
          if (!field.required || field.type === "computed-shot-count" || !shouldShowDetailField(groupIndex, field)) return;
          if (!String(field.value ?? "").trim()) errors.push(field.label);
        });
      });
      const needShoot = specialGroupValue("剪辑支持", "是否需要拍剪");
      const beautyHabit = specialGroupValue("剪辑支持", "是否有达人美颜参数习惯？");
      const beautyParams = specialGroupValue("剪辑支持", "美颜参数说明");
      if (supportNeeds.edit.enabled && needShoot === "是" && beautyHabit === "是" && (!String(beautyParams || "").trim() || beautyParams === "无")) {
        errors.push("美颜参数说明");
      }
      return errors;
    }

      const node = projectTaskRecords(record).find(item => item.id === id);
      if (!node) return;
      openDrawer(node.name, `<div class="stack">
        ${field("所属专场", record.title)}
        ${field("支持模块", node.moduleName)}
        ${field("模块负责人", node.moduleOwner)}
        ${field("执行组员", node.owner)}
        ${field("计划完成", formatDate(node.fullDate))}
        ${field("任务说明", node.note)}
        ${field("完成状态", node.status)}
      </div>`);
    }

    function openNeed(id) {
      const need = needs.find(item => item.id === id);
      const module = modules[need.module];
      openDrawer(need.title, `<div class="stack">${field("需求模块", module.name)}${field("负责人", module.owner)}${field("识别依据", need.source)}${field("识别置信度", `${need.confidence}%`)}${field("当前状态", need.status)}</div>`, `<button class="btn ghost" data-close>关闭</button><button class="btn primary" data-jump-module="${need.module}">去派工</button>`);
    }

    function openTask(id) {
      const task = tasks.find(item => item.id === id);
      openDrawer(task.title, `<div class="stack">${field("所属模块", modules[task.module].name)}${field("组员", task.owner)}${field("完成时间", task.due)}${field("当前状态", task.status)}</div>`, `<button class="btn ghost" data-close>关闭</button><button class="btn primary" data-complete="${task.id}">${task.done ? "恢复任务" : "标记完成"}</button>`);
    }

    function openRecordDrawer() {
      const record = selectedRecord();
      openDrawer("专场记录表原文", `<div class="stack">${field("达人", record.talent)}${field("达人 UID", record.uid)}${field("开播时间", record.liveTime)}${field("负责商务", record.business)}${field("状态", record.scheduleStatus || record.status)}${field("类型", record.type || "专场")}${field("主推产品", record.product)}${field("记录来源", "商务填写专场记录表 / 飞书表格同步")}</div>`);
    }

    function openLogDrawer() {
      openDrawer("项目事件日志", `<div class="stack">
        <div style="display:grid;gap:18px">${logs.map(item => `<div style="display:grid;grid-template-columns:18px 1fr;gap:14px;align-items:start">
          <span style="width:14px;height:14px;border-radius:50%;background:${item.color === "green" ? "var(--green)" : "var(--orange)"};margin-top:5px"></span>
          <div><div class="muted">${item.time}</div><strong>${item.user} ${item.action}</strong></div>
        </div>`).join("")}</div>
      </div>`);
    }

    function toggleTask(id, done) {
      const task = tasks.find(item => item.id === id);
      task.done = done;
      task.status = done ? "已完成" : "进行中";
      toast(done ? "任务已标记完成" : "任务已恢复为进行中");
      render();
    }

    function openDrawer(title, body, foot = `<button class="btn primary" data-close>关闭</button>`, wide = false, center = false) {
      $("#drawerTitle").textContent = title;
      $("#drawerBody").innerHTML = body;
      $("#drawerFoot").innerHTML = foot;
      $("#drawer").classList.toggle("wide", wide);
      $("#drawer").classList.toggle("center", center);
      $("#drawer").classList.add("show");
      $("#mask").classList.add("show");
      bindDrawer();
    }

    function closeDrawer() {
      $("#drawer").classList.remove("show");
      $("#drawer").classList.remove("wide");
      $("#drawer").classList.remove("center");
      $("#mask").classList.remove("show");
    }

    function bindDrawer() {
      document.querySelectorAll("[data-close]").forEach(btn => btn.addEventListener("click", closeDrawer));
      document.querySelectorAll("#drawer [data-action]").forEach(btn => btn.addEventListener("click", () => action(btn.dataset.action)));
      document.querySelectorAll("[data-jump-module]").forEach(btn => btn.addEventListener("click", () => { state.module = btn.dataset.jumpModule; state.view = "dispatch"; closeDrawer(); render(); }));
      document.querySelectorAll("[data-complete]").forEach(btn => btn.addEventListener("click", () => { const task = tasks.find(item => item.id === btn.dataset.complete); task.done = !task.done; task.status = task.done ? "已完成" : "进行中"; closeDrawer(); toast(task.done ? "任务已完成" : "任务已恢复"); render(); }));
    }

    function toast(message) {
      const el = $("#toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
    }

    $("#drawerClose").addEventListener("click", closeDrawer);
    $("#mask").addEventListener("click", closeDrawer);
    document.addEventListener("keydown", event => { if (event.key === "Escape") closeDrawer(); });
    render();
  </script>
</body>
</html>
