    function dataRangeOptions() {
      return [
        { key: "week", label: "本周", start: "2026-06-22", end: "2026-06-28" },
        { key: "month", label: "本月", start: "2026-06-01", end: "2026-06-30" },
        { key: "lastMonth", label: "上月", start: "2026-05-01", end: "2026-05-31" }
      ];
    }

    function dataRangePanel() {
      const options = dataRangeOptions();
      const baseMonth = state.dataStart ? state.dataStart.slice(0, 7) : "2026-06";
      return `<div class="list-range-panel data-range-calendar-panel">
        <div class="list-range-shortcuts">
          ${options.map(option => {
            const active = state.dataStart === option.start && state.dataEnd === option.end;
            return `<button class="list-range-shortcut ${active ? "active" : ""}" data-data-range-option="${option.start}|${option.end}">${option.label}</button>`;
          }).join("")}
        </div>
        <div class="list-range-main">
          <div class="list-range-fields">
            <div class="list-range-box"><span>开始日期</span><strong>${formatDate(state.dataStart)}</strong></div>
            <i>›</i>
            <div class="list-range-box"><span>结束日期</span><strong>${formatDate(state.dataEnd)}</strong></div>
          </div>
          <div class="list-range-calendars">
            ${dataMiniCalendar(baseMonth)}
            ${dataMiniCalendar(shiftMonth(baseMonth, 1))}
          </div>
        </div>
      </div>`;
    }

    function dataMiniCalendar(month) {
      const [year, rawMonth] = month.split("-").map(Number);
      const first = new Date(year, rawMonth - 1, 1);
      const startOffset = first.getDay();
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      const cells = Array.from({ length: 42 }, (_, index) => {
        const date = new Date(year, rawMonth - 1, index - startOffset + 1);
        const key = dateKey(date);
        const inMonth = date.getMonth() === rawMonth - 1;
        const inRange = inDateRange(key, state.dataStart, state.dataEnd);
        const isEdge = key === state.dataStart || key === state.dataEnd;
        const cls = `${inMonth ? "" : "muted"} ${inRange ? "in-range" : ""} ${isEdge ? "is-edge" : ""}`;
        return `<span class="${cls.trim()}">${date.getDate()}</span>`;
      }).join("");
      return `<div class="list-mini-calendar">
        <div class="list-mini-title">${year} 年 ${rawMonth} 月</div>
        <div class="list-mini-grid">${weekdays.map(day => `<span class="weekday">${day}</span>`).join("")}${cells}</div>
      </div>`;
    }

    function dataToolbar() {
      return `<section class="panel data-filter-panel">
        <div class="panel-body">
          <div class="data-toolbar">
            <div class="filter-field data-range-field">
              <span>专场时间</span>
              <div class="list-range-picker data-range-picker">
                <button class="list-range-trigger ${state.dataRangeOpen ? "active" : ""}" data-data-range-toggle>
                  <em>◷</em>
                  <strong>${formatDate(state.dataStart)}</strong>
                  <b>-</b>
                  <strong>${formatDate(state.dataEnd)}</strong>
                  <i>⌄</i>
                </button>
                ${state.dataRangeOpen ? dataRangePanel() : ""}
              </div>
            </div>
            <label class="filter-field"><span>支持类型</span><select class="select" data-data-module><option value="all">全部</option>${moduleOrder.map(key => `<option value="${key}" ${state.dataModule === key ? "selected" : ""}>${supportNeeds[key].title}</option>`).join("")}</select></label>
            <label class="filter-field"><span>成员</span><select class="select" data-data-member><option value="all">全部</option>${ownersWithTasks(allDispatchTaskItems()).map(owner => `<option ${state.dataMember === owner ? "selected" : ""}>${owner}</option>`).join("")}</select></label>
            <label class="filter-field"><span>状态</span><select class="select" data-data-status>${["all:全部", "待处理:待处理", "进行中:进行中", "延期中:延期中", "已取消:已取消", "已完成:已完成"].map(item => { const [value, label] = item.split(":"); return `<option value="${value}" ${state.dataStatus === value ? "selected" : ""}>${label}</option>`; }).join("")}</select></label>
          </div>
        </div>
      </section>`;
    }

    function monthlySpecialStatsPanel() {
      const rows = monthlySpecialRows();
      const stats = monthlySpecialStats(rows);
      const businessOptions = monthlyBusinessOptions();
      const gradeOptions = monthlyGradeOptions();
      const productOptionsForFilter = monthlyProductOptions();
      return `<section class="panel monthly-special-panel">
        <div class="panel-head">
          <div><h2 class="panel-title">月度专场统计</h2></div>
          <div class="row">${badge("商务可查看", "green")}<span class="data-note">统计已完成和未完成专场</span></div>
        </div>
        <div class="panel-body">
          <div class="monthly-toolbar">
            <label class="filter-field"><span>统计月份</span><input class="input" type="month" value="${state.monthlyMonth}" data-monthly-month></label>
            <label class="filter-field"><span>负责商务</span><select class="select" data-monthly-business><option value="all">全部</option>${businessOptions.map(value => `<option value="${value}" ${state.monthlyBusiness === value ? "selected" : ""}>${value}</option>`).join("")}</select></label>
            <label class="filter-field"><span>状态</span><select class="select" data-monthly-status>${["all:全部", "done:已完成", "unfinished:未完成", "delayed:已延期", "canceled:已取消"].map(item => { const [value, label] = item.split(":"); return `<option value="${value}" ${state.monthlyStatus === value ? "selected" : ""}>${label}</option>`; }).join("")}</select></label>
            <label class="filter-field"><span>等级</span><select class="select" data-monthly-grade><option value="all">全部</option>${gradeOptions.map(value => `<option value="${value}" ${state.monthlyGrade === value ? "selected" : ""}>${value}</option>`).join("")}</select></label>
            <label class="filter-field"><span>主推产品</span><select class="select" data-monthly-product><option value="all">全部</option>${productOptionsForFilter.map(value => `<option value="${value}" ${state.monthlyProduct === value ? "selected" : ""}>${value}</option>`).join("")}</select></label>
            <button class="btn primary" data-action="downloadMonthlyReport">导出月报</button>
          </div>
          <div class="monthly-summary">
            <div class="stat stat-orange"><div><strong>${stats.total}</strong><span>本月专场总数</span></div></div>
            <div class="stat stat-green"><div><strong>${stats.done}</strong><span>已完成</span></div></div>
            <div class="stat stat-blue"><div><strong>${stats.unfinished}</strong><span>未完成</span></div></div>
            <div class="stat stat-red"><div><strong>${stats.delayed}</strong><span>已延期</span></div></div>
            <div class="stat"><div><strong>${stats.canceled}</strong><span>已取消</span></div></div>
            <div class="stat stat-blue"><div><strong>${stats.rate}%</strong><span>完成率</span></div></div>
          </div>
          <div class="table-wrap">${monthlySpecialTable(rows)}</div>
        </div>
      </section>`;
    }

    function monthlySpecialRows() {
      return records
        .filter(record => record.liveTime && record.liveTime.slice(0, 7) === state.monthlyMonth)
        .map(record => ({ record, status: monthlySpecialStatus(record), reason: monthlyUnfinishedReason(record) }))
        .filter(item => {
          const record = item.record;
          const businessMatched = state.monthlyBusiness === "all" || (record.business || "待填写") === state.monthlyBusiness;
          const statusMatched = state.monthlyStatus === "all"
            || item.status.key === state.monthlyStatus
            || (state.monthlyStatus === "unfinished" && item.status.countsAsUnfinished);
          const gradeMatched = state.monthlyGrade === "all" || talentGrade(record) === state.monthlyGrade;
          const productMatched = state.monthlyProduct === "all" || record.product === state.monthlyProduct;
          return businessMatched && statusMatched && gradeMatched && productMatched;
        })
        .sort((a, b) => a.record.liveTime.localeCompare(b.record.liveTime));
    }

    function monthlySpecialStats(rows) {
      const total = rows.length;
      const done = rows.filter(item => item.status.key === "done").length;
      const delayed = rows.filter(item => item.status.key === "delayed").length;
      const canceled = rows.filter(item => item.status.key === "canceled").length;
      const unfinished = rows.filter(item => item.status.countsAsUnfinished).length;
      const denominator = total - canceled;
      return { total, done, unfinished, delayed, canceled, rate: denominator ? Math.round(done / denominator * 100) : 0 };
    }

    function monthlySpecialStatus(record) {
      const rawStatus = record.scheduleStatus || record.status || "未完成";
      if (rawStatus === "已取消") return { key: "canceled", label: "已取消", cls: "canceled", countsAsUnfinished: false };
      if (rawStatus === "已延期" || rawStatus.includes("延期") || recordDelayedTask(record)) return { key: "delayed", label: "已延期", cls: "delayed", countsAsUnfinished: true };
      if (record.completedDate || rawStatus === "待复盘" || rawStatus === "已完成") {
        return { key: "done", label: "已完成", cls: "done", countsAsUnfinished: false };
      }
      return { key: "unfinished", label: "未完成", cls: "pending", countsAsUnfinished: true };
    }

    function monthlyUnfinishedReason(record) {
      const status = monthlySpecialStatus(record);
      if (status.key === "done") return "已完成，等待或已进入复盘";
      if (status.key === "canceled") return record.cancelReason || "已取消，取消原因待补充";
      const delayedTask = recordDelayedTask(record);
      if (status.key === "delayed") return delayedTask?.task.delayReason || "已延期，新的排期或延期原因待补充";
      const rawStatus = record.scheduleStatus || record.status || "";
      if (rawStatus === "待识别") return "需求待识别，尚未进入完整派工";
      if (rawStatus === "派工中") return "支持任务派工中，实际销售额已生成模拟值";
      if (rawStatus === "已排期") return "已排期，等待直播执行和数据回填";
      return "流程未闭环，原因待补充";
    }

    function monthlySpecialTable(rows) {
      if (!rows.length) return `<div class="upload"><div><strong>当前筛选暂无专场</strong></div></div>`;
      return `<table><colgroup><col style="width:7%"><col style="width:8%"><col style="width:11%"><col style="width:7%"><col style="width:7%"><col style="width:6%"><col style="width:11%"><col style="width:7%"><col style="width:7%"><col style="width:6%"><col style="width:15%"><col style="width:8%"></colgroup>
        <thead><tr><th>达人UID</th><th>达人昵称</th><th>专场时间</th><th>负责商务</th><th>状态</th><th>等级</th><th>主推产品</th><th>目标销售额</th><th>实际销售额</th><th>达标率</th><th>负责人员</th><th>查看详情</th></tr></thead>
        <tbody>${rows.map(item => {
          const record = item.record;
          return `<tr><td>${record.uid}</td><td><strong>${record.talent}</strong></td><td>${record.liveTime}</td><td>${record.business || "待填写"}</td><td><span class="monthly-status ${item.status.cls}">${item.status.label}</span></td><td>${urgencyBadge(talentGrade(record))}</td><td><strong>${record.product}</strong></td><td>${record.expectedGmv || record.sales}</td><td>${actualGmvText(record)}</td><td>${ratePill(attainmentRate(record))}</td><td>${monthlyResponsiblePeopleCell(record)}</td><td><button class="btn ghost" data-monthly-special-detail="${record.id}">查看详情</button></td></tr>`;
        }).join("")}</tbody></table>`;
    }

    function openMonthlySpecialDetail(recordId) {
      const item = monthlySpecialRows().find(row => row.record.id === recordId)
        || { record: records.find(record => record.id === recordId), status: null, reason: "" };
      const record = item.record;
      if (!record) return;
      const status = item.status || monthlySpecialStatus(record);
      const reason = item.reason || monthlyUnfinishedReason(record);
      const rate = attainmentRate(record);
      const taskRows = monthlyTaskBreakdown(record);
      const taskTable = taskRows.length
        ? `<div class="table-wrap"><table><colgroup><col style="width:18%"><col style="width:38%"><col style="width:22%"><col style="width:22%"></colgroup>
          <thead><tr><th>支持类型</th><th>子任务</th><th>负责人</th><th>状态</th></tr></thead>
          <tbody>${taskRows.map(row => `<tr><td>${row.module}</td><td><strong>${escapeHtml(row.title)}</strong></td><td>${escapeHtml(row.owner)}</td><td>${badge(row.status, taskStatusClass(row.status))}</td></tr>`).join("")}</tbody>
        </table></div>`
        : `<div class="upload"><div><strong>暂无子任务明细</strong></div></div>`;
      openDrawer(
        `${record.talent} 专场详情`,
        `<div class="stack">
          <div class="field-grid">
            ${field("达人 UID", escapeHtml(record.uid))}
            ${field("专场时间", formatDate(record.liveTime))}
            ${field("负责商务", escapeHtml(record.business || "待填写"))}
            ${field("当前状态", `<span class="monthly-status ${status.cls}">${status.label}</span>`)}
            ${field("主推产品", escapeHtml(record.product))}
            ${field("达人等级", urgencyBadge(talentGrade(record)))}
            ${field("目标销售额", escapeHtml(record.expectedGmv || record.sales))}
            ${field("实际销售额", escapeHtml(actualGmvText(record)))}
            ${field("达标率", ratePill(rate))}
            ${field("负责人员", monthlyResponsiblePeopleCell(record))}
          </div>
          ${field("未完成 / 异常原因", escapeHtml(reason))}
          <section class="panel">
            <div class="panel-head"><h2 class="panel-title">子任务明细</h2>${badge(`${taskRows.length} 条`, taskRows.length ? "orange" : "")}</div>
            <div class="panel-body">${taskTable}</div>
          </section>
        </div>`,
        `<button class="btn primary" data-close>关闭</button>`,
        true,
        true
      );
    }

    function monthlyTaskBreakdown(record) {
      const recordTasks = dispatchTasks[record.id] || {};
      const rows = [];
      moduleOrder.forEach(moduleKey => {
        const assignment = assignmentFor(record.id, moduleKey);
        const taskList = recordTasks[moduleKey] && recordTasks[moduleKey].length
          ? recordTasks[moduleKey]
          : [{ title: taskTemplates[moduleKey][0], owner: assignment.owner, due: assignment.due, status: assignment.status }];
        taskList.forEach(task => {
          rows.push({
            module: supportNeeds[moduleKey].title,
            title: task.title || taskTemplates[moduleKey][0],
            owner: task.owner || assignment.owner || "待分配",
            status: task.status || assignment.status || "待处理"
          });
        });
      });
      return rows;
    }

    function monthlyResponsiblePeople(record) {
      const owners = new Set();
      monthlyTaskBreakdown(record).forEach(row => {
        if (row.owner) owners.add(row.owner);
      });
      return [...owners].filter(Boolean);
    }

    function monthlyResponsiblePeopleCell(record) {
      const names = monthlyResponsiblePeople(record);
      if (!names.length) return `<span class="muted">暂无负责人员</span>`;
      return `<div class="monthly-owner-list">${names.map(name => `<span class="monthly-owner-name">${escapeHtml(name)}</span>`).join("")}</div>`;
    }

    function monthlyResponsiblePeopleText(record) {
      const names = monthlyResponsiblePeople(record);
      return names.length
        ? names.join("、")
        : "暂无负责人员";
    }

    function recordDelayedTask(record) {
      const recordTasks = dispatchTasks[record.id] || {};
      for (const list of Object.values(recordTasks)) {
        const task = list.find(item => item.status?.includes("延期") || item.delayReason);
        if (task) return { record, task };
      }
      return null;
    }

    function monthlyBusinessOptions() {
      return [...new Set(records.map(record => record.business || "待填写"))].sort((a, b) => a.localeCompare(b));
    }

    function monthlyGradeOptions() {
      return ["S+", "S", "A", "B", "C"];
    }

    function monthlyProductOptions() {
      return [...new Set(records.map(record => record.product).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function lockedDataPanel(title, message) {
      return `<section class="panel">

    function periodRange(period) {

    function memberAchievementRows(range) {
      const targetModules = ["content", "edit", "ads"];
      const groups = new Map();
      allDispatchTaskItems()
        .filter(item => targetModules.includes(item.moduleKey) && inDateRange(taskDataDate(item.task), range.start, range.end))
        .forEach(item => {
          const key = `${item.moduleKey}:${item.task.owner}`;
          if (!groups.has(key)) groups.set(key, { moduleKey: item.moduleKey, owner: item.task.owner, taskCount: 0, completedRecords: new Set() });
          const group = groups.get(key);
          group.taskCount += 1;
          if (item.task.status === "已完成") group.completedRecords.add(item.record.id);
        });
      return [...groups.values()]
        .map(group => {
          const completedSpecialCount = group.completedRecords.size;
          return { ...group, completedSpecialCount, completionRate: group.taskCount ? Math.round(completedSpecialCount / group.taskCount * 100) : null };
        })
        .sort((a, b) => moduleOrder.indexOf(a.moduleKey) - moduleOrder.indexOf(b.moduleKey) || b.taskCount - a.taskCount || a.owner.localeCompare(b.owner));

    function filteredSpecialRecords() {
      return records.filter(record => inDateRange(record.completedDate || record.liveTime.slice(0, 10), state.dataStart, state.dataEnd));
    }

    function adsOwnerFor(record) {
      const adsTasks = dispatchTasks[record.id]?.ads || [];
      return adsTasks.find(task => task.owner && task.owner !== "待分配")?.owner || dispatchAssignments[record.id]?.ads?.owner || "待分配";
    }

    function attainmentRate(record, actualKey = "actualGmv") {
      const target = gmvAmount(record.expectedGmv || record.sales);
      const actual = gmvAmount(actualKey === "actualGmv" ? actualGmvText(record) : record[actualKey]);
      if (!target || !actual) return null;
      return Math.round(actual / target * 100);
    }

    function adsActualRate(record) {
      const forecast = gmvAmount(record.adsForecastGmv);
      const actual = gmvAmount(actualGmvText(record));
      if (!forecast || !actual) return null;
      return Math.round(actual / forecast * 100);
    }

    function actualGmvText(record) {
      if (Number.isFinite(gmvAmount(record.actualGmv))) return record.actualGmv;
      const target = gmvAmount(record.expectedGmv || record.sales) || 80;
      const factors = [0.72, 0.86, 0.94, 1.03, 1.08, 1.16, 0.79, 0.98];
      const value = Math.max(1, Math.round(target * factors[stableRecordIndex(record, factors.length)]));
      return `¥${value}万`;
    }

    function averageRate(rates) {
      const validRates = rates.filter(rate => Number.isFinite(rate));
      if (!validRates.length) return null;
      return Math.round(validRates.reduce((sum, rate) => sum + rate, 0) / validRates.length);
    }

    function gmvAmount(value) {
      const text = String(value || "");
      const match = text.match(/[\d.]+/);
      if (!match) return null;
      const base = Number(match[0]);
      if (!Number.isFinite(base)) return null;
      return text.includes("亿") ? base * 10000 : base;
    }

    function ratePill(rate) {
      if (!Number.isFinite(rate)) return `<span class="rate-pill">待回填</span>`;
      const cls = rate >= 100 ? "green" : rate >= 90 ? "blue" : rate >= 80 ? "orange" : "red";
      return `<span class="rate-pill ${cls}">${rate}%</span>`;
    }

    function inDateRange(date, start, end) {
      return date && date >= start && date <= end;
    }

    function filteredDataItems() {
      return allDispatchTaskItems().filter(item => {
        const date = taskDataDate(item.task);
        const inRange = date >= state.dataStart && date <= state.dataEnd;
        const moduleMatched = state.dataModule === "all" || item.moduleKey === state.dataModule;
        const memberMatched = state.dataMember === "all" || item.task.owner === state.dataMember;
        const statusMatched = state.dataStatus === "all" || item.task.status === state.dataStatus;
        return inRange && moduleMatched && memberMatched && statusMatched;
      });
    }

    function taskDataDate(task) {
      return task.canceledAt || task.completedAt || task.reviewedAt || task.submittedAt || task.delayDue || task.due || "2026-06-01";
    }

    function ownersWithTasks(items) {
      return [...new Set(items.map(item => item.task.owner).filter(owner => owner && owner !== "待分配"))];
    }

    function moduleCompletionBars(items) {
      return `<div class="support-pie-grid">${moduleOrder.map(key => {
        const list = items.filter(item => item.moduleKey === key);
        const done = list.filter(item => item.task.status === "已完成").length;
        const pct = list.length ? Math.round(done / list.length * 100) : 0;
        const pending = list.length - done;
        return `<div class="support-pie-card ${modules[key].cls}">
          <div class="support-pie-chart" style="--done-pct:${pct}%"><strong>${pct}%</strong></div>
          <div class="support-pie-info">
            <strong>${supportNeeds[key].title}</strong>
            <div class="support-pie-meta">${badge(`${done}/${list.length} 已完成`, done === list.length && list.length ? "green" : modules[key].cls)}${pending ? `<span>${pending} 条未完成</span>` : `<span>全部完成</span>`}</div>
          </div>
        </div>`;
      }).join("")}</div>`;
    }

    function completedSpecialRows() {
      return records
        .filter(record => record.completedDate && record.completedDate >= state.dataStart && record.completedDate <= state.dataEnd)
        .map(record => ({
          date: record.completedDate,

        .sort((a, b) => b.date.localeCompare(a.date));

      document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", () => { state.view = btn.dataset.view; render(); }));
      document.querySelectorAll("[data-go]").forEach(btn => btn.addEventListener("click", () => {
        if (btn.dataset.go === "dispatch") enterDispatchWorkspace();
        else state.view = btn.dataset.go;
        render();
      }));
      document.querySelectorAll("[data-open-project]").forEach(btn => btn.addEventListener("click", () => { state.selected = btn.dataset.openProject; state.view = "detail"; render(); }));
      document.querySelectorAll("[data-open-info-editor]").forEach(btn => btn.addEventListener("click", () => openSpecialInfoEditor(btn.dataset.openInfoEditor)));
      document.querySelectorAll("[data-list-stat]").forEach(btn => btn.addEventListener("click", () => {
        state.listFilter = btn.dataset.listStat;
        state.calendarExpandedDay = "";
        render();

        state.listMonth = input.value;
        const range = monthRange(input.value);
        state.listStart = range.start;
        state.listEnd = range.end;
        const option = listRangeOptions().find(item => item.start === range.start && item.end === range.end);
        state.listRangePreset = option ? option.key : "custom";
        state.listRangeOpen = false;
        state.calendarExpandedDay = "";
        render();
      }));
      document.querySelectorAll("[data-list-range-toggle]").forEach(btn => btn.addEventListener("click", () => {
        state.listRangeOpen = !state.listRangeOpen;
        render();
      }));
      document.querySelectorAll("[data-list-range-option]").forEach(btn => btn.addEventListener("click", () => {
        const option = listRangeOptions().find(item => item.key === btn.dataset.listRangeOption);
        if (!option) return;
        state.listStart = option.start;
        state.listEnd = option.end;
        state.listRangePreset = option.key;
        state.listMonth = option.start.slice(0, 7);
        state.listRangeOpen = false;
        state.calendarExpandedDay = "";
        render();
      }));
      document.querySelectorAll("[data-calendar-toggle]").forEach(btn => btn.addEventListener("click", () => {

        render();
      }));
      document.querySelectorAll("[data-calendar-day-toggle]").forEach(btn => btn.addEventListener("click", () => {

        render();
      }));

        state.dispatchCalendarExpandedDay = "";
        render();
      }));
      document.querySelectorAll("[data-task-calendar-day-toggle]").forEach(btn => btn.addEventListener("click", () => {
        state.taskCalendarExpandedDay = state.taskCalendarExpandedDay === btn.dataset.taskCalendarDayToggle ? "" : btn.dataset.taskCalendarDayToggle;
        render();
      }));
      document.querySelectorAll("[data-dispatch-calendar-day-toggle]").forEach(btn => btn.addEventListener("click", () => {
        state.dispatchCalendarExpandedDay = state.dispatchCalendarExpandedDay === btn.dataset.dispatchCalendarDayToggle ? "" : btn.dataset.dispatchCalendarDayToggle;
        render();
      }));
      document.querySelectorAll("[data-open-my-task-calendar]").forEach(btn => btn.addEventListener("click", () => openMyTaskCalendarDetail(btn.dataset.openMyTaskCalendar)));
      document.querySelectorAll("[data-special-progress-toggle]").forEach(btn => btn.addEventListener("click", () => {
        state.specialProgressOpen = !state.specialProgressOpen;
        render();
      }));
      document.querySelectorAll("[data-list-search]").forEach(input => input.addEventListener("input", () => {
        const cursor = input.selectionStart;
        state.listSearch = input.value;
        render();
        const next = document.querySelector("[data-list-search]");

          next.focus();

    function addDispatchTask(key) {
      const [recordId, moduleKey] = key.split(":");
      const list = tasksFor(recordId, moduleKey);
      const assignment = assignmentFor(recordId, moduleKey);
      const templates = taskTemplates[moduleKey];
      const template = templates[list.length % templates.length];
      list.push({
        title: template,
        owner: moduleMembers[moduleKey][0],
        due: dispatchDue(recordId, moduleKey),
        status: "待处理",
        businessNotice: "new",
        noticeAt: actionDate,
        isDraft: assignment.status !== "待派发"
      });
      state.dispatchOpen = key;
      toast(assignment.status === "待派发" ? "已新增任务" : "已新增待发布任务");
      render();
    }

    function removeDispatchTask(key) {
      const [recordId, moduleKey, index] = key.split(":");
      const list = tasksFor(recordId, moduleKey);
      list.splice(Number(index), 1);
      syncAssignmentStatus(recordId, moduleKey);
      state.dispatchOpen = `${recordId}:${moduleKey}`;
      toast("已删除该条任务");
      render();
    }

    function taskByKey(key) {
      return taskActionItems(key)[0]?.task;
    }

    function startDispatchTaskEdit(key) {
      const task = taskByKey(key);
      const moduleKey = moduleKeyFromTaskAction(key);
      if (!task || !moduleMembers[moduleKey] || task.status === "已取消") return;
      task.editing = true;
      task.editDraft = {
        title: task.title || taskTemplates[moduleKey][0],
        owner: task.owner || moduleMembers[moduleKey][0],
        due: task.delayDue || task.due
      };
    }

    function updateDispatchTaskEdit(key, field, value) {
      const task = taskByKey(key);
      if (!task || !task.editing) return;
      task.editDraft = { ...(task.editDraft || {}), [field]: value };
    }

    function dismissDispatchTaskEdit(key) {
      const task = taskByKey(key);
      if (!task) return;
      delete task.editing;
      delete task.editDraft;
    }

    function saveDispatchTaskEdit(key) {
      const item = taskActionItems(key)[0];
      const task = item?.task;
      const draft = task?.editDraft;
      if (!item || !task || !draft) return false;
      const title = String(draft.title || "").trim();
      const owner = String(draft.owner || "").trim();
      const due = String(draft.due || "").trim();
      if (!title || !owner || !due) {
        toast("请完整填写任务名称、执行组员和预计截止日期");
        return false;
      }
      task.title = title;
      task.owner = owner;
      task.due = due;
      if (task.delayDue) task.delayDue = due;
      task.businessNotice = "updated";
      task.noticeAt = actionDate;
      delete task.editing;
      delete task.editDraft;
      const assignment = assignmentFor(item.record.id, item.moduleKey);
      const taskList = tasksFor(item.record.id, item.moduleKey);
      assignment.owner = taskList[0]?.owner || assignment.owner;
      syncAssignmentStatus(item.record.id, item.moduleKey);
      toast("子任务修改已保存并同步关联人员");
      return true;
    }

    function focusDispatchTask(key) {
      const [recordId, moduleKey] = key.split(":");
      enterDispatchWorkspace(moduleKey, recordId);
      render();
    }

    function uploadTaskFiles(key, fileList) {
      const actionItems = taskActionItems(key);
      const tasks = actionItems.map(item => item.task);
      if (!tasks.length) return;
      const moduleKey = moduleKeyFromTaskAction(key);
      const names = Array.from(fileList || []).map(file => file.name).filter(Boolean);
      if (!names.length) return;
      actionItems.filter(item => item.task.status !== "已取消").forEach(item => {
        const task = item.task;
        task.files = [...(task.files || []), ...names];
        if (taskWorkflowStatus(item) === "待办任务") setTaskWorkflowStatus(task, moduleKey, workflowStartStatus(moduleKey), item.record, { reason: "上传附件后进入处理" });
        task.businessNotice = "uploaded";
        task.noticeAt = actionDate;
        if (task.status !== "已完成") {
          delete task.submittedAt;
          delete task.completedAt;
          delete task.reviewResult;
        }
        delete task.reviewedAt;
        delete task.rejectedAt;
        delete task.rejectReason;
      });
      toast(moduleKey === "content" ? "内容文档已保存，请点击提交文档完成" : "完成文件已保存，请点击提交完成");
      render();
    }

    function removeTaskFile(fileKey) {
      const parts = fileKey.split(":");
      const fileIndex = Number(parts.pop());
      const key = parts.join(":");
      const tasks = tasksByActionKey(key);
      const fileName = taskFilesForActionKey(key, tasks[0] || {})[fileIndex];
      if (!tasks.length || !fileName || Number.isNaN(fileIndex)) return;
      tasks.forEach(task => {
        task.files = (task.files || []).filter(name => name !== fileName);
      });
      toast("已删除上传文件");
      render();
    }

    function toggleTaskMemo(key) {
      const task = taskByKey(key);
      if (!task) return;
      task.memoDraft = task.memoDraft || "";

    function updateTaskMemoDraft(key, value) {

    }

    function closeTaskMemo(key) {
      tasksByActionKey(key).forEach(task => { task.memoOpen = false; });
      closeDrawer();
    }

    function saveTaskMemo(key) {
      const tasks = tasksByActionKey(key);
      const task = tasks[0];
      if (!task) return;
      const text = (task.memoDraft || "").trim();
      if (!text) {
        toast("请先填写备忘内容");
        return;
      }
      tasks.forEach(item => {
        item.memoHistory = [...(item.memoHistory || []), {
          time: actionDate,
          user: state.taskScope === "mine" ? state.taskUser : item.owner,
          text
        }];
        item.memoDraft = "";
      });
      toast("已保存节点备忘");
      const memoInput = $("#drawerBody").querySelector("[data-task-memo-draft]");
      if ($("#drawer").classList.contains("show") && memoInput && memoInput.dataset.taskMemoDraft === key) {
        openTaskMemoDialog(key);
      } else {
        render();
      }
    }

    function updateAdsForecastDraft(key, value) {
      tasksByActionKey(key).forEach(task => { task.adsForecastGmv = value; });
    }

    function saveAdsForecast(key) {
      const recordId = recordIdFromTaskAction(key);
      const moduleKey = moduleKeyFromTaskAction(key);
      const tasks = tasksByActionKey(key);
      const task = tasks[0];
      const record = records.find(item => item.id === recordId);
      if (!task || !record || moduleKey !== "ads") return;
      const value = normalizeGmvText(task.adsForecastGmv || record.adsForecastGmv || "");
      if (!value) {
        toast("请填写预估投放销售额");
        return;
      }
      tasks.forEach(item => { item.adsForecastGmv = value; });
      record.adsForecastGmv = value;
      toast("已保存预估投放销售额");
      render();
    }

    function normalizeGmvText(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      if (/^待/.test(text)) return text;
      if (/[万亿]/.test(text)) return text.startsWith("¥") ? text : `¥${text}`;
      if (/^\d+(\.\d+)?$/.test(text)) return `¥${text}万`;
      return text.startsWith("¥") ? text : `¥${text}`;
    }

    function uploadEntryDocs(fileList) {
      const files = Array.from(fileList || []).filter(file => file.name);
      if (!files.length) return;
      const docs = files.map((file, index) => ({
        id: `DOC-${Date.now()}-${index}-${Math.random().toString(36).slice(2, 7)}`,
        name: file.name,
        size: file.size || 0,
        type: fileExt(file.name)
      }));
      state.entryDocs = [...(state.entryDocs || []), ...docs];
      toast(`已上传 ${docs.length} 个文档`);
      render();
    }

    function removeEntryDoc(id) {
      const before = state.entryDocs.length;
      state.entryDocs = state.entryDocs.filter(file => file.id !== id);
      if (state.entryDocs.length !== before) toast("已删除上传文档");
      render();
    }

    function fileExt(name) {
      const ext = String(name || "").split(".").pop();
      return ext && ext !== name ? ext.toUpperCase() : "本地文件";
    }

    function formatFileSize(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return "大小未知";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 102.4) / 10} KB`;
      return `${Math.round(bytes / 1024 / 102.4) / 10} MB`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeRegExp(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function startCancelRecord(id) {
      const record = records.find(item => item.id === id);
      if (!record) return;
      record.cancelEditing = true;
      record.cancelDraft = record.cancelReason || "";
      state.selected = id;
      state.view = "detail";
      render();
    }

    function updateCancelRecordDraft(id, value) {
      const record = records.find(item => item.id === id);
      if (record) record.cancelDraft = value;
    }

    function dismissCancelRecord(id) {
      const record = records.find(item => item.id === id);
      if (!record) return;
      delete record.cancelEditing;
      delete record.cancelDraft;
      render();
    }

    function saveCancelRecord(id) {
      const record = records.find(item => item.id === id);
      if (!record) return;
      const reason = (record.cancelDraft || "").trim();
      if (!reason) {
        toast("请填写取消原因");
        return;
      }
      record.status = "已取消";
      record.scheduleStatus = "已取消";
      record.cancelReason = reason;
      record.canceledAt = actionDate;
      delete record.cancelEditing;
      delete record.cancelDraft;
      toast("已取消专场并留存原因");
      render();
    }

    function startCancelTask(key) {
      const tasks = tasksByActionKey(key);
      if (!tasks.length) return;
      const draft = tasks.find(task => task.cancelReason)?.cancelReason || "";
      tasks.filter(task => task.status !== "已取消").forEach(task => {
        task.cancelEditing = true;
        task.cancelDraft = task.cancelReason || draft;
      });
      render();
    }

    function updateCancelTaskDraft(key, value) {
      tasksByActionKey(key).forEach(task => { task.cancelDraft = value; });
    }

    function dismissCancelTask(key) {
      tasksByActionKey(key).forEach(task => {
        delete task.cancelEditing;
        delete task.cancelDraft;
      });
      render();
    }

    function saveCancelTask(key) {
      const actionItems = taskActionItems(key);
      const tasks = actionItems.map(item => item.task);
      const task = tasks[0];
      if (!task) return;
      const reason = (task.cancelDraft || "").trim();
      if (!reason) {
        toast("请填写取消原因");
        return;
      }
      actionItems.filter(item => item.task.status !== "已取消").forEach(item => {
        const beforeStatus = taskWorkflowStatus(item);
        item.task.status = "已取消";
        item.task.cancelReason = reason;
        item.task.canceledAt = actionDate;
        item.task.cancelEditing = false;
        delete item.task.cancelEditing;
        delete item.task.cancelDraft;
        delete item.task.delayEditing;
        delete item.task.delayBackup;
        item.task.reviewComment = "";
        notifyTaskStatusChange(item, beforeStatus, taskWorkflowStatus(item), "取消任务");
      });
      syncAssignmentStatusFromTaskKey(key);
      toast("已取消任务并留存原因");
      render();
    }

    function advanceMyTask(key, nextStatus) {
      const actionItems = taskActionItems(key);
      if (!actionItems.length || !nextStatus) return;
      const moduleKey = moduleKeyFromTaskAction(key);
      const recordId = recordIdFromTaskAction(key);
      const record = records.find(item => item.id === recordId);
      const activeItems = actionItems.filter(item => !isTaskWorkflowAbnormal(taskWorkflowStatus(item)) && !isTaskWorkflowDone(taskWorkflowStatus(item)));
      if (!activeItems.length) {
        toast("当前任务无需继续流转");
        return;
      }
      const currentStatus = myTaskGroupStatus(activeItems);
      const allowedAction = workflowNextAction(moduleKey, currentStatus, recordId);
      if (!allowedAction || allowedAction.next !== nextStatus) {
        toast(workflowWaitingText(moduleKey, currentStatus, recordId));
        return;
      }
      if (nextStatus === "待审核") {
        if (activeItems.some(item => !(item.task.files || []).length)) {
          toast("请先上传脚本文档");
          return;
        }
        if (activeItems.some(item => !(item.task.docNote || "").trim())) {
          toast("请先填写编导备注信息");
          return;
        }
      }
      if (moduleKey === "edit" && nextStatus === "千川待审核" && activeItems.some(item => !(item.task.files || []).length)) {
        toast("请先上传剪辑完成文件");
        return;
      }
      activeItems.forEach(item => {
        setTaskWorkflowStatus(item.task, moduleKey, nextStatus, item.record);
        item.task.submittedAt = nextStatus === "待审核" || nextStatus === "千川待审核" ? actionDate : item.task.submittedAt;
        item.task.businessNotice = isTaskWorkflowDone(nextStatus) || nextStatus === "待审核" || nextStatus === "千川待审核" ? "done" : item.task.businessNotice;
        item.task.noticeAt = item.task.businessNotice ? actionDate : item.task.noticeAt;
        item.task.reviewResult = workflowActionResult(moduleKey, nextStatus);
        delete item.task.delayEditing;
        delete item.task.delayBackup;
      });
      syncLinkedWorkflow(recordId, moduleKey, nextStatus);
      syncAssignmentStatusFromTaskKey(key);
      toast(workflowActionToast(moduleKey, nextStatus));
      render();
    }

    function workflowActionResult(moduleKey, nextStatus) {
      if (moduleKey === "content" && nextStatus === "待审核") return "脚本文档已提交，等待内容组长审核";
      if (moduleKey === "content" && nextStatus === "待拍摄") return "内容组长已通过审核，等待拍摄";
      if (moduleKey === "content" && nextStatus === "千川待审核") return "视频已同步给投放审核";
      if (moduleKey === "edit" && nextStatus === "千川待审核") return "剪辑完成文件已同步给内容和投放审核";
      if (moduleKey === "ops" && nextStatus === "已完成") return "运营节点已完成";
      if (nextStatus === "待投放") return "千川审核已通过，等待直播当天投放";
      if (nextStatus === "已发布") return "视频已发布主页";
      if (nextStatus === "已投放") return "直播排期已到达，任务已投放";
      return nextStatus;
    }

    function workflowActionToast(moduleKey, nextStatus) {
      if (moduleKey === "content" && nextStatus === "待审核") return "脚本文档已提交，任务进入待审核";
      if (moduleKey === "content" && nextStatus === "待拍摄") return "内容审核已通过，剪辑任务已同步进入剪辑中";
      if (moduleKey === "content" && nextStatus === "千川待审核") return "已同步投放审核，任务进入千川待审核";
      if (moduleKey === "edit" && nextStatus === "千川待审核") return "已同步投放和内容审核，任务进入千川待审核";
      if (moduleKey === "ops" && nextStatus === "已完成") return "运营任务已完成";
      if (nextStatus === "待投放") return "千川审核已通过，投放任务进入待投放";
      if (nextStatus === "审核通过") return "千川审核已通过，剪辑任务进入审核通过";
      if (nextStatus === "已发布") return "已标记视频发布";
      if (nextStatus === "已投放") return "已标记投放完成";
      return `任务已流转到${nextStatus}`;
    }

    function syncLinkedWorkflow(recordId, sourceModule, nextStatus) {
      if (!recordId) return;
      if (sourceModule === "content" && nextStatus === "待拍摄") {
        setModuleTasksWorkflow(recordId, "edit", "剪辑中", item => taskWorkflowStatus(item) === "待办任务");
        if (!hasModuleTasks(recordId, "edit")) {
          setModuleTasksWorkflow(recordId, "ads", "千川待审核", item => taskWorkflowStatus(item) === "待办任务");
        }
      }
      if (sourceModule === "content" && nextStatus === "千川待审核") {
        setModuleTasksWorkflow(recordId, "ads", "千川待审核", item => taskWorkflowStatus(item) === "待办任务");
      }
      if (sourceModule === "edit" && nextStatus === "千川待审核") {
        setModuleTasksWorkflow(recordId, "content", "千川待审核", item => taskWorkflowStatus(item) === "待拍摄");
        setModuleTasksWorkflow(recordId, "ads", "千川待审核", item => taskWorkflowStatus(item) === "待办任务");
      }
      if (sourceModule === "edit" && nextStatus === "审核通过") {
        setModuleTasksWorkflow(recordId, "content", "待发布", item => ["千川待审核", "待拍摄"].includes(taskWorkflowStatus(item)));
      }
      if (sourceModule === "ads" && nextStatus === "待投放") {
        setModuleTasksWorkflow(recordId, "content", "待发布", item => ["千川待审核", "待拍摄"].includes(taskWorkflowStatus(item)));
        setModuleTasksWorkflow(recordId, "edit", "审核通过", item => ["千川待审核", "剪辑中"].includes(taskWorkflowStatus(item)));
      }
      if (sourceModule === "content" && nextStatus === "已发布") {
        setModuleTasksWorkflow(recordId, "edit", "已发布", item => ["审核通过", "千川待审核", "剪辑中"].includes(taskWorkflowStatus(item)));
      }
    }

    function hasModuleTasks(recordId, moduleKey) {
      return Boolean((dispatchTasks[recordId]?.[moduleKey] || []).length);
    }

    function setModuleTasksWorkflow(recordId, moduleKey, status, predicate = () => true) {
      const record = records.find(item => item.id === recordId);
      const list = dispatchTasks[recordId]?.[moduleKey] || [];
      if (!list.length) return;
      list.forEach((task, index) => {
        const item = { record, moduleKey, task, index, key: `${recordId}:${moduleKey}:${index}` };
        if (!predicate(item) || isTaskWorkflowAbnormal(taskWorkflowStatus(item))) return;
        setTaskWorkflowStatus(task, moduleKey, status, record, { reason: "关联任务自动流转" });
        task.reviewResult = workflowActionResult(moduleKey, status);
      });
      syncAssignmentStatus(recordId, moduleKey);
    }

    function completeMyTask(key) {
      const actionItems = taskActionItems(key);
      const tasks = actionItems.map(item => item.task);
      const moduleKey = moduleKeyFromTaskAction(key);
      const activeItems = actionItems.filter(item => item.task.status !== "已取消" && item.task.status !== "已完成");
      const activeTasks = activeItems.map(item => item.task);
      if (!tasks.length) return;
      if (!activeTasks.length && tasks.every(task => task.status === "已取消")) {
        toast("已取消任务不能提交完成");
        return;
      }
      if (!activeTasks.length) {
        toast("当前任务已完成");
        return;
      }
      if (activeTasks.some(task => !task.files || !task.files.length)) {
        toast(moduleKey === "content" ? "请先上传内容文档" : "请先上传完成文件");
        return;
      }
      if (moduleKey === "content") {
        if (activeTasks.some(task => !(task.docNote || "").trim())) {
          toast("请先填写编导备注信息");
          return;
        }
      }
      activeItems.forEach(item => {
        const beforeStatus = taskWorkflowStatus(item);
        const task = item.task;
        task.status = "已完成";
        task.submittedAt = actionDate;
        task.completedAt = actionDate;
        task.reviewResult = moduleKey === "content" ? "内容文档已提交" : "完成文件已提交";
        delete task.reviewedAt;
        delete task.rejectedAt;
        delete task.rejectReason;
        delete task.delayEditing;
        task.reviewComment = "";
        notifyTaskStatusChange(item, beforeStatus, taskWorkflowStatus(item), "提交完成");
      });
      syncAssignmentStatusFromTaskKey(key);
      toast(moduleKey === "content" ? "内容文档已提交并完成" : "完成文件已提交，任务已完成");
      render();
    }

    function syncAssignmentStatusFromTaskKey(key) {
      const recordId = recordIdFromTaskAction(key);
      const moduleKey = moduleKeyFromTaskAction(key);
      if (recordId && moduleKey) syncAssignmentStatus(recordId, moduleKey);
    }

    function syncAssignmentStatus(recordId, moduleKey) {
      const list = tasksFor(recordId, moduleKey);
      const assignment = assignmentFor(recordId, moduleKey);
      assignment.due = dispatchDue(recordId, moduleKey);
      if (!list.length) {
        assignment.status = "待派发";
        return;
      }
      if (list.every(task => task.status === "已取消")) {
        assignment.status = "已取消";
        return;
      }
      if (list.every(task => task.status === "已完成")) {
        assignment.status = "已完成";
        return;
      }
      if (list.some(task => task.status === "延期中")) {
        assignment.status = "延期中";
        return;
      }
      if (assignment.status !== "待派发") assignment.status = "已派发";
    }

    function startDelayTask(key) {
      const actionItems = taskActionItems(key).filter(item => item.task.status !== "已完成");
      const tasks = actionItems.map(item => item.task);
      if (!tasks.length) return;
      if (tasks.every(task => task.status === "已取消")) {
        toast("已取消任务不能延期");
        return;
      }
      actionItems.filter(item => item.task.status !== "已取消").forEach(item => {
        const beforeStatus = taskWorkflowStatus(item);
        const task = item.task;
        if (!task.delayEditing) {
          task.delayBackup = {
            status: task.status,
            due: task.due,
            originalDue: task.originalDue,
            delayDue: task.delayDue,
            delayReason: task.delayReason
          };
        }
        task.delayEditing = true;
        task.status = "延期中";
        task.originalDue = task.originalDue || task.due;
        task.delayDue = task.delayDue || task.due;
        task.delayReason = task.delayReason || "";
        notifyTaskStatusChange(item, beforeStatus, taskWorkflowStatus(item), "进入延期编辑");
      });
      syncAssignmentStatusFromTaskKey(key);
      render();
    }

    function cancelDelayTask(key) {
      const actionItems = taskActionItems(key);
      if (!actionItems.length) return;
      actionItems.forEach(item => {
        const task = item.task;
        const beforeStatus = taskWorkflowStatus(item);
        if (task.delayBackup) {
          task.status = task.delayBackup.status;
          task.due = task.delayBackup.due;
          task.originalDue = task.delayBackup.originalDue;
          task.delayDue = task.delayBackup.delayDue;
          task.delayReason = task.delayBackup.delayReason;
        }
        delete task.delayEditing;
        delete task.delayBackup;
        notifyTaskStatusChange(item, beforeStatus, taskWorkflowStatus(item), "取消延期编辑");
      });
      syncAssignmentStatusFromTaskKey(key);
      toast("已取消延期编辑");
      render();
    }

    function saveDelayTask(key) {
      const actionItems = taskActionItems(key).filter(item => item.task.delayEditing);
      const tasks = actionItems.map(item => item.task);
      const task = tasks[0];
      if (!task) return;
      if (!task.delayDue || !task.delayReason.trim()) {
        toast("请填写新的完成时间和延期原因");
        return;
      }
      actionItems.forEach(item => {
        const beforeStatus = taskWorkflowStatus(item);
        item.task.delayDue = task.delayDue;
        item.task.delayReason = task.delayReason;
        item.task.due = task.delayDue;
        item.task.status = "延期中";
        delete item.task.delayEditing;
        delete item.task.delayBackup;
        notifyTaskStatusChange(item, beforeStatus, taskWorkflowStatus(item), "保存延期原因");
      });
      syncAssignmentStatusFromTaskKey(key);
      toast("延期信息已回填");
      render();
    }

    function publishDispatch(key) {
      const [recordId, moduleKey] = key.split(":");
      const assignment = assignmentFor(recordId, moduleKey);
      const taskList = tasksFor(recordId, moduleKey);
      const record = records.find(item => item.id === recordId);
      if (record && Array.isArray(record.supportModules) && !record.supportModules.includes(moduleKey)) {
        record.supportModules.push(moduleKey);
      }
      const firstPublish = assignment.status === "待派发";
      taskList.forEach(task => {
        if ((firstPublish || task.isDraft) && !task.businessNotice) {
          task.businessNotice = "new";
          task.noticeAt = actionDate;
        }
        if (firstPublish || task.isDraft || taskWorkflowStatus({ record, moduleKey, task }) === "待办任务") {
          setTaskWorkflowStatus(task, moduleKey, workflowStartStatus(moduleKey), record, { reason: firstPublish ? "发布派工" : "发布新增任务" });
        } else {
          task.status = task.status || "待处理";
        }
        delete task.isDraft;
      });
      assignment.status = "已派发";
      assignment.owner = taskList[0]?.owner || assignment.owner;
      assignment.due = dispatchDue(recordId, moduleKey);
      syncAssignmentStatus(recordId, moduleKey);
      if (record && record.status === "待识别") record.status = "派工中";
      closeDrawer();
      toast(`已发布${supportNeeds[moduleKey].title} ${taskList.length} 条任务，已同步到全部任务`);
      render();
    }

    function action(name) {
      if (name === "newRecord") {
        state.view = "entry";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }
      if (name === "recognizeDoc") {
        if (!state.entryDocs.length) {
          toast("请先选择本地文档");
          return;
        }
        applyEntryRecognition(recognizeEntryDocs(), "文档");
        return;
      }
      if (name === "recognizeText") {
        if (!String(state.entryText || "").trim()) {
          toast("请先粘贴专场文字信息");
          return;
        }
        applyEntryRecognition(extractEntryFieldsFromText(state.entryText), "文本");
        return;
      }
      if (name === "saveFeishuLink") {
        const link = String(state.entryFeishuLink || "").trim();
        if (!link) {
          toast("请先粘贴飞书文档链接");
          return;
        }
        if (!isFeishuLink(link)) {
          toast("请粘贴有效的飞书文档链接");
          return;
        }
        toast("已保存飞书链接，可点击跳转查看");
        render();
        return;
      }
      if (name === "clearFeishuLink") {
        state.entryFeishuLink = "";
        toast("已清空飞书链接");
        render();
        return;
      }
      if (name === "saveEntrySpecialInfo") {
        saveEntrySpecialInfo();
        return;
      }
      if (name === "createProjectFromEntry") {
        const requiredErrors = entryRequiredErrors();
        if (requiredErrors.length) {
          toast(`请完善：${requiredErrors[0]}`);
          return;
        }
        const entryValues = entrySpecialInfoValues();
        if (entryValues.scheduleStatus === "已取消" && !entryValues.cancelReason) {
          toast("状态改为已取消时，请填写取消原因");
          return;
        }
        const newId = `ZC-${Date.now()}`;
        const talent = entryValues.talent || "憨憨金和帅帅银";
        const uid = entryValues.uid || "dy26060102";
        const liveAt = entryValues.liveTime || "2026-06-01 20:00";
        const business = entryValues.business || "商务";
        const scheduleStatus = entryValues.scheduleStatus || "已排期";
        const type = entryValues.type || "专场";
        const liveRoom = entryValues.liveRoom || "直播间A";
        const product = entryValues.product || "油皮气垫pro";
        const sales = entryValues.expectedGmv || "¥180万";
        const generatedTitle = `${talent} ${liveAt.slice(5, 10).replace("-", "/")} ${product}${type}`;
        const specialName = entryValues.specialName || generatedTitle;
        const trial = entryValues.trial || "正装试用";
        const luckyBag = entryValues.luckyBag || "飞机盒礼盒（价值599元）";
        const luckyBagOther = entryValues.luckyBagOther || "";
        const cooperation = entryValues.cooperation || "高，可配合提前预热、直播口播和短视频确认";
        records.unshift({
          id: newId,
          title: specialName,
          specialName,
          talent,
          uid,
          urgency: entryUrgency(),
          status: "待识别",
          scheduleStatus,
          type,
          liveRoom,
          liveTime: liveAt,
          business,
          expectedGmv: sales,
          actualGmv: "待回填",
          adsForecastGmv: "待预估",
          sales,
          product,
          mechanism: entryValues.mechanism || "按商务文档机制执行",
          trial,
          luckyBag,
          luckyBagOther,
          cooperation,
          cancelReason: entryValues.cancelReason,
          canceledAt: scheduleStatus === "已取消" ? currentSyncTime() : "",
          source: "商务通过文档录入发布专场需求，待各支持组负责人派工。",
          progress: 25,
          nodesDone: 1,
          nodesTotal: 4,
          supportModules: Object.entries(entrySupportEnabled).filter(([, enabled]) => enabled !== false).map(([key]) => key)
        });
        state.selected = newId;
        enterDispatchWorkspace("content", newId);
        toast("需求已发布，进入支持组派工");
        render();
        return;
      }
      if (name === "runAnalysis") toast("已重新识别字段，并刷新四类需求判断");
      if (name === "archive") toast("复盘报告已生成");
      if (name === "openTaskDetails") {
        openTaskDetailsDrawer();
        return;
      }
      if (name === "openCompletedSpecials") {
        openCompletedSpecialsDrawer();
        return;
      }
      if (name === "downloadOrders") {
        downloadOrders();
        return;
      }
      if (name === "downloadMonthlyReport") {
        downloadMonthlyReport();
        return;
      }
      if (name === "openLog") {
        openLogDrawer();
        return;
      }
      if (name === "createTask") {
        const moduleNeeds = needs.filter(item => item.module === state.module);
        if (!moduleNeeds.length) { toast("当前模块暂无需求"); return; }
        const task = {
          id: `T-${Date.now()}`,
          need: moduleNeeds[0].id,
          module: state.module,
          title: $("#taskTitle") ? $("#taskTitle").value : taskSuggestion(state.module),
          owner: $("#taskOwner") ? $("#taskOwner").value : "待分配",
          due: $("#taskDue") ? $("#taskDue").value : "06/17",
          status: "待执行",
          done: false
        };
        tasks.push(task);
        moduleNeeds[0].status = "已派工";
        toast("已为组员安排任务");
      }
      render();
    }

    function openTaskDetailsDrawer() {
      const items = filteredDataItems();
      openDrawer(
        "任务明细",
        `<div class="stack"><div class="meta">${badge(`${items.length} 条任务`, "orange")}<span>${formatDate(state.dataStart)} - ${formatDate(state.dataEnd)}</span></div><div class="table-wrap">${dataTaskTable(items)}</div></div>`,
        `<button class="btn primary" data-close>关闭</button>`,
        true,
        true
      );
    }

    function openCompletedSpecialsDrawer() {
      const rows = completedSpecialRows();
      openDrawer(
        "每日完成专场统计",
        `<div class="stack"><div class="meta">${badge(`${rows.length} 个专场`, rows.length ? "green" : "")}<span>${formatDate(state.dataStart)} - ${formatDate(state.dataEnd)}</span></div><div class="table-wrap">${completedSpecialTable(rows)}</div></div>`,
        `<button class="btn ghost" data-close>关闭</button><button class="btn primary" data-action="downloadOrders">下载订单</button>`,
        true
      );
    }

    function downloadOrders() {
      const rows = completedSpecialRows();
      if (!rows.length) {
        toast("当前时间范围内暂无可下载订单");
        return;
      }
      const headers = ["完成日期", "专场名", "达人名称", "达人UID", "跟进商务", "预计GMV", "实际GMV", "负责人员"];
      const csvRows = rows.map(row => [formatDate(row.date), row.title, row.talent, row.uid, row.business, row.expectedGmv, row.actualGmv, row.taskOwners || "暂无负责人员"]);
      const csv = [headers, ...csvRows].map(row => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `达人专场订单_${state.dataStart}_${state.dataEnd}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast("订单文件已生成");
    }

          record.expectedGmv || record.sales,

          item.reason
        ];
      });

      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast("月报文件已生成");
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    function specialValue(label, fallback = "") {
      const infoGroup = specialDetailGroups.find(group => group.title === "专场信息");
      const item = infoGroup ? infoGroup.fields.find(field => field.label === label) : null;
      return item ? item.value : fallback;
    }

    function specialGroupValue(groupTitle, label, fallback = "") {
      const group = specialDetailGroups.find(item => item.title === groupTitle);
      const field = group ? group.fields.find(item => item.label === label) : null;
      return field ? field.value : fallback;
    }

    function entrySpecialInfoValues() {
      return {
        specialName: specialValue("专场名称", ""),
        uid: specialValue("达人 UID", ""),
        talent: specialValue("达人昵称", ""),
        liveTime: specialValue("专场排期（时间）", "").replace("T", " "),
        business: specialValue("负责商务", ""),
        scheduleStatus: specialValue("状态", "已排期"),
        cancelReason: specialValue("取消原因", ""),
        type: specialValue("类型", "专场"),
        liveRoom: specialValue("直播间", liveRoomOptions[0]),
        product: specialValue("主推产品", ""),
        mechanism: specialValue("主推机制", "按商务文档机制执行"),
        expectedGmv: specialValue("目标销售额", specialValue("预估销售额", "")),
        trial: specialValue("是否有试用", "不支持试用"),
        luckyBag: specialValue("福袋需求", ""),
        luckyBagOther: specialValue("其他福袋需求", ""),
        cooperation: specialValue("达人配合度", "")
      };
    }

    function entrySpecialRequiredErrors(values = entrySpecialInfoValues()) {
      const group = specialDetailGroups.find(item => item.title === "专场信息");
      if (!group) return [];
      const errors = [];
      group.fields.forEach((field, fieldIndex) => {
        if (!field.required || !shouldShowDetailField(specialDetailGroups.indexOf(group), field)) return;
        if (!String(field.value ?? "").trim()) errors.push(field.label);
      });
      if (values.scheduleStatus === "已取消" && !values.cancelReason) errors.push("取消原因");
      return errors;
    }

    function findEntryLinkedRecord(values) {
      const uid = String(values.uid || "").trim();
      const specialName = String(values.specialName || "").trim();
      const talent = String(values.talent || "").trim();
      const liveAt = formatDate(values.liveTime);
      return records.find(record => uid && record.uid === uid)
        || records.find(record => specialName && (record.specialName || record.title) === specialName)
        || records.find(record => talent && record.talent === talent && formatDate(record.liveTime) === liveAt)
        || null;
    }

    function saveEntrySpecialInfo() {
      const values = entrySpecialInfoValues();
      const requiredErrors = entrySpecialRequiredErrors(values);
      if (requiredErrors.length) {
        toast(`请完善：${requiredErrors[0]}`);
        return;
      }
      const record = findEntryLinkedRecord(values);
      if (!record) {
        toast("未找到匹配的已发布专场，请先发布需求后再提交修改");
        return;
      }
      const { stakeholders } = applySpecialInfoValues(record, values, "商务");
      state.selected = record.id;
      toast(`已提交修改，并通知 ${stakeholders.length} 位支持人员`);
      render();
    }

    function entryRequiredErrors() {
      const errors = [];
      specialDetailGroups.forEach((group, groupIndex) => {
        if (group.supportKey && entrySupportEnabled[group.supportKey] === false) return;
        group.fields.forEach(field => {
          if (!field.required || !shouldShowDetailField(groupIndex, field)) return;
          const value = field.type === "computed-shot-count" ? (field.value || shootCountAutoText()) : field.value;
          if (!String(value ?? "").trim()) errors.push(field.label);
        });
      });
      const needShoot = specialGroupValue("剪辑支持", "是否需要拍剪");
      const beautyHabit = specialGroupValue("剪辑支持", "是否有达人美颜参数习惯？");
      const beautyParams = specialGroupValue("剪辑支持", "美颜参数说明");
      if (entrySupportEnabled.edit !== false && needShoot === "是" && beautyHabit === "是" && (!String(beautyParams || "").trim() || beautyParams === "无")) {
        errors.push("美颜参数说明");
      }
      return errors;
    }

    function entryUrgency() {
      return talentGradeFromSales(specialValue("目标销售额", specialValue("预估销售额", "0")));
    }

    function openNode(id) {
      const record = selectedRecord();
      const node = projectTaskRecords(record).find(item => item.id === id);
      if (!node) return;
      openDrawer(node.name, `<div class="stack">
        ${field("所属专场", record.title)}
        ${field("支持模块", node.moduleName)}
        ${field("模块负责人", node.moduleOwner)}
        ${field("执行组员", node.owner)}
        ${field("计划完成", formatDate(node.fullDate))}
        ${field("任务说明", node.note)}
        ${field("完成状态", node.status)}
      </div>`);
    }

    function openNeed(id) {
      const need = needs.find(item => item.id === id);
      const module = modules[need.module];
      openDrawer(need.title, `<div class="stack">${field("需求模块", module.name)}${field("负责人", module.owner)}${field("识别依据", need.source)}${field("识别置信度", `${need.confidence}%`)}${field("当前状态", need.status)}</div>`, `<button class="btn ghost" data-close>关闭</button><button class="btn primary" data-jump-module="${need.module}">去派工</button>`);
    }

    function openTask(id) {
      const task = tasks.find(item => item.id === id);
      openDrawer(task.title, `<div class="stack">${field("所属模块", modules[task.module].name)}${field("组员", task.owner)}${field("完成时间", task.due)}${field("当前状态", task.status)}</div>`, `<button class="btn ghost" data-close>关闭</button><button class="btn primary" data-complete="${task.id}">${task.done ? "恢复任务" : "标记完成"}</button>`);
    }

    function openRecordDrawer() {
      const record = selectedRecord();
      openDrawer("专场记录表原文", `<div class="stack">${field("达人", record.talent)}${field("达人 UID", record.uid)}${field("开播时间", record.liveTime)}${field("直播间", escapeHtml(recordLiveRoom(record)))}${field("负责商务", record.business)}${field("状态", record.scheduleStatus || record.status)}${field("类型", record.type || "专场")}${field("主推产品", record.product)}${field("记录来源", "商务填写专场记录表 / 飞书表格同步")}</div>`);
    }

    function openLogDrawer() {
      openDrawer("项目事件日志", `<div class="stack">
        <div style="display:grid;gap:18px">${logs.map(item => `<div style="display:grid;grid-template-columns:18px 1fr;gap:14px;align-items:start">
          <span style="width:14px;height:14px;border-radius:50%;background:${item.color === "green" ? "var(--green)" : "var(--orange)"};margin-top:5px"></span>
          <div><div class="muted">${item.time}</div><strong>${item.user} ${item.action}</strong></div>
        </div>`).join("")}</div>
      </div>`);
    }

    function toggleTask(id, done) {
      const task = tasks.find(item => item.id === id);
      task.done = done;
      task.status = done ? "已完成" : "进行中";
      toast(done ? "任务已标记完成" : "任务已恢复为进行中");
      render();
    }

    function openDrawer(title, body, foot = `<button class="btn primary" data-close>关闭</button>`, wide = false, center = false) {
      $("#drawerTitle").textContent = title;
      $("#drawerBody").innerHTML = body;
      $("#drawerFoot").innerHTML = foot;
      $("#drawer").classList.toggle("wide", wide);
      $("#drawer").classList.toggle("center", center);
      $("#drawer").classList.add("show");
      $("#mask").classList.add("show");
      bindDrawer();
    }

    function closeDrawer() {
      $("#drawer").classList.remove("show");
      $("#drawer").classList.remove("wide");
      $("#drawer").classList.remove("center");
      $("#mask").classList.remove("show");
    }

    function bindDrawer() {
      document.querySelectorAll("[data-close]").forEach(btn => btn.addEventListener("click", closeDrawer));
      document.querySelectorAll("#drawer [data-module-task-tab]").forEach(btn => btn.addEventListener("click", () => openModuleTaskDialog(btn.dataset.moduleTaskTab)));
      document.querySelectorAll("#drawer [data-action]").forEach(btn => btn.addEventListener("click", () => action(btn.dataset.action)));
      document.querySelectorAll("#drawer [data-open-project]").forEach(btn => btn.addEventListener("click", () => {
        state.selected = btn.dataset.openProject;
        state.view = "detail";
        closeDrawer();
        render();
      }));
      document.querySelectorAll("[data-jump-module]").forEach(btn => btn.addEventListener("click", () => { enterDispatchWorkspace(btn.dataset.jumpModule); closeDrawer(); render(); }));
      document.querySelectorAll("[data-complete]").forEach(btn => btn.addEventListener("click", () => { const task = tasks.find(item => item.id === btn.dataset.complete); task.done = !task.done; task.status = task.done ? "已完成" : "进行中"; closeDrawer(); toast(task.done ? "任务已完成" : "任务已恢复"); render(); }));
      document.querySelectorAll("[data-toggle-module-task-log]").forEach(btn => btn.addEventListener("click", () => toggleModuleTaskLog(btn.dataset.toggleModuleTaskLog)));
      document.querySelectorAll("#drawer [data-task-memo-draft]").forEach(input => input.addEventListener("input", () => updateTaskMemoDraft(input.dataset.taskMemoDraft, input.value)));
      document.querySelectorAll("#drawer [data-save-task-memo]").forEach(btn => btn.addEventListener("click", () => saveTaskMemo(btn.dataset.saveTaskMemo)));
      document.querySelectorAll("#drawer [data-close-task-memo]").forEach(btn => btn.addEventListener("click", () => closeTaskMemo(btn.dataset.closeTaskMemo)));
      document.querySelectorAll("#drawer [data-save-info-editor]").forEach(btn => btn.addEventListener("click", () => saveSpecialInfoEditor(btn.dataset.saveInfoEditor)));
      document.querySelectorAll("#drawer [data-toggle-task-memo]").forEach(btn => btn.addEventListener("click", () => toggleTaskMemo(btn.dataset.toggleTaskMemo)));
      document.querySelectorAll("#drawer [data-calendar-task-upload]").forEach(input => input.addEventListener("change", () => {
        const key = input.dataset.calendarTaskUpload;
        const parentKey = input.dataset.calendarParent;
        const returnToEditor = input.dataset.calendarEditor === "true";
        uploadTaskFiles(key, input.files);
        if (returnToEditor) openMyTaskSubtaskEditor(key, parentKey);
        else openMyTaskCalendarDetail(parentKey);
      }));
      document.querySelectorAll("#drawer [data-calendar-task-edit]").forEach(btn => btn.addEventListener("click", () => {
        openMyTaskSubtaskEditor(btn.dataset.calendarTaskEdit, btn.dataset.calendarParent);
      }));
      document.querySelectorAll("#drawer [data-calendar-edit-back]").forEach(btn => btn.addEventListener("click", () => {
        dismissDispatchTaskEdit(btn.dataset.calendarEditKey);
        openMyTaskCalendarDetail(btn.dataset.calendarEditBack);
      }));
      document.querySelectorAll("#drawer [data-calendar-edit-save]").forEach(btn => btn.addEventListener("click", () => {
        if (saveDispatchTaskEdit(btn.dataset.calendarEditSave)) openMyTaskCalendarDetail(btn.dataset.calendarParent);
      }));
      document.querySelectorAll("#drawer [data-advance-task]").forEach(btn => btn.addEventListener("click", () => {
        closeDrawer();
        advanceMyTask(btn.dataset.advanceTask, btn.dataset.nextStatus);
      }));
      document.querySelectorAll("#drawer [data-subtask-title]").forEach(input => input.addEventListener("input", () => {
        const [recordId, moduleKey, index] = input.dataset.subtaskTitle.split(":");
        tasksFor(recordId, moduleKey)[Number(index)].title = input.value;
      }));
      document.querySelectorAll("#drawer [data-subtask-owner]").forEach(input => input.addEventListener("change", () => {
        const [recordId, moduleKey, index] = input.dataset.subtaskOwner.split(":");
        tasksFor(recordId, moduleKey)[Number(index)].owner = input.value;
      }));
      document.querySelectorAll("#drawer [data-subtask-due]").forEach(input => input.addEventListener("change", () => {
        const [recordId, moduleKey, index] = input.dataset.subtaskDue.split(":");
        tasksFor(recordId, moduleKey)[Number(index)].due = input.value;
      }));
      document.querySelectorAll("#drawer [data-add-subtask]").forEach(btn => btn.addEventListener("click", () => {
        addDispatchTask(btn.dataset.addSubtask);
        openDispatchEntryDialog(btn.dataset.addSubtask);
      }));
      document.querySelectorAll("#drawer [data-remove-subtask]").forEach(btn => btn.addEventListener("click", () => {
        const pairKey = btn.dataset.removeSubtask.split(":").slice(0, 2).join(":");
        removeDispatchTask(btn.dataset.removeSubtask);
        openDispatchEntryDialog(pairKey);
      }));
      document.querySelectorAll("#drawer [data-publish-dispatch]").forEach(btn => btn.addEventListener("click", () => {
        publishDispatch(btn.dataset.publishDispatch);
        openDispatchEntryDialog(btn.dataset.publishDispatch);
      }));
      document.querySelectorAll("#drawer [data-dispatch-task-detail]").forEach(btn => btn.addEventListener("click", () => openDispatchTaskDetail(btn.dataset.dispatchTaskDetail)));
      document.querySelectorAll("#drawer [data-edit-dispatch-task]").forEach(btn => btn.addEventListener("click", () => {
        const key = btn.dataset.editDispatchTask;
        startDispatchTaskEdit(key);
        openDispatchEntryDialog(key.split(":").slice(0, 2).join(":"));
      }));
      document.querySelectorAll("#drawer [data-dispatch-edit-title]").forEach(input => input.addEventListener("input", () => updateDispatchTaskEdit(input.dataset.dispatchEditTitle, "title", input.value)));
      document.querySelectorAll("#drawer [data-dispatch-edit-owner]").forEach(input => input.addEventListener("change", () => updateDispatchTaskEdit(input.dataset.dispatchEditOwner, "owner", input.value)));
      document.querySelectorAll("#drawer [data-dispatch-edit-due]").forEach(input => input.addEventListener("change", () => updateDispatchTaskEdit(input.dataset.dispatchEditDue, "due", input.value)));
      document.querySelectorAll("#drawer [data-dismiss-dispatch-edit]").forEach(btn => btn.addEventListener("click", () => {
        const key = btn.dataset.dismissDispatchEdit;
        dismissDispatchTaskEdit(key);
        openDispatchEntryDialog(key.split(":").slice(0, 2).join(":"));
      }));
      document.querySelectorAll("#drawer [data-save-dispatch-edit]").forEach(btn => btn.addEventListener("click", () => {
        const key = btn.dataset.saveDispatchEdit;
        if (saveDispatchTaskEdit(key)) openDispatchEntryDialog(key.split(":").slice(0, 2).join(":"));
      }));
      document.querySelectorAll("#drawer [data-cancel-task]").forEach(btn => btn.addEventListener("click", () => {
        const pairKey = btn.dataset.cancelTask.split(":").slice(0, 2).join(":");
        startCancelTask(btn.dataset.cancelTask);
        openDispatchEntryDialog(pairKey);
      }));
      document.querySelectorAll("#drawer [data-cancel-task-reason]").forEach(input => input.addEventListener("input", () => updateCancelTaskDraft(input.dataset.cancelTaskReason, input.value)));
      document.querySelectorAll("#drawer [data-dismiss-cancel-task]").forEach(btn => btn.addEventListener("click", () => {
        const pairKey = btn.dataset.dismissCancelTask.split(":").slice(0, 2).join(":");
        dismissCancelTask(btn.dataset.dismissCancelTask);
        openDispatchEntryDialog(pairKey);
      }));
      document.querySelectorAll("#drawer [data-save-cancel-task]").forEach(btn => btn.addEventListener("click", () => {
        const pairKey = btn.dataset.saveCancelTask.split(":").slice(0, 2).join(":");
        saveCancelTask(btn.dataset.saveCancelTask);
        openDispatchEntryDialog(pairKey);
      }));
    }

    function toast(message) {
      const el = $("#toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
    }

    $("#drawerClose").addEventListener("click", closeDrawer);
    $("#mask").addEventListener("click", closeDrawer);
    document.addEventListener("keydown", event => { if (event.key === "Escape") closeDrawer(); });
    render();
  </script>
  <script>
    // Keep artifact upload actions aligned with the task state machine.
    (() => {
      const uploadActionLabels = ["上传文件", "上传本地文件", "本地文件", "飞书链接"];

      function taskRowAllowsUpload(row) {
        const text = row.textContent || "";
        return (text.includes("内容支持") && text.includes("编写中"))
          || (text.includes("剪辑支持") && text.includes("剪辑中"));
      }

      function syncTaskUploadActions(root = document) {
        root.querySelectorAll(".task-calendar-detail-row").forEach((row) => {
          const allowUpload = taskRowAllowsUpload(row);
          row.querySelectorAll("button, label, a").forEach((control) => {
            const label = (control.textContent || "").trim();
            const isUploadAction = uploadActionLabels.some((name) => label.includes(name));
            if (isUploadAction) control.hidden = !allowUpload;
          });
        });
      }

      const observer = new MutationObserver(() => syncTaskUploadActions());
      observer.observe(document.body, { childList: true, subtree: true });
      syncTaskUploadActions();
    })();
  </script>
  <!-- Task files can only be changed while the assignee is actively producing them. -->
  <script>
    (() => {
      const artifactActionLabels = new Set(["上传文件", "编辑任务"]);
      const taskStatuses = new Set([
        "待办任务", "编写中", "待审核", "待拍摄", "剪辑中",
        "千川待审核", "审核通过", "待发布", "已发布", "待投放", "已投放"
      ]);

      function getCurrentTaskStatus(row) {
        const candidates = row.querySelectorAll(".badge, .status, [class*='status']");
        for (const candidate of candidates) {
          const value = candidate.textContent.trim();
          if (taskStatuses.has(value)) return value;
        }

        for (const candidate of row.querySelectorAll("*")) {
          if (candidate.children.length === 0) {
            const value = candidate.textContent.trim();
            if (taskStatuses.has(value)) return value;
          }
        }
        return "";
      }

      function syncArtifactActions(root = document) {
        root.querySelectorAll(".task-calendar-detail-row").forEach((row) => {
          const text = row.textContent || "";
          const status = getCurrentTaskStatus(row);
          const canEditArtifact =
            (text.includes("内容支持") && status === "编写中") ||
            (text.includes("剪辑支持") && status === "剪辑中");

          row.querySelectorAll("button").forEach((button) => {
            if (artifactActionLabels.has(button.textContent.trim())) {
              button.hidden = !canEditArtifact;
              button.style.display = canEditArtifact ? "" : "none";
            }
          });
        });
      }

      let updateQueued = false;
      const scheduleArtifactSync = () => {
        if (updateQueued) return;
        updateQueued = true;
        requestAnimationFrame(() => {
          updateQueued = false;
          syncArtifactActions();
        });
      };

      new MutationObserver(scheduleArtifactSync).observe(document.body, {
        childList: true,
        subtree: true
      });
      scheduleArtifactSync();
    })();
  </script>
