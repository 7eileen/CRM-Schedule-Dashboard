        task.feishuPushHistory.slice().reverse().forEach(item => records.push({
          meta: `${formatDate(item.time)} · 飞书机器人`,
          text: `已推送给 ${escapeHtml((item.recipients || []).join("、") || "关联人员")}：${escapeHtml(item.message || "")}`
        }));
      }
      if (task.status === "待审核" && task.submittedAt) {
        records.push({ meta: `提交记录 · ${formatDate(task.submittedAt)}`, text: "已上传完成，任务自动闭环" });
      }
      if (task.status === "已取消" && task.cancelReason) {
        records.push({ meta: "取消记录", text: escapeHtml(task.cancelReason) });
      }
      return records;
    }

    function toggleModuleTaskLog(key) {
      const [recordId, moduleKey] = key.split(":");
      const task = taskByKey(key);
      if (!task) return;
      task.logOpen = !task.logOpen;
      openModuleTaskDialog(`${recordId}:${moduleKey}`);
    }

    function needCard(need) {
      const module = modules[need.module];
      const statusCls = need.status === "需确认" ? "red" : need.status === "已派工" ? "green" : "orange";
      return `<button class="need-card" data-need="${need.id}">
        <div class="row"><strong>${need.title}</strong>${badge(need.status, statusCls)}</div>
        <div class="meta">${badge(module.name, module.cls)}<span>置信度 ${need.confidence}%</span><span>${need.source}</span></div>
      </button>`;
    }

    function pageDispatch(options = {}) {
      const embedded = options.embedded === true;
      const visibleModules = embedded ? dispatchModuleOrder : (taskDispatchModules().length ? taskDispatchModules() : moduleOrder);
      if (!visibleModules.includes(state.module)) state.module = visibleModules[0];
      const poolRecords = dispatchPoolRecords(state.module);
      const pending = poolRecords.length;
      const standaloneTabs = embedded ? "" : `<section class="module-tabs">${visibleModules.map(moduleTab).join("")}</section>`;
      const headActions = embedded
        ? dispatchModuleSwitcher(visibleModules)
        : badge(`${pending} 个待派发`, pending ? "orange" : "green");
      const monthPicker = dispatchMonthPicker();
      return `${standaloneTabs}
      <section class="panel">
        <div class="panel-head">
          <div><h2 class="panel-title">${supportNeeds[state.module].title}工作台</h2></div>
          <div class="dispatch-head-actions">${monthPicker}${headActions}</div>
        </div>
        <div class="panel-body">
          ${dispatchCalendar(poolRecords, state.module)}
        </div>
      </section>`;
    }

    function dispatchMonthPicker() {
      const month = state.taskMonth || "2026-06";
      return `<label class="calendar-month-picker dispatch-month-picker"><span>月份</span><input class="input" type="month" value="${month}" data-task-month></label>`;
    }

    function dispatchModuleSwitcher(visibleModules) {
      const order = dispatchModuleOrder
        .filter(key => visibleModules.includes(key))
        .concat(visibleModules.filter(key => !dispatchModuleOrder.includes(key)));
      const labelMap = { ops: "运营", edit: "剪辑", content: "内容", ads: "投放" };
      return `<div class="task-module-tabs dispatch-module-tabs" aria-label="需求派发模块切换">${order.map(key => {
        const pending = dispatchPoolRecords(key).length;
        return `<button class="task-module-tab ${state.module === key ? "active" : ""}" data-module="${key}" data-go="dispatch">${labelMap[key] || supportNeeds[key].title}<i>${pending}</i></button>`;
      }).join("")}</div>`;
    }

    function dispatchCalendar(poolRecords, moduleKey) {
      const month = state.taskMonth || "2026-06";
      const [year, rawMonth] = month.split("-").map(Number);
      const first = new Date(year, rawMonth - 1, 1);
      const last = new Date(year, rawMonth, 0);
      const startOffset = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const totalCells = Math.ceil((startOffset + last.getDate()) / 7) * 7;
      const weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
      const monthRecords = poolRecords
        .filter(record => dispatchCalendarDate(record, moduleKey).slice(0, 7) === month)
        .sort((a, b) => dispatchCalendarDate(a, moduleKey).localeCompare(dispatchCalendarDate(b, moduleKey)) || gradeRank(a.grade) - gradeRank(b.grade));
      const cells = Array.from({ length: totalCells }, (_, index) => {
        const day = index - startOffset + 1;
        const inMonth = day >= 1 && day <= last.getDate();
        const dateText = inMonth ? `${month}-${String(day).padStart(2, "0")}` : "";
        const dayRecords = inMonth
          ? monthRecords.filter(record => dispatchCalendarDate(record, moduleKey) === dateText)
          : [];
        const expanded = state.dispatchCalendarExpandedDay === dateText;
        const visibleRecords = expanded ? dayRecords : dayRecords.slice(0, 3);
        const hiddenCount = dayRecords.length - visibleRecords.length;
        const moreButton = hiddenCount > 0
          ? `<button class="calendar-more" data-dispatch-calendar-day-toggle="${dateText}">还有 ${hiddenCount} 条</button>`
          : expanded && dayRecords.length > 3
            ? `<button class="calendar-more" data-dispatch-calendar-day-toggle="${dateText}">收起</button>`
            : "";
        return `<div class="calendar-cell ${inMonth ? "" : "is-muted"} ${dayRecords.length > 3 ? "has-many" : ""} ${expanded ? "is-expanded" : ""}">
          <div class="calendar-day"><span>${inMonth ? day : ""}</span>${dayRecords.length ? badge(`${dayRecords.length}条`, "orange") : ""}</div>
          ${visibleRecords.map(record => dispatchCalendarEvent(record, moduleKey)).join("")}
          ${moreButton}
        </div>`;
      });
      return `<div class="dispatch-calendar">
        ${monthRecords.length ? `<div class="calendar-grid">
          ${weekdays.map(day => `<div class="calendar-weekday">${day}</div>`).join("")}
          ${cells.join("")}
        </div>` : `<div class="task-calendar-empty">当前需求池暂无待派发任务</div>`}
      </div>`;
    }

    function dispatchCalendarDate(record, moduleKey) {
      return String(dispatchDue(record.id, moduleKey) || record.liveTime || "").replaceAll("/", "-").slice(0, 10);
    }

    function dispatchCalendarEvent(record, moduleKey) {
      const dispatchKey = `${record.id}:${moduleKey}`;
      const taskList = tasksFor(record.id, moduleKey);
      const workflowStatus = calendarWorkflowStatus(record, moduleKey, taskList);
      const noticeCount = taskNoticeCount(taskList);
      const active = state.dispatchOpen === dispatchKey;
      return `<button class="calendar-event dispatch-calendar-event ${active ? "is-active" : ""}" data-toggle-dispatch="${dispatchKey}">
        <span class="dispatch-calendar-title"><span>${escapeHtml(record.talent)} ${shortLiveDate(record.liveTime)}</span>${summaryNoticeDot(noticeCount, "该专场有新增子任务提醒")}</span>
        <span class="dispatch-calendar-sub">${escapeHtml(record.product)} · ${supportNeeds[moduleKey].title}</span>
        <span class="dispatch-calendar-meta"><span>预计完成 ${formatMonthDay(dispatchCalendarDate(record, moduleKey))}</span><span>${taskList.length} 子任务</span></span>
        ${calendarProgressPopover(record, moduleKey, workflowStatus)}
      </button>`;
    }

    function dispatchDetailPanel(record, moduleKey) {
      const assignment = assignmentFor(record.id, moduleKey);
      const module = modules[moduleKey];
      const taskList = tasksFor(record.id, moduleKey);
      const statusCls = taskStatusClass(assignment.status);
      const published = assignment.status !== "待派发";
      const draftCount = taskList.filter(task => task.isDraft).length;
      return `<div class="dispatch-calendar-detail" data-dispatch-entry-panel>
        <div class="dispatch-detail">
          <div class="dispatch-main">
            ${myTaskSpecialInfo(record)}
            <div class="demand-text">
              <strong>${supportNeeds[moduleKey].title}需求内容</strong>
              ${demandText(record, moduleKey)}
            </div>
            <div class="task-builder">
              <div class="task-builder-head">
                <div class="task-builder-title">
                  <strong>${published ? "任务观察" : "新建任务"}</strong>
                  ${badge(assignment.status, statusCls)}
                </div>
                <div class="task-builder-head-actions">
                  <button type="button" class="dispatch-add-task" data-add-subtask="${record.id}:${moduleKey}" title="新建任务" aria-label="新建任务">+</button>
                </div>
              </div>
              ${published ? taskObserverList(record.id, moduleKey, taskList) : `<div class="task-list">${taskList.map((task, index) => taskRow(record.id, moduleKey, task, index)).join("")}</div>`}
              ${!published || draftCount ? `<div class="task-actions">
                ${published ? badge(`${draftCount} 条待发布`, "orange") : ""}
                <button class="btn primary" data-publish-dispatch="${record.id}:${moduleKey}">${assignment.status === "待派发" ? "发布派工" : "发布新增任务"}</button>
              </div>` : ""}
            </div>
          </div>
        </div>
      </div>`;
    }

    function openDispatchEntryDialog(key) {
      const [recordId, moduleKey] = key.split(":");
      const record = records.find(item => item.id === recordId);
      if (!record || !supportNeeds[moduleKey]) return;
      const title = `${supportNeeds[moduleKey].title}派工录入`;
      openDrawer(title, dispatchDetailPanel(record, moduleKey), `<button class="btn primary" data-close>关闭</button>`, true, true);
    }

    function moduleTab(key) {
      const module = modules[key];
      const pending = dispatchPoolRecords(key).length;
      return `<button class="module-tab ${state.module === key ? "active" : ""}" data-module="${key}" data-go="dispatch">
        <div class="row"><strong>${supportNeeds[key].title}</strong>${badge(`${pending} 待派发`, pending ? "orange" : "green")}</div>
        <span class="muted">负责人：${module.owner}</span>
      </button>`;
    }

    function dispatchRecoveryItems(moduleKey) {
      return allDispatchTaskItems()
        .filter(item => item.moduleKey === moduleKey && taskRecoveryStatus(item))
        .sort((a, b) => taskRecoverySortValue(a).localeCompare(taskRecoverySortValue(b)));
    }

    function taskRecoveryStatus(item) {
      const task = item.task;
      if (task.status === "待审核") return { key: "done", label: "已回收", cls: "green" };
      if (task.status === "已完成" && (task.submittedAt || task.completedAt || task.reviewedAt || (task.files || []).length)) return { key: "done", label: "已回收", cls: "green" };
      if ((task.files || []).length && task.status !== "已取消") return { key: "uploaded", label: "已上传待提交", cls: "blue" };
      return null;
    }

    function taskRecoverySortValue(item) {
      const status = taskRecoveryStatus(item);
      const rank = { uploaded: "0", done: "1" }[status?.key] || "9";
      return `${rank}-${taskDataDate(item.task)}-${item.record.liveTime}`;
    }

    function assignmentFor(recordId, moduleKey) {
      if (!dispatchAssignments[recordId]) dispatchAssignments[recordId] = {};
      if (!dispatchAssignments[recordId][moduleKey]) {
        dispatchAssignments[recordId][moduleKey] = {
          owner: defaultOwnerFor(recordId, moduleKey),
          due: defaultDue(records.find(record => record.id === recordId)),
          status: defaultAssignmentStatus(recordId, moduleKey)
        };
      }
      return dispatchAssignments[recordId][moduleKey];
    }

    function defaultAssignmentStatus(recordId, moduleKey) {
      return (dispatchPoolSamples[moduleKey] || []).includes(recordId) ? "待派发" : "已派发";
    }

    function isDispatchPublished(recordId, moduleKey) {
      const isPendingSample = (dispatchPoolSamples[moduleKey] || []).includes(recordId);
      return !isPendingSample || assignmentFor(recordId, moduleKey).status !== "待派发";
    }

    function defaultOwnerFor(recordId, moduleKey) {
      const override = recordMemberOverrides[recordId]?.[moduleKey];
      if (override) return override[0] || "待分配";
      return moduleMembers[moduleKey][0] || "待分配";
    }

    function applySeedMemberOverrides() {
      Object.entries(recordMemberOverrides).forEach(([recordId, moduleMap]) => {
        Object.entries(moduleMap).forEach(([moduleKey, memberList]) => {
          const owner = memberList[0] || "待分配";
          if (!dispatchAssignments[recordId]) dispatchAssignments[recordId] = {};
          if (!dispatchAssignments[recordId][moduleKey]) {
            dispatchAssignments[recordId][moduleKey] = {
              owner,
              due: defaultDue(records.find(record => record.id === recordId)),
              status: defaultAssignmentStatus(recordId, moduleKey)
            };
          } else {
            dispatchAssignments[recordId][moduleKey].owner = owner;
          }
          const taskList = dispatchTasks[recordId]?.[moduleKey];
          if (taskList && taskList.length) {
            taskList.forEach((task, index) => {
              task.owner = memberList[index] || owner;
            });
          }
        });
      });
    }

    function seedSpecialNoticeTasks() {
      const seedModules = ["content", "ads", "ops"];
      records.forEach((record, recordIndex) => {
        if (!dispatchTasks[record.id]) dispatchTasks[record.id] = {};
        const existingTasks = Object.values(dispatchTasks[record.id]).flat();
        let noticeCount = existingTasks.filter(task => task.businessNotice || task.isNew).length;
        existingTasks.forEach(task => {
          if (noticeCount >= 3) return;
          if (task.status === "已完成" || task.status === "已取消" || task.businessNotice) return;
          task.businessNotice = "new";
          task.noticeAt = actionDate;
          noticeCount += 1;
        });
        seedModules.forEach((moduleKey, moduleIndex) => {
          if (noticeCount >= 3) return;
          const list = tasksFor(record.id, moduleKey);
          const hasNewNotice = list.some(task => task.businessNotice === "new" || task.isNew);
          if (hasNewNotice) return;
          const templateIndex = (recordIndex + moduleIndex) % taskTemplates[moduleKey].length;
          const seedTask = list.find(task => task.status !== "已完成" && task.status !== "已取消" && !task.businessNotice);
          const seedData = {
            title: taskTemplates[moduleKey][templateIndex],
            owner: defaultOwnerFor(record.id, moduleKey),
            due: defaultDue(record),
            status: "待处理",
            businessNotice: "new",
            noticeAt: actionDate,
            isNew: true
          };
          if (seedTask) {
            Object.assign(seedTask, seedData, {
              title: seedTask.title || seedData.title,
              owner: seedTask.owner || seedData.owner,
              due: seedTask.due || seedData.due
            });
          } else {
            list.push(seedData);
          }
          noticeCount += 1;
        });
      });
    }

    function seedMyTaskBoardSamples() {
      records.forEach((record, recordIndex) => {
        moduleOrder.forEach(moduleKey => {
          const statuses = moduleWorkflowStatuses[moduleKey];
          const taskList = tasksFor(record.id, moduleKey);
          const contentSample = moduleKey === "content"
            ? contentWorkflowRecordSamples[record.id]
              || Object.values(contentWorkflowRecordSamples).find(sample => sample.talent === record.talent)
            : null;
          if (contentSample) {
            taskList.forEach(task => {
              setTaskWorkflowStatus(task, moduleKey, contentSample.status, record, { silent: true });
              task.docNote = contentSample.note;
              task.files = contentSample.file ? [contentSample.file] : [];
              if (contentSample.submittedAt) task.submittedAt = contentSample.submittedAt;
              else delete task.submittedAt;
              if (contentSample.reviewedAt) task.reviewedAt = contentSample.reviewedAt;
              else delete task.reviewedAt;
              if (contentSample.completedAt) task.completedAt = contentSample.completedAt;
              else if (!isTaskWorkflowDone(contentSample.status)) delete task.completedAt;
              task.businessNotice = "status";
              task.noticeAt = actionDate;
            });
            return;
          }
          taskList.forEach((task, taskIndex) => {
            if (task.workflowStatus || task.status === "延期中" || task.status === "已取消") return;
            if (task.status === "已完成") {
              task.workflowStatus = moduleKey === "ads" ? "已投放" : moduleKey === "ops" ? "已完成" : "已发布";
              return;
            }
            task.workflowStatus = statuses[(recordIndex + taskIndex) % statuses.length];
            if (isTaskWorkflowDone(task.workflowStatus)) {
              task.status = "已完成";
              task.completedAt = task.completedAt || actionDate;
            }
          });
        });
      });
    }

    function normalizeLegacyTaskFields() {
      Object.entries(dispatchTasks).forEach(([recordId, moduleMap]) => {
        Object.entries(moduleMap).forEach(([moduleKey, taskList]) => {
          taskList.forEach(task => {
            if (task.workflowStatus === "千川审核中") task.workflowStatus = "千川待审核";
          });
        });
        Object.entries(dispatchAssignments[recordId] || {}).forEach(([moduleKey, assignment]) => {
          if (!assignment || assignment.status !== "千川审核中") return;
          assignment.status = "千川待审核";
        });
      });
    }

    function defaultDue(record) {
      return record && record.liveTime ? record.liveTime.slice(0, 10) : "2026-06-17";
    }

    function tasksFor(recordId, moduleKey) {
      if (!dispatchTasks[recordId]) dispatchTasks[recordId] = {};
      if (!dispatchTasks[recordId][moduleKey]) {
        const assignment = assignmentFor(recordId, moduleKey);
        dispatchTasks[recordId][moduleKey] = [{
          title: taskTemplates[moduleKey][0],
          owner: assignment.owner,
          due: assignment.due
        }];
      }
      return dispatchTasks[recordId][moduleKey];
    }

    function dispatchDue(recordId, moduleKey) {
      const dates = tasksFor(recordId, moduleKey).map(task => task.delayDue || task.due).filter(Boolean).sort();
      return dates[dates.length - 1] || assignmentFor(recordId, moduleKey).due;
    }

    function dispatchCard(record, moduleKey) {
      const assignment = assignmentFor(record.id, moduleKey);
      const module = modules[moduleKey];
      const taskList = tasksFor(record.id, moduleKey);
      const statusCls = taskStatusClass(assignment.status);
      const dispatchKey = `${record.id}:${moduleKey}`;
      const open = state.dispatchOpen === dispatchKey;
      const published = assignment.status !== "待派发";
      const draftCount = taskList.filter(task => task.isDraft).length;
      const noticeCount = taskNoticeCount(taskList);
      return `<article class="dispatch-card ${open ? "is-open" : ""}">
        <button class="dispatch-summary" data-toggle-dispatch="${dispatchKey}">
          <div class="dispatch-summary-title"><h3>${record.title}</h3>${summaryNoticeDot(noticeCount, "该专场有新增子任务提醒")}</div>
          <div class="dispatch-summary-meta"><span>预计完成 ${formatDate(dispatchDue(record.id, moduleKey))}</span><span class="dispatch-chevron">⌄</span></div>
        </button>
        ${open ? `<div class="dispatch-detail">
          <div class="dispatch-main">
            ${myTaskSpecialInfo(record)}
            <div class="demand-text">
              <strong>${supportNeeds[moduleKey].title}需求内容</strong>
              ${demandText(record, moduleKey)}
            </div>
            <div class="task-builder">
              <div class="task-builder-head">
                <div class="task-builder-title">
                  <strong>${published ? "任务观察" : "新建任务"}</strong>
                  ${badge(assignment.status, statusCls)}
                </div>
                <div class="task-builder-head-actions">
                  <button type="button" class="dispatch-add-task" data-add-subtask="${record.id}:${moduleKey}" title="新建任务" aria-label="新建任务">+</button>
                </div>
              </div>
              ${published ? taskObserverList(record.id, moduleKey, taskList) : `<div class="task-list">${taskList.map((task, index) => taskRow(record.id, moduleKey, task, index)).join("")}</div>`}
              ${!published || draftCount ? `<div class="task-actions">
                ${published ? badge(`${draftCount} 条待发布`, "orange") : ""}
                <button class="btn primary" data-publish-dispatch="${record.id}:${moduleKey}">${assignment.status === "待派发" ? "发布派工" : "发布新增任务"}</button>
              </div>` : ""}
            </div>
          </div>
        </div>` : ""}
      </article>`;
    }

    function taskObserverList(recordId, moduleKey, taskList) {
      return `<div class="task-observer-list">${taskList.map((task, index) => (
        task.isDraft
          ? taskRow(recordId, moduleKey, task, index)
          : task.editing
            ? taskObserveEditRow(recordId, moduleKey, task, index)
            : taskObserveRow(recordId, moduleKey, task, index)
      )).join("")}</div>`;
    }

    function taskObserveRow(recordId, moduleKey, task, index) {
      const key = `${recordId}:${moduleKey}:${index}`;
      const status = task.status || "待处理";
      const due = task.delayDue || task.due;
      const files = task.files || [];
      return `<article class="task-observe-row">
        ${taskIndexNotice(index, task)}
        <div class="task-observe-title">
          <strong>${escapeHtml(task.title || taskTemplates[moduleKey][0])}</strong>
          <span>${supportNeeds[moduleKey].title}</span>
        </div>
        <div class="task-observe-cell"><span>执行组员</span><strong>${escapeHtml(task.owner || "待分配")}</strong></div>
        <div class="task-observe-cell"><span>计划时间</span><strong>${formatDate(due)}</strong></div>
        <div class="task-observe-cell"><span>状态</span>${badge(status, taskStatusClass(status))}</div>
        <div class="task-observe-note">${taskObservationText(task, moduleKey)}</div>
        <div class="task-observe-files">${files.length ? files.map(name => `<span class="file-chip"><span class="file-chip-name">${escapeHtml(name)}</span></span>`).join("") : `<span class="muted">暂无附件</span>`}</div>
        <div class="task-observe-actions">
          ${status === "已取消" ? "" : `<button class="btn ghost" data-edit-dispatch-task="${key}">编辑</button>`}
          <button class="btn ghost" data-dispatch-task-detail="${key}">查看</button>
          ${status === "已完成" ? "" : `<button class="btn ${status === "已取消" ? "ghost" : "danger"}" data-cancel-task="${key}">${status === "已取消" ? "编辑原因" : "取消"}</button>`}
        </div>
        ${task.cancelEditing ? taskCancelForm(key, task) : ""}
      </article>`;
    }

    function taskObserveEditRow(recordId, moduleKey, task, index) {
      const key = `${recordId}:${moduleKey}:${index}`;
      const draft = task.editDraft || {
        title: task.title || taskTemplates[moduleKey][0],
        owner: task.owner || moduleMembers[moduleKey][0],
        due: task.delayDue || task.due
      };
      const status = task.status || "待处理";
      return `<article class="task-observe-row is-editing">
        ${taskIndexNotice(index, task)}
        <label class="task-field">
          <span>任务名称</span>
          <input class="input" value="${escapeHtml(draft.title)}" data-dispatch-edit-title="${key}">
        </label>
        <label class="task-field">
          <span>执行组员</span>
          <select class="select" data-dispatch-edit-owner="${key}">${moduleMembers[moduleKey].map(owner => `<option ${owner === draft.owner ? "selected" : ""}>${owner}</option>`).join("")}</select>
        </label>
        <label class="task-field">
          <span>预计截止日期</span>
          <input class="input" type="date" value="${escapeHtml(draft.due)}" data-dispatch-edit-due="${key}">
        </label>
        <div class="task-field"><span>状态</span>${badge(status, taskStatusClass(status))}</div>
        <div class="task-observe-edit-note">保存后同步当前子任务信息，并提醒关联人员。</div>
        <div class="task-observe-edit-actions">
          <button class="btn ghost" data-dismiss-dispatch-edit="${key}">取消编辑</button>
          <button class="btn primary" data-save-dispatch-edit="${key}">保存修改</button>
        </div>
      </article>`;
    }

    function taskObservationText(task, moduleKey) {
      const status = task.status || "待处理";
      if (status === "已取消") return `取消原因：${escapeHtml(task.cancelReason || "原因待补充")}`;
      if (status === "延期中") return `延期原因：${escapeHtml(task.delayReason || "原因待补充")}${task.originalDue ? `；原计划 ${formatDate(task.originalDue)}` : ""}`;
      if (status === "已完成") {
        const doneText = task.docNote || task.reviewResult || "任务已完成";
        return `完成说明：${escapeHtml(doneText)}${task.completedAt ? `；完成时间 ${formatDate(task.completedAt)}` : ""}`;
      }
      if (status === "待审核") return `已上传完成${task.submittedAt ? `；提交时间 ${formatDate(task.submittedAt)}` : ""}`;
      if ((task.files || []).length) return "已上传附件，等待提交完成";
      return "暂未回收结果";
    }

    function openDispatchTaskDetail(key) {
      const [recordId, moduleKey, index] = key.split(":");
      const record = records.find(item => item.id === recordId);
      const task = taskByKey(key);
      if (!record || !task) return;
      const status = task.status || "待处理";
      const files = task.files || [];
      const attachmentHtml = files.length
        ? `<span class="task-observe-files">${files.map(name => `<span class="file-chip"><span class="file-chip-name">${escapeHtml(name)}</span></span>`).join("")}</span>`
        : `<span class="muted">暂无上传附件</span>`;
      const body = `<div class="stack">
        ${myTaskSpecialInfo(record)}
        <div class="field-grid">
          ${field("所属专场", escapeHtml(record.title))}
          ${field("支持模块", supportNeeds[moduleKey].title)}
          ${field("任务名称", escapeHtml(task.title || taskTemplates[moduleKey][0]))}
          ${field("执行组员", escapeHtml(task.owner || "待分配"))}
          ${field("计划时间", formatDate(task.delayDue || task.due))}
          ${field("当前状态", badge(status, taskStatusClass(status)))}
          ${moduleKey === "ads" ? field("预估投放销售额", escapeHtml(task.adsForecastGmv || record.adsForecastGmv || "待填写")) : ""}
        </div>
        <div class="field-grid">
          ${field("延期原因", escapeHtml(task.delayReason || "无延期"))}
          ${field("取消原因", escapeHtml(task.cancelReason || "无取消"))}
          ${field("完成说明", escapeHtml(task.docNote || task.reviewResult || (status === "已完成" ? "任务已完成" : "暂无完成说明")))}
          ${field("上传附件", attachmentHtml)}
          ${field("最近备忘", taskLatestMemoHtml(task))}
        </div>
      </div>`;
      openDrawer("子任务详情", body, `<button class="btn primary" data-close>关闭</button>`, false, true);
    }

    function taskLatestMemoHtml(task) {
      const latest = (task.memoHistory || []).slice().reverse()[0];
      if (!latest) return `<span class="muted">暂无备忘记录</span>`;
      return `<span>${escapeHtml(latest.text)}<br><span class="muted">${formatDate(latest.time)} · ${escapeHtml(latest.user || task.owner || "记录人")}</span></span>`;
    }

    function taskRow(recordId, moduleKey, task, index) {
      const key = `${recordId}:${moduleKey}:${index}`;
      const record = records.find(item => item.id === recordId);
      const status = taskWorkflowStatus({ record, moduleKey, task, index, key });
      const statusCls = taskStatusClass(status);
      return `<div class="task-row">
        ${taskIndexNotice(index, task)}
        <label class="task-field">
          <span>任务名称</span>
          <input class="input" value="${task.title}" data-subtask-title="${key}">
        </label>
        <label class="task-field">
          <span>执行组员</span>
          <select class="select" data-subtask-owner="${key}">${moduleMembers[moduleKey].map(owner => `<option ${owner === task.owner ? "selected" : ""}>${owner}</option>`).join("")}</select>
        </label>
        <label class="task-field">
          <span>预计截止日期</span>
          <input class="input" type="date" value="${task.due}" data-subtask-due="${key}">
        </label>
        <div class="task-field">
          <span>状态</span>
          ${badge(status, statusCls === "gray" ? "" : statusCls)}
        </div>
        <div class="task-row-actions">
          <button class="btn ghost task-remove" data-remove-subtask="${key}">删除</button>
        </div>
        ${taskReviewLine(key, moduleKey, task)}
      </div>`;
    }

    function taskReviewLine(key, moduleKey, task) {
      const module = modules[moduleKey];
      if (task.status === "待审核") {
        return `<div class="task-review-line is-done">
          <div class="review-copy">
            <strong>任务已提交完成</strong>
            <span>${task.owner} 于 ${formatDate(task.submittedAt)} 提交完成。</span>
          </div>
        </div>`;
      }
      if (task.status === "已完成" && (task.submittedAt || task.completedAt || task.reviewResult || (task.files || []).length)) {
        return `<div class="task-review-line is-done">
          <div class="review-copy">
            <strong>任务已完成</strong>
            <span>${task.owner || module.owner} 于 ${formatDate(task.submittedAt || task.completedAt || actionDate)} 提交${task.docNote ? `，备注：${escapeHtml(task.docNote)}` : ""}</span>
          </div>
        </div>`;
      }
      return "";
    }

    function formatDate(date) {
      return date ? date.replaceAll("-", "/") : "待选择";
    }

    function demandText(record, moduleKey) {
      const text = {
        content: `内容禁忌：不接受老公出镜、斑驳卡粉痛点画面和演绎剧情；热点背景：首播/孕期等需单独标注；拍摄：确认出镜人员、拍摄时间地点；脚本：5 条，需溯源视频，交付时间按商务填写。`,
        edit: `拍剪需求：产品展示、机制讲解、达人试用反馈；拍剪条数：主页 2 条 / 千川 3 条；二创剪辑：补充 2 条投放素材。`,
        ads: `达人类型：美妆护肤类；达人抖音号：${record.uid}；合作码：QC-HHJ-601 待核验；投放费比 8%，综合费比 27%。`,
        ops: `设备：双机位、补光灯、收音麦；镜像：是；化妆：2 人；福利品：9.9 元洁面小样 200 单；需确认样品与开播检查。`
      }[moduleKey];
      return `<span>${text}</span>`;
    }

    function taskWorkflowStatus(item) {
      const task = item.task || item;
      const moduleKey = item.moduleKey || "";
      const record = item.record || null;
      const rawStatus = task.status || "待处理";
      if (rawStatus === "已取消" || rawStatus === "延期中") return rawStatus;
      const status = task.workflowStatus === "千川审核中"
        ? "千川待审核"
        : task.workflowStatus || legacyWorkflowStatus(rawStatus, moduleKey);
      if (moduleKey === "ads" && status === "待投放" && record && record.liveTime.slice(0, 10) <= todayDate()) return "已投放";
      return status;
    }

    function legacyWorkflowStatus(status, moduleKey) {
      if (workflowStatusList.includes(status)) return status;
      if (status === "千川审核中") return "千川待审核";
      if (status === "待审核") return "待审核";
      if (status === "已完成") return moduleKey === "ads" ? "已投放" : moduleKey === "ops" ? "已完成" : "已发布";
      if (status === "进行中" || status === "执行中" || status === "已派发") return workflowStartStatus(moduleKey);
      return "待办任务";
    }

    function workflowStartStatus(moduleKey) {
      if (moduleKey === "content") return "编写中";
      return "待办任务";
    }

    function setTaskWorkflowStatus(task, moduleKey, status, record = null, options = {}) {
      const beforeStatus = taskWorkflowStatus({ record, moduleKey, task });
      task.workflowStatus = status;
      if (status === "待办任务") task.status = "待处理";
      else if (status === "待审核") task.status = "待审核";
      else if (isTaskWorkflowDone(status)) {
        task.status = "已完成";
        task.completedAt = task.completedAt || actionDate;
      } else {
        task.status = "进行中";
      }
      if (moduleKey === "ads" && status === "待投放" && record && record.liveTime.slice(0, 10) <= todayDate()) {
        task.workflowStatus = "已投放";
        task.status = "已完成";
        task.completedAt = task.completedAt || actionDate;
      }
      const afterStatus = taskWorkflowStatus({ record, moduleKey, task });
      if (!options.silent) {
        notifyTaskStatusChange({
          record,
          moduleKey,
          task,
          index: taskIndexFor(record?.id, moduleKey, task),
          key: `${record?.id || ""}:${moduleKey}:${taskIndexFor(record?.id, moduleKey, task)}`
        }, beforeStatus, afterStatus, options.reason || "任务状态流转");
      }
    }

    function taskIndexFor(recordId, moduleKey, task) {
      if (!recordId || !moduleKey || !task) return -1;
      return tasksFor(recordId, moduleKey).indexOf(task);
    }

    function isTaskWorkflowDone(status) {
      return status === "已发布" || status === "已投放" || status === "已完成";
    }

    function isTaskWorkflowAbnormal(status) {
      return status === "延期中" || status === "已取消";
    }

    function todayDate() {
      const date = new Date();
      if (Number.isNaN(date.getTime())) return actionDate;
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${date.getFullYear()}-${month}-${day}`;
    }

    function moduleWorkflowStatusOptions(moduleKey, items = []) {
      const base = moduleWorkflowStatuses[moduleKey] || workflowStatusList;
      const extra = abnormalWorkflowStatuses.filter(status => state.taskStatusFilter === status || items.some(item => taskWorkflowStatus(item) === status));
      return [...base, ...extra];
    }

    function taskStatusDisplayLabel(moduleKey, status) {
      if (moduleKey === "content" && status === "千川待审核") return "千川审核中";
      return status;
    }

    function normalizedTaskStatusFilter(moduleKey, items) {
      if (state.taskStatusFilter === "all") return "all";
      return moduleWorkflowStatusOptions(moduleKey, items).includes(state.taskStatusFilter) ? state.taskStatusFilter : "all";
    }

    function taskWorkflowRank(item) {
      const moduleKey = item.moduleKey;
      const status = taskWorkflowStatus(item);
      const order = [...(moduleWorkflowStatuses[moduleKey] || workflowStatusList), ...abnormalWorkflowStatuses];
      const rank = order.indexOf(status);
      return rank === -1 ? order.length : rank;
    }

    function allDispatchTaskItems() {
      const items = [];
      records.forEach(record => {
        const recordTasks = dispatchTasks[record.id] || {};
        Object.entries(recordTasks).forEach(([moduleKey, list]) => {
          list.forEach((task, index) => {
            if (!task.status) task.status = "待处理";
            items.push({ record, moduleKey, task, index, key: `${record.id}:${moduleKey}:${index}` });
          });
        });
      });
      return items;
    }

    function pageMyTasks() {
      const scopeItems = scopedTaskItems();
      const activeModule = activeTaskModuleFilter(scopeItems);
      const activeModuleItems = scopeItems.filter(item => item.moduleKey === activeModule);
      const activeModuleGroups = groupedMyTaskItems(activeModuleItems);
      const dispatchModules = taskDispatchModules();
      const canDispatch = dispatchModules.length > 0;
      if (state.taskStatusFilter === "dispatch") {
        state.taskWorkspace = "dispatch";
        state.taskStatusFilter = "all";
      }
      const dispatchMode = canDispatch && state.taskWorkspace === "dispatch";
      const dispatchModule = dispatchMode ? activeDispatchModule(activeModule) : activeModule;
      if (dispatchMode) state.module = dispatchModule;
      const dispatchPending = dispatchPendingTotal(dispatchModule);
      const selectedStatus = normalizedTaskStatusFilter(activeModule, activeModuleItems);
      const myItems = filteredMyTaskItems(scopeItems);
      const myGroups = groupedMyTaskItems(myItems);
      const priorityOptions = ["all:全部优先级", "S+:S+ 级", "S:S 级", "A:A 级", "B:B 级", "C:C 级"];
      const visibleWorkflowStatuses = (moduleWorkflowStatuses[activeModule] || []).filter(status => status !== "初始");
      const workflowCards = visibleWorkflowStatuses.map(status => {
        const count = activeModuleGroups.filter(group => myTaskGroupStatus(group.groupItems) === status).length;
        const active = !dispatchMode && selectedStatus === status;
        return `<button class="stat stat-${taskStatusClass(status)} ${active ? "active" : ""}" data-task-status-card="${status}"><div><strong>${count}</strong><span>${taskStatusDisplayLabel(activeModule, status)}</span></div></button>`;
      }).join("");
      const statsRow = `<section class="stats my-task-stats workflow-tab-stats">
        ${canDispatch ? `<button class="stat stat-orange ${dispatchMode ? "active" : ""}" data-task-workspace="dispatch" data-task-dispatch-module="${dispatchModule}"><div><strong>${dispatchPending}</strong><span>需求派发</span></div></button>` : ""}
        <button class="stat stat-orange ${!dispatchMode && selectedStatus === "all" ? "active" : ""}" data-task-workspace="tasks"><div><strong>${activeModuleGroups.length}</strong><span>全部任务</span></div></button>
        ${workflowCards}
      </section>`;
      const taskBoard = `${statsRow}
      <div class="my-task-tools task-filter-only">
        <div class="task-filter-right">
          <label class="task-filter-field">
            <span>任务优先级</span>
            <select class="select" data-task-priority-filter>${priorityOptions.map(item => { const [value, label] = item.split(":"); return `<option value="${value}" ${state.taskPriorityFilter === value ? "selected" : ""}>${label}</option>`; }).join("")}</select>
          </label>
          <input class="input task-search" value="${state.taskSearch}" placeholder="搜索专场名称" data-task-search>
        </div>
      </div>
      ${myTaskCalendar(state.taskMonth, myGroups, activeModule, scopeItems, { moduleTabs: taskModulePoolTabs(scopeItems) })}`;
      return dispatchMode ? `${statsRow}${myTaskDispatchWorkspace()}` : taskBoard;
    }

    function taskDispatchModules() {
      if (state.taskScope === "manager") return moduleOrder;
      const scopeModule = { contentLead: "content", editLead: "edit", adsLead: "ads" }[state.taskScope];
      if (scopeModule) return [scopeModule];
      return moduleOrder.filter(key => modules[key].owner === state.taskUser);
    }

    function activeDispatchModule(fallbackModule = state.module) {
      const allowed = state.taskWorkspace === "dispatch" ? dispatchModuleOrder : taskDispatchModules();
      if (!allowed.length) return fallbackModule;
      if (allowed.includes(state.module)) return state.module;
      if (allowed.includes(fallbackModule)) return fallbackModule;
      return allowed[0];
    }

    function dispatchPoolRecords(moduleKey) {
      const sampleIds = dispatchPoolSamples[moduleKey] || [];
      return sampleIds
        .map(id => records.find(record => record.id === id))
        .filter(record => record && !isDispatchPublished(record.id, moduleKey));
    }

    function dispatchPendingTotal(moduleKey = state.module) {
      const keys = moduleOrder.includes(moduleKey) ? [moduleKey] : moduleOrder;
      return keys.reduce((sum, key) => sum + dispatchPoolRecords(key).length, 0);
    }

    function myTaskDispatchWorkspace() {
      return `<section class="my-task-dispatch">${pageDispatch({ embedded: true })}</section>`;
    }

    function myTaskCalendar(month, groups, activeModule, scopeItems, options = {}) {
      const [year, rawMonth] = month.split("-").map(Number);
      const first = new Date(year, rawMonth - 1, 1);
      const last = new Date(year, rawMonth, 0);
      const startOffset = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const totalCells = Math.ceil((startOffset + last.getDate()) / 7) * 7;
      const weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
      const monthGroups = groups.filter(group => myTaskCalendarDate(group).slice(0, 7) === month);
      const cells = Array.from({ length: totalCells }, (_, index) => {
        const day = index - startOffset + 1;
        const inMonth = day >= 1 && day <= last.getDate();
        const dateText = inMonth ? `${month}-${String(day).padStart(2, "0")}` : "";
        const dayGroups = inMonth
          ? monthGroups.filter(group => myTaskCalendarDate(group) === dateText).sort(taskUrgencyCompare)
          : [];
        const expanded = state.taskCalendarExpandedDay === dateText;
        const visibleGroups = expanded ? dayGroups : dayGroups.slice(0, 3);
        const hiddenCount = dayGroups.length - visibleGroups.length;
        const moreButton = hiddenCount > 0
          ? `<button class="calendar-more" data-task-calendar-day-toggle="${dateText}">还有 ${hiddenCount} 条</button>`
          : expanded && dayGroups.length > 3
            ? `<button class="calendar-more" data-task-calendar-day-toggle="${dateText}">收起</button>`
            : "";
        return `<div class="calendar-cell ${inMonth ? "" : "is-muted"} ${dayGroups.length > 3 ? "has-many" : ""} ${expanded ? "is-expanded" : ""}">
          <div class="calendar-day"><span>${inMonth ? day : ""}</span>${dayGroups.length ? badge(`${dayGroups.length}条`, "orange") : ""}</div>
          ${visibleGroups.map(taskCalendarEvent).join("")}
          ${moreButton}
        </div>`;
      });
      const title = options.title || `${taskScopeTitle()}的任务日历`;
      const badgeText = options.badge || `${supportNeeds[activeModule].title} ${monthGroups.length} 条`;
      const monthAttr = options.monthAttr || "data-task-month";
      return `<section class="panel month-calendar my-task-calendar">
        <div class="panel-head"><div class="calendar-title"><h2 class="panel-title">${title}</h2>${badge(badgeText, modules[activeModule].cls)}</div><div class="calendar-head-actions">${options.moduleTabs || ""}<label class="calendar-month-picker"><span>月份</span><input class="input" type="month" value="${month}" ${monthAttr}></label></div></div>
        <div class="panel-body">
          ${monthGroups.length ? `<div class="calendar-grid">
            ${weekdays.map(day => `<div class="calendar-weekday">${day}</div>`).join("")}
            ${cells.join("")}
          </div>` : `<div class="task-calendar-empty">当前筛选下暂无任务</div>`}
        </div>
      </section>`;
    }

    function myTaskCalendarDate(group) {
      const groupItems = group.groupItems || [group];
      const primary = primaryGroupTaskItem(groupItems);
      if (primary.moduleKey === "content") return taskDemandDate(taskSortAnchorItem(groupItems));
      return primary.record.liveTime.slice(0, 10);
    }

    function taskCalendarEvent(group) {
      const groupItems = group.groupItems || [group];
      const primary = primaryGroupTaskItem(groupItems);
      const anchor = taskSortAnchorItem(groupItems);
      const status = myTaskGroupStatus(groupItems);
      const eventCls = isTaskWorkflowDone(status) ? "done" : isTaskWorkflowAbnormal(status) ? "delay" : "";
      return `<button class="calendar-event task-calendar-event ${eventCls}" data-open-my-task-calendar="${group.key}">
        <span class="task-calendar-line">${escapeHtml(primary.record.talent)} ${shortLiveDate(primary.record.liveTime)} ${escapeHtml(primary.record.product)}</span>
        <span class="task-calendar-deadline">内容需求截止时间：${formatMonthDay(taskDemandDate(anchor))}</span>
        ${calendarProgressPopover(primary.record, primary.moduleKey, status)}
      </button>`;
    }

    function taskCalendarDateLabel(moduleKey) {
      return moduleKey === "content" ? "内容需求截止时间" : "专场排期";
    }

    function shortLiveDate(liveTime) {
      const [date, time = ""] = String(liveTime || "").split(" ");
      return `${formatMonthDay(date)}${time ? ` ${time}` : ""}`;
    }

    function formatMonthDay(dateText) {
      const date = String(dateText || "").replaceAll("/", "-").slice(0, 10);
      const [, month = "", day = ""] = date.split("-");
      return month && day ? `${Number(month)}月${Number(day)}日` : "待定";
    }

function taskAllowsArtifactUpload(moduleKey, status) {
  const normalizedModule = moduleKey === "edit" ? "editing" : moduleKey;
  return (normalizedModule === "content" && status === "编写中")
    || (normalizedModule === "editing" && status === "剪辑中");
}

const TASK_FEISHU_LINK_STORAGE_KEY = "crm-task-feishu-links";

function taskFeishuLinkMap() {
  try {
    return JSON.parse(localStorage.getItem(TASK_FEISHU_LINK_STORAGE_KEY) || "{}");
  } catch (error) {
    return {};
  }
}

function taskFeishuLinkFor(taskKey) {
  return taskFeishuLinkMap()[taskKey] || "";
}

function saveTaskFeishuLink(taskKey, url) {
  const links = taskFeishuLinkMap();
  links[taskKey] = url;
  localStorage.setItem(TASK_FEISHU_LINK_STORAGE_KEY, JSON.stringify(links));
}

function openMyTaskCalendarDetail(key) {
      const groupItems = taskActionItems(key).sort(taskRecordSubtaskCompare);
      if (!groupItems.length) return;
      const primary = primaryGroupTaskItem(groupItems);
      const record = primary.record;
      const moduleKey = primary.moduleKey;
      const groupStatus = myTaskGroupStatus(groupItems);
      const title = `${record.talent} ${shortLiveDate(record.liveTime)} ${record.product}`;
      openDrawer(
        "任务详情",
        myTaskCalendarDetailBody(groupItems),
        `<button class="btn primary" data-close>关闭</button>`,
        true,
        true
      );
      $("#drawerTitle").innerHTML = `<span class="drawer-title-status-layout">
        <span class="drawer-title-text">${escapeHtml(title)}</span>
        ${badge(taskStatusDisplayLabel(moduleKey, groupStatus), taskStatusClass(groupStatus))}
      </span>`;
    }

    function myTaskCalendarDetailBody(groupItems) {
      const primary = primaryGroupTaskItem(groupItems);
      const record = primary.record;
      const moduleKey = primary.moduleKey;
      const groupStatus = myTaskGroupStatus(groupItems);
      const actionKey = groupItems.length > 1 ? myTaskGroupKey(record.id, moduleKey) : primary.key;
      const nextAction = workflowNextAction(moduleKey, groupStatus, record.id);
      const actionPanel = isTaskWorkflowAbnormal(groupStatus)
        ? ""
        : `<div class="my-task-actions task-calendar-detail-actions">
          <button class="btn ghost" data-toggle-task-memo="${actionKey}">${taskMemoButtonTextForItems(groupItems)}</button>
          <div class="my-task-action-group">${workflowActionControl(actionKey, moduleKey, groupStatus, record.id, nextAction)}</div>
        </div>`;
      const rows = groupItems.map((item, index) => {
        const task = item.task;
        const status = taskWorkflowStatus(item);
        const files = (task.files || []).length ? (task.files || []).join("、") : "暂无附件";
        const canOperate = status !== "已取消";
        return `<div class="task-calendar-detail-row">
          <span class="task-calendar-detail-index">${index + 1}</span>
          <div class="task-calendar-detail-main">
            <strong>${escapeHtml(task.title || "未命名任务")}</strong>
            <span>${supportNeeds[moduleKey].title}</span>
          </div>
          <div class="task-calendar-detail-cell"><span>执行人</span><strong>${escapeHtml(task.owner || "待分配")}</strong></div>
          <div class="task-calendar-detail-cell"><span>${taskCalendarDateLabel(moduleKey)}</span><strong>${formatMonthDay(moduleKey === "content" ? taskDemandDate(item) : record.liveTime.slice(0, 10))}</strong></div>
          <div class="task-calendar-detail-cell"><span>状态</span>${badge(taskStatusDisplayLabel(moduleKey, status), taskStatusClass(status))}</div>
          <div class="task-calendar-detail-cell"><span>附件</span><strong title="${escapeHtml(files)}">${escapeHtml(files)}</strong></div>
          ${canOperate ? `<div class="task-calendar-detail-row-actions">
            <label class="btn ghost task-calendar-detail-upload">
              上传文件
              <input type="file" multiple data-calendar-task-upload="${item.key}" data-calendar-parent="${actionKey}">
            </label>
            <button class="btn ghost" data-calendar-task-edit="${item.key}" data-calendar-parent="${actionKey}">编辑任务</button>
          </div>` : ""}
        </div>`;
      }).join("");
      return `<div class="stack my-task-calendar-detail">
        ${myTaskSpecialInfo(record)}
        ${workflowPathStrip(moduleKey, groupStatus)}
        <div class="task-note">${demandText(record, moduleKey)}</div>
        <div class="task-calendar-detail-list">${rows}</div>
        ${actionPanel}
      </div>`;
    }

    function openMyTaskSubtaskEditor(key, parentKey) {
      const item = taskActionItems(key)[0];
      if (!item || item.task.status === "已取消") return;
      if (!item.task.editing) startDispatchTaskEdit(key);
      const task = item.task;
      const draft = task.editDraft || {
        title: task.title || taskTemplates[item.moduleKey][0],
        owner: task.owner || moduleMembers[item.moduleKey][0],
        due: task.delayDue || task.due
      };
      const files = (task.files || []).length
        ? (task.files || []).map(name => `<span class="file-chip"><span class="file-chip-name">${escapeHtml(name)}</span></span>`).join("")
        : `<span class="muted">暂无附件</span>`;
      const body = `<div class="stack">
        ${myTaskSpecialInfo(item.record)}
        <div class="task-calendar-edit-form">
          <label class="task-field">
            <span>任务名称</span>
            <input class="input" value="${escapeHtml(draft.title)}" data-dispatch-edit-title="${key}">
          </label>
          <label class="task-field">
            <span>执行人</span>
            <select class="select" data-dispatch-edit-owner="${key}">${moduleMembers[item.moduleKey].map(owner => `<option ${owner === draft.owner ? "selected" : ""}>${escapeHtml(owner)}</option>`).join("")}</select>
          </label>
          <label class="task-field">
            <span>预计截止日期</span>
            <input class="input" type="date" value="${escapeHtml(draft.due || "")}" data-dispatch-edit-due="${key}">
          </label>
          <div class="task-calendar-edit-files">
            <div class="task-upload-main"><span class="task-upload-title">已上传附件</span><span class="task-files">${files}</span></div>
            <label class="btn ghost task-calendar-detail-upload">
              上传文件
              <input type="file" multiple data-calendar-task-upload="${key}" data-calendar-parent="${parentKey}" data-calendar-editor="true">
            </label>
          </div>
        </div>
      </div>`;
      const foot = `<button class="btn ghost" data-calendar-edit-back="${parentKey}" data-calendar-edit-key="${key}">返回任务详情</button>
        <button class="btn primary" data-calendar-edit-save="${key}" data-calendar-parent="${parentKey}">保存修改</button>`;
      openDrawer("编辑子任务", body, foot, true, true);
    }

    function workflowPathStrip(moduleKey, currentStatus) {
      const statuses = moduleWorkflowStatuses[moduleKey] || workflowStatusList;
      if (isTaskWorkflowAbnormal(currentStatus)) {
        return `<div class="workflow-path"><span class="workflow-path-step is-current">${escapeHtml(currentStatus)}</span></div>`;
      }
      const currentIndex = statuses.indexOf(currentStatus);
      return `<div class="workflow-path" aria-label="${escapeHtml(supportNeeds[moduleKey].title)}状态流程">${statuses.map((status, index) => {
        const cls = index === currentIndex ? "is-current" : currentIndex > index ? "is-past" : "";
        return `<span class="workflow-path-step ${cls}">${escapeHtml(taskStatusDisplayLabel(moduleKey, status))}</span>`;
      }).join("")}</div>`;
    }

    function taskModulePoolTabs(items) {
      const order = taskModuleFilterOptions();
      const active = activeTaskModuleFilter(items);
      return `<div class="task-module-tabs" aria-label="需求池切换">${order.map(item => {
        const count = new Set(items.filter(taskItem => taskItem.moduleKey === item.key).map(taskItem => taskItem.record.id)).size;
        return `<button class="task-module-tab ${active === item.key ? "active" : ""}" data-task-module-filter="${item.key}">${item.label}<i>${count}</i></button>`;
      }).join("")}</div>`;
    }

    function taskModuleFilterOptions() {
      return [
        { key: "content", label: "内容" },
        { key: "edit", label: "剪辑" },
        { key: "ads", label: "投放" },
        { key: "ops", label: "运营" }
      ];
    }

    function activeTaskModuleFilter(items) {
      const options = taskModuleFilterOptions();
      if (options.some(item => item.key === state.taskModuleFilter)) return state.taskModuleFilter;
      return options.find(item => items.some(taskItem => taskItem.moduleKey === item.key))?.key || options[0].key;
    }

    function scopedTaskItems() {
      const items = allDispatchTaskItems().filter(item => isDispatchPublished(item.record.id, item.moduleKey));
      const scopeModule = { contentLead: "content", editLead: "edit", adsLead: "ads" }[state.taskScope];
      if (scopeModule) return items.filter(item => item.moduleKey === scopeModule);
      if (state.taskScope === "manager") return items;
      return items.filter(item => item.task.owner === state.taskUser);
    }

    function taskScopeTitle() {
      const option = taskScopeOptions.find(item => item.id === state.taskScope);
      if (state.taskScope === "mine") return state.taskUser;
      if (state.taskScope === "contentLead") return "内容组长";
      if (state.taskScope === "editLead") return "剪辑组长";
      if (state.taskScope === "adsLead") return "投放组长";
      if (state.taskScope === "manager") return "管理员";
      return option ? option.label : state.taskUser;
    }

    function taskSortTitle() {
      const option = taskSortOptions.find(item => item.id === state.taskSort);
      return option ? option.label : "紧急程度优先";
    }

    function taskStatusFilterButton(key, label, count) {
      return `<button class="seg ${state.taskStatusFilter === key ? "active" : ""}" data-task-status-filter="${key}">${label} ${count}</button>`;
    }

    function filteredMyTaskItems(items) {
      const keyword = state.taskSearch.trim().toLowerCase();
      const moduleFilter = activeTaskModuleFilter(items);
      const moduleItems = items.filter(item => item.moduleKey === moduleFilter);
      const statusFilter = normalizedTaskStatusFilter(moduleFilter, moduleItems);
      return items.filter(item => {
        const statusMatched = statusFilter === "all" || taskWorkflowStatus(item) === statusFilter;
        const moduleMatched = item.moduleKey === moduleFilter;
        const priorityMatched = state.taskPriorityFilter === "all" || talentGrade(item.record) === state.taskPriorityFilter;
        const searchText = item.record.title.toLowerCase();
        return moduleMatched && statusMatched && priorityMatched && (!keyword || searchText.includes(keyword));
      }).sort(taskUrgencyCompare);
    }

    function groupedMyTaskItems(items) {
      const groups = new Map();
      items.forEach(item => {
        const groupId = `${item.record.id}|${item.moduleKey}`;
        if (!groups.has(groupId)) {
          groups.set(groupId, {
            ...item,
            groupKey: myTaskGroupKey(item.record.id, item.moduleKey),
            groupItems: []
          });
        }
        groups.get(groupId).groupItems.push(item);
      });
      return Array.from(groups.values()).map(group => {
        group.groupItems.sort(taskRecordSubtaskCompare);
        const primary = taskSortAnchorItem(group.groupItems);
        return {
          ...group,
          record: primary.record,
          moduleKey: primary.moduleKey,
          task: primary.task,
          index: primary.index,
          key: group.groupItems.length > 1 ? group.groupKey : primary.key
        };
      }).sort(taskUrgencyCompare);
    }

    function myTaskGroupKey(recordId, moduleKey) {
      return `group|${recordId}|${moduleKey}`;
    }

    function primaryGroupTaskItem(items) {
      return items.find(item => item.task.delayEditing)
        || items.find(item => taskWorkflowStatus(item) === "延期中")
        || items.slice().sort((a, b) => taskWorkflowRank(a) - taskWorkflowRank(b) || taskDemandCompare(a, b) || a.index - b.index)[0]
        || items[0];
    }

    function taskSortAnchorItem(items) {
      return items.slice().sort(taskRecordSubtaskCompare)[0] || items[0];
    }

    function taskRecordSubtaskCompare(a, b) {
      return taskDemandCompare(a, b) || taskGradeCompare(a, b) || a.index - b.index;
    }

    function myTaskGroupStatus(items) {
      const statuses = items.map(item => taskWorkflowStatus(item));
      const moduleKey = items[0]?.moduleKey || "";
      if (statuses.every(status => status === "已发布")) return "已发布";
      if (statuses.every(status => status === "已投放")) return "已投放";
      if (statuses.every(status => status === "已完成")) return "已完成";
      if (statuses.every(status => status === "已取消")) return "已取消";
      if (statuses.some(status => status === "延期中")) return "延期中";
      return items.slice().sort((a, b) => taskWorkflowRank(a) - taskWorkflowRank(b) || taskDemandCompare(a, b) || a.index - b.index).map(item => taskWorkflowStatus(item))[0] || workflowStartStatus(moduleKey);
    }

    function myTaskSubtaskList(items) {
      return `<div class="my-task-subtasks">${items.map((item, index) => {
        const task = item.task;
        const due = taskDemandDate(item);
        const submitted = task.submittedAt ? ` · 提交于 ${formatDate(task.submittedAt)}` : "";
        const delayed = task.delayReason ? ` · 延期原因：${escapeHtml(task.delayReason)}` : "";
        const canceled = task.cancelReason ? ` · 取消原因：${escapeHtml(task.cancelReason)}` : "";
        const notice = taskBusinessNotice(task);
        const noticeDot = notice ? `<span class="inline-notice-dot" title="${taskNoticeLabel(notice)}" aria-label="${taskNoticeLabel(notice)}"></span>` : "";
        return `<div class="my-task-subtask">
          <div>
            <strong>${noticeDot}${index + 1}. ${escapeHtml(task.title || "未命名任务")}</strong>
            <span>执行人：${escapeHtml(task.owner || "待分配")} · 需求时间：${formatDate(due)}${submitted}${delayed}${canceled}</span>
          </div>
          ${badge(taskWorkflowStatus(item), taskStatusClass(taskWorkflowStatus(item)))}
        </div>`;
      }).join("")}</div>`;
    }

    function taskActionItems(key) {
      if (String(key || "").startsWith("group|")) {
        const [, recordId, moduleKey, ownerValue = ""] = String(key).split("|");
        const owner = decodeURIComponent(ownerValue || "");
        return allDispatchTaskItems().filter(item =>
          item.record.id === recordId
          && item.moduleKey === moduleKey
          && (!owner || (item.task.owner || "待分配") === owner)
        );
      }
      const [recordId, moduleKey, indexValue] = String(key || "").split(":");
      const record = records.find(item => item.id === recordId);
      const task = tasksFor(recordId, moduleKey)[Number(indexValue)];
      return record && task ? [{ record, moduleKey, task, index: Number(indexValue), key }] : [];
    }

    function tasksByActionKey(key) {
      return taskActionItems(key).map(item => item.task);
    }

    function moduleKeyFromTaskAction(key) {
      if (String(key || "").startsWith("group|")) return String(key).split("|")[2];
      return String(key || "").split(":")[1];
    }

    function recordIdFromTaskAction(key) {
      if (String(key || "").startsWith("group|")) return String(key).split("|")[1];
      return String(key || "").split(":")[0];
    }

    function taskFilesForActionKey(key, fallbackTask) {
      const files = [...new Set(tasksByActionKey(key).flatMap(task => task.files || []))];
      return files.length ? files : (fallbackTask.files || []);
    }

    function taskCompareByMode(a, b) {
      if (state.taskSort === "demandDate") return taskDemandCompare(a, b) || taskUrgencyCompare(a, b);
      if (state.taskSort === "grade") return taskGradeCompare(a, b) || taskDemandCompare(a, b);
      return taskUrgencyCompare(a, b);
    }

    function taskUrgencyCompare(a, b) {
      const dateDelta = taskSortDate(a).localeCompare(taskSortDate(b));
      if (dateDelta) return dateDelta;
      const gradeDelta = taskGradeCompare(a, b);
      if (gradeDelta) return gradeDelta;
      return taskLiveTime(a).localeCompare(taskLiveTime(b));
    }

    function taskGradeCompare(a, b) {
      return gradeRank(talentGrade(taskRecord(a))) - gradeRank(talentGrade(taskRecord(b)));
    }

    function taskDemandCompare(a, b) {
      return taskDemandDate(a).localeCompare(taskDemandDate(b));
    }

    function taskSortDate(item) {
      const groupItems = item.groupItems || [item];
      const primary = primaryGroupTaskItem(groupItems);
      if (primary?.moduleKey === "content") return taskDemandDate(taskSortAnchorItem(groupItems));
      return primary?.record?.liveTime?.slice(0, 10) || taskDemandDate(primary || item);
    }

    function taskRecord(item) {
      const groupItems = item.groupItems || [item];
      return primaryGroupTaskItem(groupItems)?.record || item.record || {};
    }

    function taskLiveTime(item) {
      return taskRecord(item).liveTime || "";
    }

    function taskDemandDate(item) {
      return item.task.delayDue || item.task.due || item.record.liveTime.slice(0, 10);
    }

    function stableRecordIndex(record, modulo) {
      const source = `${record.id || ""}${record.uid || ""}${record.talent || ""}`;
      const seed = Array.from(source).reduce((sum, char) => sum + char.charCodeAt(0), 0);
      return modulo ? seed % modulo : seed;
    }

    function recordTrialText(record) {
      return record.trial || trialOptions[stableRecordIndex(record, trialOptions.length)] || "正装试用";
    }

    function recordLuckyBagText(record) {
      if (record.luckyBag === "其他") return record.luckyBagOther || "其他";
      return record.luckyBag || luckyBagOptions[stableRecordIndex(record, luckyBagOptions.length - 1)] || "飞机盒礼盒（价值599元）";
    }

    function recordCooperationText(record) {
      const options = [
        "高，可配合提前预热、直播口播和短视频确认",
        "中，需提前锁定脚本和拍摄时间",
        "高，可配合样品试用和直播间口播",
        "一般，需商务提前确认禁忌与素材边界"
      ];
      return record.cooperation || options[stableRecordIndex(record, options.length)];
    }

    function myTaskSpecialInfo(record) {
      const items = [
        { label: "达人UID", value: record.uid },
        { label: "达人昵称", value: record.talent },
        { label: "专场排期", value: record.liveTime },
        { label: "负责商务", value: record.business || "待填写" },
        { label: "状态", value: record.scheduleStatus || record.status || "待同步" },
        { label: "主推产品", value: record.product },
        { label: "主推机制", value: record.mechanism || "按商务文档机制执行", wide: true },
        { label: "目标销售额", value: record.expectedGmv || record.sales || "待填写" },
        { label: "是否有试用", value: recordTrialText(record) },
        { label: "福袋需求", value: recordLuckyBagText(record), wide: true },
        { label: "达人配合度", value: recordCooperationText(record), wide: true }
      ];
      return `<div class="my-task-basic">${items.map(item => `<div class="my-task-basic-item${item.wide ? " wide" : ""}"><span>${item.label}</span><strong>${escapeHtml(item.value || "待填写")}</strong></div>`).join("")}</div>`;
    }

    function workflowModuleEnabled(recordId, moduleKey) {
      const record = records.find(item => item.id === recordId);
      if (record && Array.isArray(record.supportModules)) return record.supportModules.includes(moduleKey);
      return hasModuleTasks(recordId, moduleKey);
    }

    function workflowNextAction(moduleKey, status, recordId = "") {
      const hasContent = workflowModuleEnabled(recordId, "content");
      const hasEdit = workflowModuleEnabled(recordId, "edit");
      const hasAds = workflowModuleEnabled(recordId, "ads");
      if (moduleKey === "content" && status === "待拍摄") {
        if (hasEdit) return null;
        if (hasAds) return { next: "千川待审核", label: "已同步投放视频", actor: "内容执行人" };
        return { next: "待发布", label: "拍摄完成", actor: "内容执行人" };
      }
      if (moduleKey === "edit" && status === "剪辑中") {
        return hasAds
          ? { next: "千川待审核", label: "已同步", actor: "剪辑执行人" }
          : { next: "审核通过", label: "已同步内容确认", actor: "剪辑执行人" };
      }
      if (moduleKey === "ads" && status === "待办任务") {
        return !hasContent && !hasEdit
          ? { next: "待投放", label: "千川审核已通过", actor: "投放执行人" }
          : null;
      }
      const map = {
        content: {
          "待办任务": { next: "编写中", label: "开始编写", actor: "内容执行人" },
          "编写中": { next: "待审核", label: "提交脚本文档", actor: "内容执行人" },
          "待审核": { next: "待拍摄", label: "审核通过", actor: `${modules.content.owner}（内容组长）` },
          "待发布": { next: "已发布", label: "已发布", actor: "内容执行人" }
        },
        edit: {
          "待办任务": { next: "剪辑中", label: "开始剪辑", actor: "剪辑执行人" }
        },
        ads: {
          "千川待审核": { next: "待投放", label: "千川审核已通过", actor: `${modules.ads.owner}（投放组长）` }
        },
        ops: {
          "初始": { next: "待办任务", label: "接收任务", actor: "运营组长" },
          "待办任务": { next: "已完成", label: "提交完成", actor: "运营执行人" }
        }
      };
      return map[moduleKey]?.[status] || null;
    }

    function workflowWaitingText(moduleKey, status, recordId = "") {
      const hasEdit = workflowModuleEnabled(recordId, "edit");
      const text = {
        content: {
          "待拍摄": hasEdit ? "等待剪辑完成并同步审核" : "等待拍摄完成",
          "千川待审核": "等待投放侧确认千川审核结果"
        },
        edit: {
          "千川待审核": "等待投放侧确认千川审核结果",
          "审核通过": "等待内容侧确认视频已发布"
        },
        ads: {
          "待办任务": "等待上游内容或剪辑节点完成",
          "待投放": "直播排期当天自动转为已投放"
        }
      }[moduleKey]?.[status];
      return text || `当前处于${status}`;
    }

    function workflowActionControl(key, moduleKey, groupStatus, recordId, nextAction = null) {
      if (isTaskWorkflowDone(groupStatus)) return `<span class="muted">任务已进入${groupStatus}</span>`;
      const action = nextAction || workflowNextAction(moduleKey, groupStatus, recordId);
      if (!action) return `<span class="muted">${workflowWaitingText(moduleKey, groupStatus, recordId)}</span>`;
      return `<span class="workflow-action-owner">确认角色：${escapeHtml(action.actor || "当前执行人")}</span><button class="btn primary" data-advance-task="${key}" data-next-status="${action.next}" title="由${escapeHtml(action.actor || "当前执行人")}确认">${action.label}</button>`;
    }

    function myTaskActionContent(key, moduleKey, groupStatus, recordId) {
      if (isTaskWorkflowDone(groupStatus)) return `<span class="muted">任务已进入${groupStatus}</span>`;
      if (groupStatus === "已取消") return `<span class="muted">任务已取消，原因已留存</span>`;
      const delayButton = `<button class="btn ghost" data-delay-task="${key}">${groupStatus === "延期中" ? "继续编辑延期" : "延期"}</button>`;
      const cancelButton = `<button class="btn danger" data-cancel-task="${key}">取消任务</button>`;
      return `${delayButton}${cancelButton}${workflowActionControl(key, moduleKey, groupStatus, recordId)}`;
    }

    function myTaskCard(item) {
      const groupItems = item.groupItems || [item];
      const primary = primaryGroupTaskItem(groupItems);
      const sortAnchor = taskSortAnchorItem(groupItems);
      const { record, moduleKey } = primary;
      const task = primary.task;
      const key = groupItems.length > 1 ? item.groupKey : primary.key;
      const module = modules[moduleKey];
      const isContentTask = moduleKey === "content";
      const groupStatus = myTaskGroupStatus(groupItems);
      const isCanceled = groupStatus === "已取消";
      const statusCls = taskStatusClass(groupStatus);
      const actionContent = myTaskActionContent(key, moduleKey, groupStatus, record.id);
      const owners = [...new Set(groupItems.map(item => item.task.owner || "待分配"))].join("、");
      const taskRecordName = groupItems.length > 1 ? `${supportNeeds[moduleKey].title}任务记录` : task.title;
      const cardNotice = groupItems.map(item => taskBusinessNotice(item.task)).find(Boolean);
      const cardNoticeDot = cardNotice ? `<span class="inline-notice-dot" title="${taskNoticeLabel(cardNotice)}" aria-label="${taskNoticeLabel(cardNotice)}"></span>` : "";
      return `<article class="my-task-card">
        <div class="my-task-head">
          <div>
            <h3>${cardNoticeDot}${record.title}</h3>
            <div class="meta">${urgencyBadge(talentGrade(record))}<span>${record.talent}</span><span>${record.liveTime}</span><span>${record.product}</span>${badge(supportNeeds[moduleKey].title, module.cls)}${groupItems.length > 1 ? badge(`${groupItems.length} 条子任务`, "blue") : ""}</div>
          </div>
          ${badge(groupStatus, statusCls)}
        </div>
        <div class="my-task-body">
          ${myTaskSpecialInfo(record)}
          <div class="row">
            <div>
              <div class="task-name">${escapeHtml(taskRecordName)}</div>
              <div class="meta"><span>执行人：${escapeHtml(owners)}</span><span>组长：${module.owner}</span><span>最早需求：${formatDate(taskDemandDate(sortAnchor))}</span>${task.submittedAt ? `<span>提交于：${formatDate(task.submittedAt)}</span>` : ""}</div>
            </div>
          </div>
          ${groupItems.length > 1 ? myTaskSubtaskList(groupItems) : ""}
          <div class="task-note">${demandText(record, moduleKey)}</div>
          ${taskReviewNotice(primary, module)}
          ${taskCancelForm(key, task)}
          ${!isCanceled && moduleKey === "ads" ? adsForecastForm(key, record, task) : ""}
          ${isCanceled ? "" : taskUpload(key, task, moduleKey)}
          ${!isCanceled && isContentTask ? contentDocForm(key, record, task, module) : ""}
          ${task.delayEditing ? delayForm(key, task) : ""}
          <div class="my-task-actions">
            <button class="btn ghost" data-toggle-task-memo="${key}">${taskMemoButtonTextForItems(groupItems)}</button>
            <div class="my-task-action-group">${actionContent}</div>
          </div>
        </div>
      </article>`;
    }

    function adsForecastForm(key, record, task) {
      const value = task.adsForecastGmv || record.adsForecastGmv || "";
      return `<div class="ads-forecast-form">
        <label class="task-field">
          <span>预估投放销售额 ${badge("投放人员填写", "blue")}</span>
          <input class="input" value="${escapeHtml(value)}" placeholder="例如：¥168万" data-ads-forecast="${key}">
          <em class="ads-forecast-tip">保存后同步至数据中心「投放预估达标率」</em>
        </label>
        <button class="btn primary" data-save-ads-forecast="${key}">保存预估</button>
      </div>`;
    }

    function taskMemoButtonText(task) {
      const count = (task.memoHistory || []).length;
      return count ? `备忘录 ${count}` : "备忘录";
    }

    function taskMemoButtonTextForItems(items) {
      const count = items.reduce((sum, item) => sum + ((item.task.memoHistory || []).length), 0);
      return count ? `备忘录 ${count}` : "备忘录";
    }

    function taskMemoDialogBody(key, task) {
      const actionItems = taskActionItems(key);
      const history = actionItems.flatMap(item => (item.task.memoHistory || []).map(historyItem => ({
        ...historyItem,
        taskTitle: item.task.title
      })));
      const historyHtml = history.length
        ? `<div class="task-memo-history">${history.slice().reverse().map(item => `<div class="task-memo-item"><strong>${formatDate(item.time)} · ${escapeHtml(item.user || task.owner || "记录人")}${actionItems.length > 1 ? ` · ${escapeHtml(item.taskTitle || "")}` : ""}</strong><span>${escapeHtml(item.text)}</span></div>`).join("")}</div>`
        : `<div class="task-memo-empty">暂无备忘记录</div>`;
      return `<div class="task-memo-panel">
        <div class="task-memo-head">
          <div><strong>节点备忘录</strong></div>
          ${badge(`${history.length} 条记录`, history.length ? "orange" : "")}
        </div>
        <textarea class="input" placeholder="填写本节点备忘，例如沟通结论、待跟进事项、风险说明" data-task-memo-draft="${key}">${escapeHtml(task.memoDraft || "")}</textarea>
        ${historyHtml}
      </div>`;
    }

    function openTaskMemoDialog(key) {
      const task = taskByKey(key);
      if (!task) return;
      tasksByActionKey(key).forEach(item => { item.memoDraft = item.memoDraft || task.memoDraft || ""; });
      openDrawer(
        "节点备忘录",
        taskMemoDialogBody(key, task),
        `<button class="btn ghost" data-close>关闭</button><button class="btn primary" data-save-task-memo="${key}">保存备忘</button>`,
        false,
        true
      );
    }

    function openMyTaskTotalDrawer() {
      const groups = groupedMyTaskItems(scopedTaskItems());
      const rows = groups.map(item => {
        const groupItems = item.groupItems || [item];
        const primary = primaryGroupTaskItem(groupItems);
        const sortAnchor = taskSortAnchorItem(groupItems);
        const owners = [...new Set(groupItems.map(taskItem => taskItem.task.owner || "待分配"))].join("、");
        const taskNames = groupItems.map((taskItem, index) => `${index + 1}. ${taskItem.task.title || "未命名任务"}`).join(" / ");
        const groupStatus = myTaskGroupStatus(groupItems);
        return `<div class="task-total-row">
        <div><strong>${escapeHtml(primary.record.title)}</strong><span>${escapeHtml(primary.record.talent)} · ${escapeHtml(primary.record.product)}</span></div>
        <div><strong>${supportNeeds[primary.moduleKey].title}</strong><span>${escapeHtml(taskNames)}</span></div>
        <div><span>执行人</span><strong>${escapeHtml(owners)}</strong></div>
        <div>${badge(groupStatus, taskStatusClass(groupStatus))}</div>
        <div><span>最早需求</span><strong>${formatDate(taskDemandDate(sortAnchor))}</strong></div>
      </div>`;
      }).join("");
      openDrawer(
        `${taskScopeTitle()}的任务明细`,
        `<div class="stack"><div class="meta">${badge(`${groups.length} 条任务记录`, "orange")}<span>同一专场同一需求池合并展示，子任务按需求时间排序</span></div><div class="task-total-list">${rows || `<div class="upload"><div><strong>暂无任务</strong></div></div>`}</div></div>`,
        `<button class="btn primary" data-close>关闭</button>`,
        true,
        true
      );
    }

    function taskReviewNotice(item, module) {
      const { task, moduleKey } = item;
      const status = taskWorkflowStatus(item);
      if (status === "编写中") {
        return `<div class="task-review-result is-reviewing">任务已派发给执行人，正在编写或处理中。</div>`;
      }
      if (status === "待审核") {
        return `<div class="task-review-result is-reviewing">脚本文档已提交，等待内容组长${escapeHtml(modules.content.owner)}点击“审核通过”。</div>`;
      }
      if (status === "待拍摄") {
        const editMessage = workflowModuleEnabled(item.record.id, "edit") ? "剪辑任务已同步进入剪辑中；" : "";
        return `<div class="task-review-result is-approved">内容审核已通过，${editMessage}等待拍摄排期和素材回传。</div>`;
      }
      if (status === "剪辑中") {
        return `<div class="task-review-result is-reviewing">内容脚本已审核通过，剪辑执行人正在制作视频。</div>`;
      }
      if (status === "千川待审核") {
        return `<div class="task-review-result is-reviewing">视频已同步飞书群，等待投放组长${escapeHtml(modules.ads.owner)}确认千川审核结果。</div>`;
      }
      if (status === "审核通过") {
        return `<div class="task-review-result is-approved">投放侧已确认千川审核通过，等待内容侧确认视频发布。</div>`;
      }
      if (status === "待发布") {
        return `<div class="task-review-result is-approved">千川审核已通过，等待达人或商务反馈主页发布。</div>`;
      }
      if (status === "待投放") {
        return `<div class="task-review-result is-reviewing">千川审核已通过，直播排期当天自动进入已投放。</div>`;
      }
      if (status === "已投放") {
        return `<div class="task-review-result is-approved">已到达直播排期，投放任务已自动流转为已投放。</div>`;
      }
      if (task.rejectReason) {
        return `<div class="task-review-result is-rejected">历史退回原因：${task.rejectReason}</div>`;
      }
      if (moduleKey === "content" && status === "已发布") {
        return `<div class="task-review-result is-approved">视频已发布主页；内容文档仅按权限范围查看。</div>`;
      }
      if (isTaskWorkflowDone(status) && (task.submittedAt || task.completedAt || task.reviewResult || (task.files || []).length)) {
        return `<div class="task-review-result is-approved">${escapeHtml(task.reviewResult || `任务已进入${status}`)}</div>`;
      }
      return "";
    }

    function taskCancelForm(key, task) {
      if (task.cancelEditing) {
        return `<div class="task-review-line is-canceled">
          <div class="review-copy">
            <strong>取消任务</strong>
            <span>取消原因必填，保存后会留存在任务状态和数据明细中。</span>
          </div>
          <label class="task-field">
            <span>取消原因</span>
            <input class="input" value="${escapeHtml(task.cancelDraft || task.cancelReason || "")}" placeholder="填写取消原因" data-cancel-task-reason="${key}">
          </label>
          <button class="btn ghost" data-dismiss-cancel-task="${key}">取消</button>
          <button class="btn danger" data-save-cancel-task="${key}">保存取消</button>
        </div>`;
      }
      if (task.status === "已取消") {
        return `<div class="task-review-line is-canceled">
          <div class="review-copy">
            <strong>任务已取消</strong>
            <span>取消原因：${escapeHtml(task.cancelReason || "原因待补充")}${task.canceledAt ? `；取消时间：${formatDate(task.canceledAt)}` : ""}</span>
          </div>

      const items = filteredDataItems();
      const total = items.length;
      const done = items.filter(item => item.task.status === "已完成").length;
      const delayed = items.filter(item => item.task.status === "延期中").length;
      const pending = total - done;
      const rate = total ? Math.round(done / total * 100) : 0;
      let content = dataTaskCalendarPanel();
      if (state.dataCenterTab === "specialStats") content = monthlySpecialStatsPanel();
      if (state.dataCenterTab === "dataBlocks") content = dataBlockDashboard(items, total, done, delayed, pending, rate);
      return `${dataCenterTabs()}
      ${content}`;

    function dataCenterTabs() {
      return `<div class="data-center-tabs">
        <button class="data-center-tab ${state.dataCenterTab === "specialStats" ? "active" : ""}" data-data-center-tab="specialStats">专场统计</button>

        <button class="data-center-tab ${state.dataCenterTab === "taskCalendar" ? "active" : ""}" data-data-center-tab="taskCalendar">任务日历</button>

    function dataTaskCalendarToolbar(memberOptions) {

        <div class="stat stat-blue"><div><strong>${rate}%</strong><span>完成率</span></div></div>

        ${state.dataMetricMenuOpen ? `<div class="metric-title-menu">${options.map(option => `<button class="metric-title-option ${state.dataMetricTab === option.id ? "active" : ""}" data-data-metric-option="${option.id}">${option.label}</button>`).join("")}</div>` : ""}
