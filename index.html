<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>达播专场四步流程交互图</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --line: #e4eaf2;
      --soft: #f4f7fb;
      --text: #00152e;
      --muted: #8b95a6;
      --orange: #ff7f00;
      --orange-soft: #fff4e8;
      --green: #2acb62;
      --green-soft: #e7f8ec;
      --red: #ff4246;
      --red-soft: #ffe9eb;
      --blue: #1583ee;
      --blue-soft: #eaf4ff;
      --purple: #7c5ce6;
      --purple-soft: #f1ebff;
      --shadow: 0 4px 14px rgba(15, 35, 65, 0.04);
      --radius: 20px;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-size: 14px; letter-spacing: 0; }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .shell { min-height: 100vh; display: grid; grid-template-rows: 60px 1fr; }
    .topbar {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dfe6ef;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand { display: flex; align-items: center; gap: 8px; min-width: 98px; font-size: 24px; font-weight: 900; color: #050505; line-height: 1; }
    .brand-mark { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; color: white; background: #ff7800; font-size: 22px; font-weight: 900; }
    .workbench { font-size: 18px; font-weight: 800; color: #0b1424; white-space: nowrap; }
    .nav {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav button {
      min-height: 60px;
      width: auto;
      padding: 0 22px;
      border-radius: 0;
      background: transparent;
      color: #8b95a6;
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      text-align: center;
      position: relative;
    }
    .nav button.active { color: var(--orange); background: #fff; }
    .nav button.active:before {
      content: "";
      width: 56px;
      height: 1px;
      border-radius: 99px;
      background: var(--orange);
      position: absolute;
      left: 50%;
      top: auto;
      bottom: 0;
      transform: translateX(-50%);
    }
    .top-actions { margin-left: auto; display: flex; align-items: center; gap: 14px; color: #00152e; font-size: 16px; white-space: nowrap; }
    .link-btn { color: #00152e; background: transparent; font-size: 16px; }
    .admin-badge { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; color: #fff; background: #9b7df5; font-size: 13px; font-weight: 900; }
    .user { display: none; align-items: center; gap: 8px; font-size: 15px; font-weight: 750; white-space: nowrap; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, #ffd9c2 0 23%, transparent 24%),
        radial-gradient(circle at 43% 33%, #2f241f 0 3%, transparent 4%),
        radial-gradient(circle at 57% 33%, #2f241f 0 3%, transparent 4%),
        radial-gradient(circle at 50% 78%, #226fca 0 30%, transparent 31%),
        linear-gradient(135deg, #b8dbe8, #e7c5f5);
      border: 2px solid #fff;
      box-shadow: 0 2px 7px rgba(0,0,0,.14);
    }

    main { width: auto; max-width: none; margin: 0; padding: 30px 26px 48px; min-height: calc(100vh - 60px); }
    .head { display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 24px; }
    .head h1 { font-size: 26px; font-weight: 500; line-height: 1.35; margin: 0; color: #00152e; }
    .actions { display: flex; gap: 10px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      border-radius: 7px;
      background: #f7f9fc;
      color: #00152e;
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
    }
    .btn.primary { color: white; background: var(--orange); box-shadow: none; }
    .btn.ghost { background: #fff; border: 1px solid #d9e1eb; }
    .btn.green { color: white; background: var(--green); }

    .process {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }
    .step-card {
      min-height: 120px;
      padding: 18px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: var(--shadow);
      text-align: left;
      color: inherit;
      position: relative;
      display: grid;
      gap: 12px;
    }
    .step-card.active { border-color: var(--orange); background: #fff8ef; box-shadow: none; }
    .step-index { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 50%; color: var(--orange); background: var(--orange-soft); font-weight: 700; }
    .step-card strong { font-size: 16px; font-weight: 600; line-height: 1.3; }
    .step-card span { color: var(--muted); line-height: 1.5; }

    .stats { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .stat {
      min-height: 114px;
      padding: 22px 28px;
      border-radius: var(--radius);
      border: 0;
      background: #fff;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .stat-icon { display: none; }
    .stat strong { display: block; font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 8px; color: #00152e; }
    .stat span { color: var(--muted); font-size: 14px; }
    .list-stats .stat { min-height: 112px; padding: 22px 28px; align-items: flex-start; }
    .stat.stat-orange strong { color: var(--orange); }
    .stat.stat-green strong { color: var(--green); }
    .stat.stat-blue strong { color: var(--blue); }
    .stat.stat-red strong { color: var(--red); }
    .stat.is-clickable {
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease;
    }
    .stat.is-clickable:hover { transform: translateY(-1px) scale(1.006); box-shadow: 0 8px 24px rgba(15, 35, 65, .08); }

    .panel {
      border: 0;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      min-height: 56px;
      padding: 16px 20px;
      border-bottom: 1px solid #e8eef5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-title { margin: 0; font-size: 18px; font-weight: 500; line-height: 1.35; color: #00152e; }
    .panel-body { padding: 18px 20px; }
    .panel-actions { margin-top: 16px; display: flex; justify-content: flex-end; }

    .grid-2 { display: grid; grid-template-columns: 380px minmax(0, 1fr); gap: 18px; align-items: start; }
    .grid-main { display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 18px; align-items: start; }
    .detail-main { display: grid; grid-template-columns: 1fr; gap: 18px; align-items: start; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(170px, 1fr)); gap: 14px; }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .stack { display: grid; gap: 12px; }

    .list-panel { overflow: visible; }
    .list-toolbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }
    .list-controls {
      display: grid;
      grid-template-columns: minmax(320px, 440px) minmax(260px, 480px);
      align-items: end;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .toolbar-field {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar-field .input { min-height: 44px; }
    .list-toolbar .seg-group {
      margin-left: auto;
      padding: 4px;
      border-radius: 15px;
      background: #f1f4f8;
      gap: 2px;
    }
    .list-toolbar .seg {
      min-height: 36px;
      border-radius: 12px;
      background: transparent;
      font-size: 15px;
    }
    .list-toolbar .seg.active { background: #fff; color: var(--orange); box-shadow: none; }
    .list-search {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid #d9e1eb;
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
    }
    .list-search input {
      width: 100%;
      height: 42px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
    }
    .list-date-field { position: relative; min-width: 0; }
    .list-range-picker { position: relative; }
    .list-range-trigger {
      width: 100%;
      min-height: 44px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border: 1px solid #d9e1eb;
      border-radius: 6px;
      background: #fff;
      color: #00152e;
      text-align: left;
    }
    .list-range-trigger.active {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 122, 0, .12);
    }
    .list-range-trigger strong {
      min-width: 0;
      color: #00152e;
      font-size: 15px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list-range-trigger b,
    .list-range-trigger i,
    .list-range-trigger em {
      color: var(--muted);
      font-style: normal;
      font-weight: 500;
    }
    .list-range-panel {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      z-index: 35;
      width: min(680px, calc(100vw - 80px));
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr);
      border: 1px solid #d9e1eb;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 38px rgba(15, 35, 65, .14);
      overflow: visible;
    }
    .list-range-panel:before {
      content: "";
      position: absolute;
      top: -6px;
      left: 34px;
      width: 10px;
      height: 10px;
      border-left: 1px solid #d9e1eb;
      border-top: 1px solid #d9e1eb;
      background: #fff;
      transform: rotate(45deg);
    }
    .list-range-shortcuts {
      display: grid;
      align-content: start;
      gap: 4px;
      padding: 12px;
      border-right: 1px solid #e8eef5;
      background: #fbfcfe;
    }
    .list-range-shortcut {
      min-height: 38px;
      padding: 0 10px;
      border-radius: 9px;
      color: #00152e;
      font-size: 14px;
      text-align: left;
    }
    .list-range-shortcut.active {
      background: #fff5ec;
      color: var(--orange);
      font-weight: 600;
    }
    .list-range-main {
      display: grid;
      gap: 12px;
      padding: 12px;
    }
    .list-range-fields {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }
    .list-range-box {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 12px;
      border: 1px solid #d9e1eb;
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
    }
    .list-range-box strong { color: #00152e; font-weight: 500; white-space: nowrap; }
    .list-range-fields i { color: var(--muted); font-style: normal; }
    .list-range-calendars {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .list-mini-calendar {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid #e8eef5;
      border-radius: 10px;
      background: #fff;
    }
    .list-mini-title {
      color: #00152e;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }
    .list-mini-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
      text-align: center;
      color: #00152e;
      font-size: 12px;
    }
    .list-mini-grid span {
      min-height: 26px;
      display: grid;
      place-items: center;
      border-radius: 7px;
    }
    .list-mini-grid .weekday,
    .list-mini-grid .muted { color: #a6afbd; }
    .list-mini-grid .in-range { background: #fff2e4; color: var(--orange); }
    .list-mini-grid .is-edge { background: var(--orange); color: #fff; font-weight: 700; }
    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 14px;
    }
    .project-card {
      min-height: 208px;
      padding: 22px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      display: grid;
      gap: 16px;
      text-align: left;
      color: inherit;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .project-card:hover { border-color: #ffc36f; box-shadow: 0 8px 24px rgba(15, 35, 65, .08); transform: translateY(-1px) scale(1.012); }
    .project-card-head,
    .project-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .project-card-head { align-items: flex-start; }
    .project-card h2 { margin: 0; color: var(--text); font-size: 17px; font-weight: 400; line-height: 1.35; }
    .project-title-line { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .project-title-line h2 { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-percent { color: var(--orange); font-size: 18px; font-weight: 800; }
    .project-main { display: grid; gap: 10px; min-width: 0; }
    .project-meta-line { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; color: var(--muted); font-size: 13px; }
    .project-meta-line strong { color: var(--text); font-weight: 400; }
    .project-card > .project-meta-line { padding-top: 2px; justify-content: space-between; gap: 10px; }
    .project-card .progress { margin-top: 2px; }
    .project-card-foot { padding-top: 2px; }
    .project-card-foot-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .project-meta-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0; }
    .project-date { margin-left: auto; white-space: nowrap; }
    .project-product-line {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: 6px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 13px;
    }
    .project-product-line strong { color: var(--text); font-size: 14px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .record-card, .need-card, .module-card, .task-card, .field {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
    }
    .record-card, .need-card, .module-card, .task-card { padding: 16px; display: grid; gap: 10px; text-align: left; width: 100%; color: inherit; }
    .record-card.active, .module-card.active { background: #fff8ef; border-color: var(--orange); box-shadow: none; }
    .field { min-height: 72px; padding: 14px; box-shadow: none; }
    .field label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; font-weight: 400; }
    .field strong { display: block; color: #00152e; font-size: 14px; font-weight: 400; line-height: 1.45; overflow-wrap: anywhere; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; color: var(--muted); font-size: 13px; }
    .title { font-size: 17px; font-weight: 400; line-height: 1.35; }
    .muted { color: var(--muted); }
    .mini { color: var(--muted); font-size: 12px; font-weight: 800; }
    .badge {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-radius: 999px;
      background: #eeeeec;
      color: #60656d;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge.orange { color: var(--orange); background: var(--orange-soft); }
    .badge.green { color: #20b857; background: var(--green-soft); }
    .badge.red { color: #f04444; background: var(--red-soft); }
    .badge.blue { color: var(--blue); background: var(--blue-soft); }
    .badge.purple { color: var(--purple); background: var(--purple-soft); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; display: inline-block; }
    .progress { height: 6px; border-radius: 999px; background: #efeeeb; overflow: hidden; }
    .progress span { display: block; height: 100%; border-radius: 999px; background: var(--orange); }

    .input, .select, textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid #d9e1eb;
      border-radius: 6px;
      background: #fff;
      padding: 0 12px;
      color: #00152e;
      outline: 0;
    }
    textarea { min-height: 96px; padding: 10px 12px; line-height: 1.6; resize: vertical; }
    .detail-groups { display: grid; gap: 14px; }
    .detail-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 18px 20px;
      display: grid;
      gap: 16px;
    }
    .detail-card.is-collapsed { background: #f8fafc; gap: 0; }
    .detail-card h3 { margin: 0; font-size: 17px; font-weight: 400; }
    .detail-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .detail-fields { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .detail-field { display: grid; gap: 8px; align-content: start; }
    .detail-field span { color: var(--muted); font-size: 13px; font-weight: 400; }
    .detail-field textarea { min-height: 54px; background: #fff; }
    .detail-field textarea:disabled { color: #8a8f98; cursor: not-allowed; }
    .detail-field-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .detail-field-label .required {
      color: var(--red);
      font-style: normal;
      font-weight: 700;
    }
    .detail-readonly {
      min-height: 40px;
      display: grid;
      gap: 4px;
      padding: 9px 12px;
      border: 1px solid #d9e1eb;
      border-radius: 6px;
      background: #f8fafc;
      color: #00152e;
    }
    .detail-readonly strong { font-weight: 600; }
    .detail-readonly em { color: var(--muted); font-size: 12px; font-style: normal; }
    .time-range-row { display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr); align-items: center; gap: 8px; }
    .time-range-separator { color: var(--muted); font-size: 13px; font-style: normal; }
    .detail-field.long { grid-column: span 2; }
    .detail-field.full { grid-column: 1 / -1; }
    .product-field {
      display: grid;
      gap: 10px;
    }
    .product-select-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .product-panel {
      border: 1px solid #e4eaf2;
      border-radius: 14px;
      background: #fbfcfe;
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .product-panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .product-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .product-chip {
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid #dfe6ef;
      background: #fff;
      color: #4f5e72;
      font-size: 13px;
    }
    .product-chip.active {
      border-color: var(--orange);
      background: var(--orange-soft);
      color: var(--orange);
      font-weight: 600;
    }
    .module-tabs { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
    .module-tab {
      min-height: 104px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
      text-align: left;
      color: inherit;
      transition: background .16s ease, border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .module-tab:hover { border-color: #ffc36f; background: #fff8ef; box-shadow: 0 8px 24px rgba(15, 35, 65, .08); transform: translateY(-1px) scale(1.012); }
    .module-tab.active { border-color: var(--orange); background: #fff4e7; box-shadow: none; }
    .module-tab.active strong { color: var(--orange); }
    .module-tab.active .muted { color: #c46b00; }
    .module-tab strong { font-size: 17px; font-weight: 400; line-height: 1.3; }

      </section>`;
    }

    function pageList() {
      const month = state.listMonth || "2026-06";
      const rangeRecords = records.filter(record => record.liveTime && inDateRange(record.liveTime.slice(0, 10), state.listStart, state.listEnd));
      const running = rangeRecords.filter(item => item.status !== "待复盘").length;
      const review = rangeRecords.filter(item => item.status === "待复盘").length;
      const delayed = rangeRecords.filter(item => (item.scheduleStatus || item.status || "").includes("延期") || recordDelayedTask(item)).length;
      const completedInRange = rangeRecords.filter(item => item.status === "待复盘" || item.progress >= 90).length;
      const keyword = state.listSearch.trim().toLowerCase();
      const filteredRecords = rangeRecords.filter(record => {
        const statusMatched = state.listFilter === "all" || (state.listFilter === "running" && record.status !== "待复盘") || (state.listFilter === "review" && record.status === "待复盘");
        const searchText = [record.title, record.talent, record.uid, record.liveTime, record.product, record.status, talentGrade(record)].join(" ").toLowerCase();
        return statusMatched && (!keyword || searchText.includes(keyword));
      });
      return `${head("专场列表", `<button class="btn primary" data-action="newRecord">+ 发起新专场</button>`)}
      <section class="stats list-stats">
        <div class="stat stat-orange"><div><strong>${rangeRecords.length}</strong><span>${listRangeTitle()}专场</span></div></div>
        <div class="stat stat-green"><div><strong>${running}</strong><span>进行中</span></div></div>
        <div class="stat stat-blue"><div><strong>${completedInRange}</strong><span>已直播</span></div></div>
        <div class="stat stat-red"><div><strong>${delayed}</strong><span>延期申请</span></div></div>
      </section>
      ${monthCalendar(month, rangeRecords)}
      <section class="panel list-panel">
        <div class="panel-body">
          <div class="list-toolbar">
            <div class="list-controls">
              ${listRangePicker()}
              <label class="list-search"><span>⌕</span><input value="${state.listSearch}" placeholder="搜索达人、UID、产品、等级" data-list-search></label>
            </div>
            <div class="seg-group">
              ${listFilterButton("all", "全部", rangeRecords.length)}
              ${listFilterButton("running", "进行中", running)}
              ${listFilterButton("review", "待复盘", review)}
            </div>
          </div>
          ${filteredRecords.length ? `<div class="project-grid">${filteredRecords.map(record => projectCard(record)).join("")}</div>` : `<div class="upload"><div><strong>暂无匹配专场</strong></div></div>`}
        </div>
      </section>`;
    }

    function monthCalendar(month, monthRecords) {
      const [year, rawMonth] = month.split("-").map(Number);
      const first = new Date(year, rawMonth - 1, 1);
      const last = new Date(year, rawMonth, 0);
      const startOffset = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const totalCells = Math.ceil((startOffset + last.getDate()) / 7) * 7;
      const weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
      const cells = Array.from({ length: totalCells }, (_, index) => {
        const day = index - startOffset + 1;
        const inMonth = day >= 1 && day <= last.getDate();
        const dateText = inMonth ? `${month}-${String(day).padStart(2, "0")}` : "";
        const dayRecords = inMonth
          ? monthRecords.filter(record => record.liveTime.slice(0, 10) === dateText).sort((a, b) => a.liveTime.localeCompare(b.liveTime))
          : [];
        const expanded = state.calendarExpandedDay === dateText;
        const visibleRecords = expanded ? dayRecords : dayRecords.slice(0, 2);
        const hiddenCount = dayRecords.length - visibleRecords.length;
        const moreButton = hiddenCount > 0
          ? `<button class="calendar-more" data-calendar-day-toggle="${dateText}">还有 ${hiddenCount} 场</button>`
          : expanded && dayRecords.length > 2
            ? `<button class="calendar-more" data-calendar-day-toggle="${dateText}">收起</button>`
            : "";
        return `<div class="calendar-cell ${inMonth ? "" : "is-muted"} ${dayRecords.length > 2 ? "has-many" : ""} ${expanded ? "is-expanded" : ""}">
          <div class="calendar-day"><span>${inMonth ? day : ""}</span>${dayRecords.length ? badge(`${dayRecords.length}场`, "orange") : ""}</div>
          ${visibleRecords.map(record => calendarEvent(record)).join("")}
          ${moreButton}
        </div>`;
      });
      return `<section class="panel month-calendar">
        <div class="panel-head"><div class="calendar-title"><h2 class="panel-title">专场日历</h2>${badge(`${monthRecords.length} 个专场`, "blue")}</div><div class="calendar-head-actions"><label class="calendar-month-picker"><span>月份</span><input class="input" type="month" value="${month}" data-list-month></label><button class="calendar-toggle" data-calendar-toggle>${state.calendarOpen ? "收起日历" : "展开日历"}</button></div></div>
        ${state.calendarOpen ? `<div class="panel-body">
          <div class="calendar-grid">
            ${weekdays.map(day => `<div class="calendar-weekday">${day}</div>`).join("")}
            ${cells.join("")}
          </div>
        </div>` : ""}
      </section>`;
    }

    function listRangeTitle() {
      const option = listRangeOptions().find(item => item.start === state.listStart && item.end === state.listEnd);
      return option ? option.label : "自定义";
    }

    function listRangePicker() {
      return `<div class="toolbar-field list-date-field">
        <span>排期时间</span>
        <div class="list-range-picker">
          <button class="list-range-trigger ${state.listRangeOpen ? "active" : ""}" data-list-range-toggle>
            <em>◷</em>
            <strong>${formatDate(state.listStart)}</strong>
            <b>-</b>
            <strong>${formatDate(state.listEnd)}</strong>
            <i>⌄</i>
          </button>
          ${state.listRangeOpen ? listRangePanel() : ""}
        </div>
      </div>`;
    }

    function listRangePanel() {
      const options = listRangeOptions();
      const baseMonth = state.listStart ? state.listStart.slice(0, 7) : state.listMonth;
      return `<div class="list-range-panel">
        <div class="list-range-shortcuts">
          ${options.map(option => `<button class="list-range-shortcut ${state.listRangePreset === option.key ? "active" : ""}" data-list-range-option="${option.key}">${option.label}</button>`).join("")}
        </div>
        <div class="list-range-main">
          <div class="list-range-fields">
            <div class="list-range-box"><span>开始日期</span><strong>${formatDate(state.listStart)}</strong></div>
            <i>›</i>
            <div class="list-range-box"><span>结束日期</span><strong>${formatDate(state.listEnd)}</strong></div>
          </div>
          <div class="list-range-calendars">
            ${listMiniCalendar(baseMonth)}
            ${listMiniCalendar(shiftMonth(baseMonth, 1))}
          </div>
        </div>
      </div>`;
    }

    function listRangeOptions() {
      return [
        { key: "week", label: "本周", start: "2026-06-22", end: "2026-06-28" },
        { key: "month", label: "本月", start: "2026-06-01", end: "2026-06-30" },
        { key: "lastMonth", label: "上月", start: "2026-05-01", end: "2026-05-31" }
      ];
    }

    function listMiniCalendar(month) {
      const [year, rawMonth] = month.split("-").map(Number);
      const first = new Date(year, rawMonth - 1, 1);
      const startOffset = first.getDay();
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      const cells = Array.from({ length: 42 }, (_, index) => {
        const date = new Date(year, rawMonth - 1, index - startOffset + 1);
        const key = dateKey(date);
        const inMonth = date.getMonth() === rawMonth - 1;
        const inRange = inDateRange(key, state.listStart, state.listEnd);
        const isEdge = key === state.listStart || key === state.listEnd;
        const cls = `${inMonth ? "" : "muted"} ${inRange ? "in-range" : ""} ${isEdge ? "is-edge" : ""}`;
        return `<span class="${cls.trim()}">${date.getDate()}</span>`;
      }).join("");
      return `<div class="list-mini-calendar">
        <div class="list-mini-title">${year} 年 ${rawMonth} 月</div>
        <div class="list-mini-grid">${weekdays.map(day => `<span class="weekday">${day}</span>`).join("")}${cells}</div>
      </div>`;
    }

    function monthRange(month) {
      const [year, rawMonth] = month.split("-").map(Number);
      return { start: `${month}-01`, end: dateKey(new Date(year, rawMonth, 0)) };
    }

    function shiftMonth(month, offset) {
      const [year, rawMonth] = month.split("-").map(Number);
      return dateKey(new Date(year, rawMonth - 1 + offset, 1)).slice(0, 7);
    }

    function dateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function calendarEvent(record) {
      const done = record.status === "待复盘" || record.progress >= 90;
      const delay = record.status.includes("延期");
      return `<button class="calendar-event ${done ? "done" : ""} ${delay ? "delay" : ""}" data-open-project="${record.id}">
        <strong>${record.talent} · ${record.product}</strong>
        <span>${record.liveTime.slice(11, 16)} / ${record.status}</span>
      </button>`;
    }

    function listFilterButton(key, label, count) {
      return `<button class="seg ${state.listFilter === key ? "active" : ""}" data-list-filter="${key}">${label} ${count}</button>`;
    }

    function talentGrade(record) {
      return talentGradeFromSales(record.expectedGmv || record.sales);
    }

    function talentGradeFromSales(salesText) {
      const salesValue = gmvAmount(salesText) || 0;
      if (salesValue > 300) return "S+";
      if (salesValue >= 151) return "S";
      if (salesValue >= 100) return "A";
      if (salesValue >= 51) return "B";
      return "C";
    }

    function gradeRank(level) {
      return { "S+": 0, S: 1, A: 2, B: 3, C: 4 }[String(level || "C").toUpperCase()] ?? 5;
    }

    function urgencyClass(level) {
      const map = { "S+": "red", S: "red", A: "orange", B: "blue", C: "green" };
      return map[(level || "B").toUpperCase()] || "orange";
    }

    function urgencyBadge(level) {
      const value = (level || "B").toUpperCase();
      return badge(value, urgencyClass(value));
    }

    function projectCard(record) {
      const displayStatus = record.scheduleStatus || record.status;
      const cls = displayStatus === "待复盘" ? "green" : displayStatus === "派工中" ? "blue" : displayStatus === "已取消" || displayStatus === "已延期" ? "red" : "orange";
      return `<button class="project-card" data-open-project="${record.id}">
        <div class="project-card-head">
          <div class="project-main">
            <div class="project-title-line">${urgencyBadge(talentGrade(record))}<h2>${record.title}</h2></div>
          </div>
          <span class="project-percent">${record.progress}%</span>
        </div>
        <div class="project-product-line"><span>主推产品</span><strong>${record.product}</strong></div>
        <div class="progress"><span style="width:${record.progress}%"></span></div>
        <div class="project-card-foot"><span class="project-card-foot-left">${badge(displayStatus, cls)}</span><span class="muted">${record.sales}</span></div>
        <div class="project-meta-line"><span class="project-meta-left"><span>达人 <strong>${record.talent}</strong></span></span><span class="project-date">${record.liveTime}</span></div>
      </button>`;
    }

    function pageEntry() {
      return `<section class="panel">
        <div class="panel-head">
          <div><h2 class="panel-title">专场文档录入</h2></div>
        </div>
        <div class="panel-body stack">
          <div class="upload entry-upload">
            <div class="entry-upload-content">
              <strong>上传达人专场文档</strong>
              <div class="entry-upload-actions">
                <label class="btn primary entry-upload-btn">选择文档<input type="file" multiple data-entry-doc-upload accept=".doc,.docx,.pdf,.xls,.xlsx,.csv,.txt,.md,image/*"></label>
                ${state.entryDocs.length ? `<button class="btn ghost" data-action="recognizeDoc">识别文档</button>` : ""}
              </div>
              ${entryDocumentFiles()}
            </div>
          </div>
        </div>
      </section>
      ${specialDetailSection()}`;
    }

    function entryDocumentFiles() {
      const files = state.entryDocs || [];
      if (!files.length) return `<div class="entry-upload-empty">未上传文件</div>`;
      return `<div class="entry-file-list">${files.map(file => {
        const name = escapeHtml(file.name);
        const type = escapeHtml(file.type || file.ext || "本地文件");
        return `<div class="entry-file-chip">
          <div class="entry-file-main"><strong title="${name}">${name}</strong><span>${formatFileSize(file.size)} · ${type}</span></div>
          <button class="file-remove" data-remove-entry-doc="${file.id}" aria-label="删除${name}">x</button>
        </div>`;
      }).join("")}</div>`;
    }

    function specialDetailSection() {
      return `<section class="panel" style="margin-top:18px">
        <div class="panel-head">
          <div><h2 class="panel-title">专场详情</h2></div>
        </div>
        <div class="panel-body">
          <div class="detail-groups">${specialDetailGroups.map((group, groupIndex) => detailCard(group, groupIndex)).join("")}</div>
          <div class="panel-actions"><button class="btn primary" data-action="createProjectFromEntry">发布需求</button></div>
        </div>
      </section>`;
    }

    function detailCard(group, groupIndex) {
      const enabled = !group.supportKey || supportNeeds[group.supportKey].enabled;
      return `<div class="detail-card ${enabled ? "" : "is-collapsed"}">
        <div class="detail-card-head">
          <h3>${group.title}</h3>
          ${group.supportKey ? supportSwitch(group.supportKey, group.switchLabel) : ""}
        </div>
        ${enabled ? `<div class="detail-fields">${group.fields.map((item, fieldIndex) => detailField(groupIndex, fieldIndex, item)).join("")}</div>` : ""}
      </div>`;
    }

    function supportSwitch(key, label) {
      return `<label class="support-switch">
        <input type="checkbox" data-detail-support-toggle="${key}" ${supportNeeds[key].enabled ? "checked" : ""}>
        <span class="switch-track"></span>
        <span>${label}</span>
      </label>`;
    }

    function padTimePart(value) {
      return String(value || "").padStart(2, "0");
    }

    function normalizedDateValue(value) {
      const match = String(value || "").trim().match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
      return match ? `${match[1]}-${padTimePart(match[2])}-${padTimePart(match[3])}` : "";
    }

    function normalizedDateTimeValue(value) {
      const match = String(value || "").trim().match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})(?:[ T](\d{1,2}):(\d{2}))?/);
      if (!match) return "";
      return `${match[1]}-${padTimePart(match[2])}-${padTimePart(match[3])}T${padTimePart(match[4] || "00")}:${padTimePart(match[5] || "00")}`;
    }

    function normalizedTimeValue(value) {
      const match = String(value || "").trim().match(/^(\d{1,2}):(\d{2})$/);
      return match ? `${padTimePart(match[1])}:${padTimePart(match[2])}` : "";
    }

    function timeRangeValue(value) {
      const match = String(value || "").trim().match(/^(\d{1,2}:\d{2})\s*(?:-|~|—|至)\s*(\d{1,2}:\d{2})$/);
      return match ? { start: normalizedTimeValue(match[1]), end: normalizedTimeValue(match[2]) } : null;
    }

    function detailTimeType(item) {
      if (item.type === "datetime-local" || item.type === "date" || item.type === "time") return item.type;
      const label = item.label || "";
      const value = String(item.value || "").trim();
      if (!/[日期时间]/.test(label)) return "";
      if (timeRangeValue(value)) return "time-range";
      if (normalizedDateTimeValue(value) && (label.includes("时间") || value.includes(":"))) return "datetime-local";
      if (normalizedDateValue(value) && label.includes("日期")) return "date";
      if (normalizedTimeValue(value)) return "time";
      return "";
    }

    function detailFieldLabel(item) {
      return `<span class="detail-field-label">${item.label}${item.required ? `<i class="required">*</i>` : ""}</span>`;
    }

    function detailGroupField(groupIndex, label) {
      const group = specialDetailGroups[groupIndex];
      return group ? group.fields.find(field => field.label === label) : null;
    }

    function shouldShowDetailField(groupIndex, item) {
      if (!item.showWhen) return true;
      const target = detailGroupField(groupIndex, item.showWhen.label);
      if (!target) return true;
      const expected = Array.isArray(item.showWhen.value) ? item.showWhen.value : [item.showWhen.value];
      return expected.includes(target.value);
    }

    function shootCountRule() {
      const amount = gmvAmount(specialValue("目标销售额", specialValue("预估销售额", "0")));
      if (!Number.isFinite(amount)) return { count: "待填写目标销售额", level: "系统将根据 GMV 自动计算" };
      if (amount < 50) return { count: "1条", level: "C级：小于50w" };
      if (amount < 100) return { count: "2-3条", level: "B级：50w-90w" };
      if (amount <= 150) return { count: "4-5条", level: "A级：100w-150w" };
      return { count: "可全部承接（大场撞一起另协调）", level: "S级：150w+" };
    }

    function detailField(groupIndex, fieldIndex, item, disabled = false) {
      if (!shouldShowDetailField(groupIndex, item)) return "";
      const cls = item.wide ? ` ${item.wide}` : "";
      const key = `${groupIndex}:${fieldIndex}`;
      if (item.type === "computed-shot-count") {
        const rule = shootCountRule();
        return `<div class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <div class="detail-readonly"><strong>${rule.count}</strong><em>${rule.level}</em></div>
        </div>`;
      }
      if (item.type === "select") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <select class="select" data-special-detail="${key}" ${disabled ? "disabled" : ""}>${item.options.map(option => `<option ${option === item.value ? "selected" : ""}>${option}</option>`).join("")}</select>
        </label>`;
      }
      if (item.type === "datetime-local") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="datetime-local" value="${normalizedDateTimeValue(item.value)}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      const timeType = detailTimeType(item);
      if (timeType === "datetime-local") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="datetime-local" value="${normalizedDateTimeValue(item.value)}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      if (timeType === "date") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="date" value="${normalizedDateValue(item.value)}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      if (timeType === "time") {
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <input class="input" type="time" value="${normalizedTimeValue(item.value)}" data-special-detail="${key}" ${disabled ? "disabled" : ""}>
        </label>`;
      }
      if (timeType === "time-range") {
        const range = timeRangeValue(item.value);
        return `<label class="detail-field${cls}">
          ${detailFieldLabel(item)}
          <div class="time-range-row">
            <input class="input" type="time" value="${range.start}" data-special-detail-range="${key}" data-range-part="start" ${disabled ? "disabled" : ""}>
            <em class="time-range-separator">至</em>
            <input class="input" type="time" value="${range.end}" data-special-detail-range="${key}" data-range-part="end" ${disabled ? "disabled" : ""}>
          </div>
        </label>`;
      }
      if (item.type === "product") {
        return `<div class="detail-field${cls} product-field">
          ${detailFieldLabel(item)}
          <div class="product-select-row">
            <select class="select" data-special-detail="${key}" ${disabled ? "disabled" : ""}>${item.options.map(option => `<option ${option === item.value ? "selected" : ""}>${option}</option>`).join("")}</select>
            <button class="btn ghost" data-product-toggle>${state.productPanelOpen ? "收起商品栏" : "展开商品栏"}</button>
          </div>
          ${state.productPanelOpen ? `<div class="product-panel">
            <div class="product-panel-head"><strong>标准主推产品</strong><span>点击商品可回填到下拉框</span></div>
            <div class="product-options">${item.options.map(option => `<button class="product-chip ${option === item.value ? "active" : ""}" data-product-option="${option}" data-product-field="${key}">${option}</button>`).join("")}</div>
          </div>` : ""}
        </div>`;
      }
      return `<label class="detail-field${cls}">
        ${detailFieldLabel(item)}
        <textarea data-special-detail="${key}" ${disabled ? "disabled" : ""}>${item.value}</textarea>
      </label>`;
    }

    function pageDetail() {
      const record = selectedRecord();
      return `${projectHeader(record)}
      ${projectProgress(record)}
      <section class="panel" style="margin-bottom:18px">
        <div class="panel-head">
          <div><h2 class="panel-title">抄送人</h2></div>
          <button class="btn ghost" data-drawer="copy">编辑</button>
        </div>
      </section>
      <section class="detail-main">
        <div class="panel">
          <div class="panel-head"><div><h2 class="panel-title">任务记录</h2></div>${badge(`${projectTaskRecords(record).length} 条任务`, "orange")}</div>
          <div class="panel-body node-record-stack">${nodeTimeline(record)}<div class="table-wrap">${nodeTable(record)}</div></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2 class="panel-title">项目详情</h2><button class="btn ghost" data-drawer="record">原始记录</button></div>
          <div class="panel-body stack">
            <div class="field-grid">${field("达人 UID", record.uid)}${field("开播时间", record.liveTime)}${field("负责商务", record.business)}${field("状态", record.scheduleStatus || record.status)}${field("类型", record.type || "专场")}${field("目标销售额", record.expectedGmv || record.sales)}${field("主推产品", record.product)}</div>
            <div class="panel" style="box-shadow:none"><div class="panel-head"><h3 class="panel-title">需求识别概览</h3></div><div class="panel-body"><div class="grid-4">${Object.entries(modules).map(([key, module]) => moduleNeedSummary(key, module)).join("")}</div></div></div>
          </div>
        </div>
      </section>`;
    }

    function projectHeader(record) {
      const cls = record.status === "待复盘" ? "green" : record.status === "派工中" ? "blue" : "orange";
      return `<section class="panel" style="margin-bottom:18px">
        <div class="panel-head" style="min-height:96px">
          <div class="row" style="justify-content:flex-start">
            <button class="btn ghost" data-view="list" onclick="goList()">‹</button>
            <div>
              <div class="meta">${urgencyBadge(talentGrade(record))}${badge(record.status, cls)}</div>
              <h1 style="font-size:24px;margin:8px 0 0">${record.title}</h1>
            </div>
          </div>
          <button class="btn ghost" data-action="openLog" onclick="openLogDrawer()">项目事件日志</button>
        </div>
      </section>`;
    }

    function projectProgress(record) {
      return `<section class="panel" style="margin-bottom:18px">
        <div class="panel-body">
          <div class="row"><span class="muted">${record.nodesDone}/${record.nodesTotal} 节点</span><strong style="color:var(--orange)">${record.progress}%</strong></div>
          <div style="height:10px"></div>
          <div class="progress"><span style="width:${record.progress}%"></span></div>
        </div>
      </section>`;
    }

    function projectTaskRecords(record) {
      const recordTasks = dispatchTasks[record.id] || {};
      const rows = [];
      moduleOrder.forEach(moduleKey => {
        const module = modules[moduleKey];
        const support = supportNeeds[moduleKey];
        const taskList = recordTasks[moduleKey] || [];
        taskList.forEach((task, index) => {
          const status = task.status || "待处理";
          const due = task.delayDue || task.due || assignmentFor(record.id, moduleKey).due;
          rows.push({
            id: `${record.id}:${moduleKey}:${index}`,
            name: task.title,
            moduleKey,
            moduleName: support.title,
            moduleOwner: module.owner,
            owner: task.owner || assignmentFor(record.id, moduleKey).owner,
            status,
            date: timelineTaskDate(due),
            fullDate: due,
            note: `${support.title} · ${task.owner || module.owner}负责执行`
          });
        });
      });
      return rows.length ? rows : projectNodes.map((node, index) => {
        const status = nodeStatus(record, index);
        return { ...node, owner: node.owner, status, date: node.date, fullDate: node.date, moduleName: "流程节点", moduleOwner: node.owner };
      });
    }

    function timelineTaskDate(value) {
      if (!value) return "";
      if (value.includes("-")) return value.slice(5, 10).replace("-", "/");
      if (value.includes("/")) {
        const parts = value.split("/");
        return parts.length >= 3 ? `${parts[1]}/${parts[2]}` : value;
      }
      return value;
    }

    function nodeStatus(record, index) {
      return index < record.nodesDone ? "已完成" : index === record.nodesDone ? "执行中" : "待执行";
    }

    function nodeStatusClass(status) {
      return taskStatusClass(status);
    }

    function taskStatusClass(status) {
      if (status === "已完成") return "green";
      if (status === "延期中") return "red";
      if (status === "待审核") return "purple";
      if (status === "进行中" || status === "执行中" || status === "已派发") return "blue";
      if (status === "待处理" || status === "待派发" || status === "待执行") return "orange";
      return "gray";
    }

    function nodeTable(record) {
      const rows = projectTaskRecords(record);
      return `<table><colgroup><col style="width:34%"><col style="width:16%"><col style="width:18%"><col style="width:16%"><col style="width:16%"></colgroup>
        <thead><tr><th>任务名称</th><th>负责人</th><th>计划时间</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>${rows.map(row => {
          const cls = nodeStatusClass(row.status);
          return `<tr>
            <td><strong>${row.name}</strong><div class="muted">${row.moduleName}</div></td>
            <td>${row.owner}</td>
            <td>${formatDate(row.fullDate)}</td>
            <td>${badge(row.status, cls === "gray" ? "" : cls)}</td>
            <td><button class="btn ghost" data-node-detail="${row.id}">查看</button></td>
          </tr>`;
        }).join("")}</tbody></table>`;
    }

    function nodeTimeline(record) {
      const rows = projectTaskRecords(record);
      const dates = timelineDates(rows);
      const today = "06/08";
      return `<div class="node-timeline">
        <div class="timeline-grid" style="--timeline-cols:${dates.length};min-width:${230 + dates.length * 58}px">
          <div class="timeline-head timeline-title">任务名称</div>
          ${dates.map(date => `<div class="timeline-head ${date === today ? "today-head" : ""}">${date}</div>`).join("")}
          ${rows.map(row => {
            const cls = nodeStatusClass(row.status);
            return `<div class="timeline-task">
              <div class="timeline-task-name">${row.name}</div>
              <div class="timeline-task-meta">${row.moduleName} · ${row.owner}</div>
              ${badge(row.status, cls === "gray" ? "" : cls)}
            </div>
            ${dates.map(date => `<div class="timeline-cell ${date === today ? "today-cell" : ""}">
              ${date === row.date ? `<button class="timeline-marker ${cls}" data-node-detail="${row.id}" aria-label="${row.name} ${row.status}"></button>` : ""}
            </div>`).join("")}`;
          }).join("")}
        </div>
      </div>`;
    }

    function timelineDates(rows) {
      const today = parseTimelineDate("06/08");
      const nodeDates = rows.map(row => parseTimelineDate(row.date)).filter(date => !Number.isNaN(date.getTime()));
      const start = new Date(Math.min(today.getTime(), ...nodeDates.map(date => date.getTime())));
      const end = new Date(Math.max(today.getTime(), ...nodeDates.map(date => date.getTime())));
      const dates = [];
      for (let date = new Date(start); date <= end; date = addTimelineDay(date, 1)) {
        dates.push(formatTimelineDate(date));
      }
      return dates;
    }

    function parseTimelineDate(value) {
      const [month, day] = value.split("/").map(Number);
      return new Date(2026, month - 1, day);
    }

    function addTimelineDay(date, amount) {
      const next = new Date(date);
      next.setDate(next.getDate() + amount);
      return next;
    }

    function formatTimelineDate(date) {
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${month}/${day}`;
    }

    function pageRecord() {
      const record = selectedRecord();
      return `${head("专场记录", `<button class="btn primary" data-action="newRecord">新增专场记录</button><button class="btn ghost" data-go="analysis">提交需求识别</button>`)}
      ${stats()}
      <section class="grid-2">
        <div class="panel">
          <div class="panel-head"><div><h2 class="panel-title">专场记录表</h2></div>${badge("商务填写", "orange")}</div>
          <div class="panel-body stack">
            ${records.map(item => `<button class="record-card ${item.id === state.selected ? "active" : ""}" data-record="${item.id}">
              <div class="row"><span class="title">${item.title}</span>${badge(item.status, item.status === "待复盘" ? "green" : item.status === "派工中" ? "blue" : "orange")}</div>
              <div class="meta"><span>${item.talent}</span><span>${item.uid}</span><span>${item.liveTime}</span></div>
              <div class="progress"><span style="width:${item.progress}%"></span></div>
              <span class="muted">${item.source}</span>
            </button>`).join("")}
          </div>

        <div class="panel">

          <div class="panel-body stack">
            <div class="field-grid">${field("达人 UID", record.uid)}${field("开播时间", record.liveTime)}${field("负责商务", record.business)}${field("状态", record.scheduleStatus || record.status)}${field("类型", record.type || "专场")}${field("目标销售额", record.expectedGmv || record.sales)}${field("主推产品", record.product)}</div>
            <div class="upload"><div><strong>专场记录表入口</strong><button class="btn primary" data-go="analysis">提交需求识别</button></div></div>
          </div>

      </section>`;
    }

    function pageAnalysis() {
      return `${head("需求识别", `<button class="btn primary" data-action="runAnalysis">重新识别字段</button><button class="btn ghost" data-go="dispatch">进入任务派工</button>`)}
      <section class="grid-main">
        <div class="panel">
          <div class="panel-head"><div><h2 class="panel-title">需求识别结果</h2></div>${badge("7 条需求", "blue")}</div>
          <div class="panel-body">
            <div class="grid-4">${Object.entries(modules).map(([key, module]) => moduleNeedSummary(key, module)).join("")}</div>

            <div class="stack">${needs.map(needCard).join("")}</div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2 class="panel-title">识别依据</h2>${badge("字段分析", "orange")}</div>
          <div class="panel-body stack">
            ${field("内容判断", "出现视频条数、达人内容偏好、预热时间，因此存在内容需求。")}
            ${field("剪辑判断", "出现素材与视频版本交付，因此存在剪辑需求。")}
            ${field("投放判断", "出现千川合作码、粉丝画像、费比，因此存在投放需求。")}
            ${field("运营判断", "出现设备、镜像、化妆、福利品、样品，因此存在运营需求。")}
          </div>
        </div>
      </section>`;
    }

    function moduleNeedSummary(key, module) {
      const list = needs.filter(item => item.module === key && item.exists);
      return `<button class="module-card ${state.module === key ? "active" : ""}" data-module="${key}" data-go="dispatch">
        <div class="row"><strong>${module.name}</strong>${badge(`${list.length} 条`, module.cls)}</div>

        <span class="muted">负责人：${module.owner}</span>
      </button>`;
    }

    function needCard(need) {
      const module = modules[need.module];
      const statusCls = need.status === "需确认" ? "red" : need.status === "已派工" ? "green" : "orange";
      return `<button class="need-card" data-need="${need.id}">
        <div class="row"><strong>${need.title}</strong>${badge(need.status, statusCls)}</div>
        <div class="meta">${badge(module.name, module.cls)}<span>置信度 ${need.confidence}%</span><span>${need.source}</span></div>
      </button>`;
    }

    function pageDispatch() {
      const module = modules[state.module];
      const enabled = supportNeeds[state.module] ? supportNeeds[state.module].enabled : true;
      const pending = records.filter(record => assignmentFor(record.id, state.module).status === "待派发").length;
      const reviewing = allDispatchTaskItems().filter(item => item.moduleKey === state.module && item.task.status === "待审核").length;
      return `<section class="module-tabs">${moduleOrder.map(moduleTab).join("")}</section>
      <section class="panel">
        <div class="panel-head">
          <div><h2 class="panel-title">${supportNeeds[state.module].title}工作台</h2></div>
          ${reviewing ? badge(`${reviewing} 个待审核`, "purple") : badge(`${pending} 个待派发`, pending ? "orange" : "green")}
        </div>
        <div class="panel-body">
          ${enabled ? `<div class="dispatch-list">${records.map(record => dispatchCard(record, state.module)).join("")}</div>` : emptyDispatch(module)}
        </div>
      </section>`;
    }

    function moduleTab(key) {
      const module = modules[key];
      const pending = records.filter(record => assignmentFor(record.id, key).status === "待派发").length;
      const reviewing = allDispatchTaskItems().filter(item => item.moduleKey === key && item.task.status === "待审核").length;
      return `<button class="module-tab ${state.module === key ? "active" : ""}" data-module="${key}" data-go="dispatch">
        <div class="row"><strong>${supportNeeds[key].title}</strong>${reviewing ? badge(`${reviewing} 待审核`, "purple") : badge(`${pending} 待派发`, pending ? "orange" : "green")}</div>
        <span class="muted">负责人：${module.owner}</span>
      </button>`;
    }

    function assignmentFor(recordId, moduleKey) {
      if (!dispatchAssignments[recordId]) dispatchAssignments[recordId] = {};
      if (!dispatchAssignments[recordId][moduleKey]) {
        dispatchAssignments[recordId][moduleKey] = {
          owner: moduleMembers[moduleKey][0],
          due: defaultDue(records.find(record => record.id === recordId)),
          status: "待派发"
        };
      }
      return dispatchAssignments[recordId][moduleKey];
    }

    function defaultDue(record) {
      return record && record.liveTime ? record.liveTime.slice(0, 10) : "2026-06-17";
    }

    function tasksFor(recordId, moduleKey) {
      if (!dispatchTasks[recordId]) dispatchTasks[recordId] = {};
      if (!dispatchTasks[recordId][moduleKey]) {
        const assignment = assignmentFor(recordId, moduleKey);
        dispatchTasks[recordId][moduleKey] = [{
          title: taskTemplates[moduleKey][0],
          owner: assignment.owner,
          due: assignment.due
        }];
      }
      return dispatchTasks[recordId][moduleKey];
    }

    function dispatchDue(recordId, moduleKey) {
      const dates = tasksFor(recordId, moduleKey).map(task => task.delayDue || task.due).filter(Boolean).sort();
      return dates[dates.length - 1] || assignmentFor(recordId, moduleKey).due;
    }

    function dispatchCard(record, moduleKey) {
      const assignment = assignmentFor(record.id, moduleKey);
      const module = modules[moduleKey];
      const taskList = tasksFor(record.id, moduleKey);
      const statusCls = taskStatusClass(assignment.status);
      const dispatchKey = `${record.id}:${moduleKey}`;
      const open = state.dispatchOpen === dispatchKey;
      return `<article class="dispatch-card ${open ? "is-open" : ""}">
        <button class="dispatch-summary" data-toggle-dispatch="${dispatchKey}">
          <h3>${record.title}</h3>
          <div class="dispatch-summary-meta"><span>预计完成 ${formatDate(dispatchDue(record.id, moduleKey))}</span><span class="dispatch-chevron">⌄</span></div>
        </button>
        ${open ? `<div class="dispatch-detail">
          <div class="dispatch-main">
            <div class="demand-text">
              <strong>${supportNeeds[moduleKey].title}需求内容</strong>
              ${demandText(record, moduleKey)}
            </div>
            <div class="task-builder">
              <div class="task-builder-head">
                <div>
                  <strong>新建任务</strong>
                </div>
                ${badge(`${taskList.length} 条子任务`, module.cls)}
              </div>
              <div class="task-list">
                ${taskList.map((task, index) => taskRow(record.id, moduleKey, task, index)).join("")}
              </div>
              <div class="task-actions">
                ${badge(assignment.status, statusCls)}
                <button class="btn ghost" data-add-subtask="${record.id}:${moduleKey}">+ 新建任务</button>
                <button class="btn primary" data-publish-dispatch="${record.id}:${moduleKey}">${assignment.status === "待派发" ? "发布派工" : "更新派工"}</button>
              </div>
            </div>
          </div>
        </div>` : ""}
      </article>`;
    }

    function taskRow(recordId, moduleKey, task, index) {
      const key = `${recordId}:${moduleKey}:${index}`;
      const status = task.status || "待处理";
      const statusCls = taskStatusClass(status);
      return `<div class="task-row">
        <span class="task-index">${index + 1}</span>
        <label class="task-field">
          <span>任务名称</span>
          <input class="input" value="${task.title}" data-subtask-title="${key}">
        </label>
        <label class="task-field">
          <span>执行组员</span>
          <select class="select" data-subtask-owner="${key}">${moduleMembers[moduleKey].map(owner => `<option ${owner === task.owner ? "selected" : ""}>${owner}</option>`).join("")}</select>
        </label>
        <label class="task-field">
          <span>完成日期</span>
          <input class="input" type="date" value="${task.due}" data-subtask-due="${key}">
        </label>
        <div class="task-field">
          <span>状态</span>
          ${badge(status, statusCls === "gray" ? "" : statusCls)}
        </div>
        <button class="btn ghost task-remove" data-remove-subtask="${key}">删除</button>
        ${taskReviewLine(key, moduleKey, task)}
      </div>`;
    }

    function taskReviewLine(key, moduleKey, task) {
      const module = modules[moduleKey];
      if (task.status === "待审核") {
        return `<div class="task-review-line">
          <div class="review-copy">
            <strong>待负责人审核</strong>
            <span>${task.owner} 于 ${formatDate(task.submittedAt)} 提交，负责人：${module.owner}</span>
          </div>
          <input class="input" value="${task.reviewComment || ""}" placeholder="驳回原因（驳回时必填）" data-review-comment="${key}">
          <button class="btn ghost" data-review-reject="${key}">驳回修改</button>
          <button class="btn primary" data-review-approve="${key}">审核通过</button>
        </div>`;
      }
      if (moduleKey === "content" && task.status === "已完成" && task.reviewResult === "无需审核") {
        return `<div class="task-review-line is-done">
          <div class="review-copy">
            <strong>内容文档已提交，无需审核</strong>
            <span>${task.owner} 于 ${formatDate(task.submittedAt || task.completedAt)} 提交${task.docNote ? `，备注：${escapeHtml(task.docNote)}` : ""}</span>
          </div>
        </div>`;
      }
      if (task.status === "已完成" && task.reviewedAt) {
        return `<div class="task-review-line is-done">
          <div class="review-copy">
            <strong>负责人已审核通过</strong>
            <span>${module.owner} 于 ${formatDate(task.reviewedAt)} 完成审核</span>
          </div>
        </div>`;
      }
      return "";
    }

    function formatDate(date) {
      return date ? date.replaceAll("-", "/") : "待选择";
    }

    function demandText(record, moduleKey) {
      const text = {
        content: `内容禁忌：不接受老公出镜、斑驳卡粉痛点画面和演绎剧情；热点背景：首播/孕期等需单独标注；拍摄：确认出镜人员、拍摄时间地点；脚本：5 条，需溯源视频，交付时间按商务填写。`,
        edit: `拍剪需求：产品展示、机制讲解、达人试用反馈；拍剪条数：主页 2 条 / 千川 3 条；二创剪辑：补充 2 条投放素材。`,
        ads: `达人类型：美妆护肤类；达人抖音号：${record.uid}；合作码：QC-ANR-620 待核验；投放费比 8%，综合费比 27%。`,
        ops: `设备：双机位、补光灯、收音麦；镜像：是；化妆：2 人；福利品：9.9 元洁面小样 200 单；需确认样品与开播检查。`
      }[moduleKey];
      return `<span>${text}</span>`;
    }

    function emptyDispatch(module) {
      return `<div class="upload"><div><strong>${supportNeeds[state.module].title}未开启</strong><button class="btn ghost" data-view="entry">返回录入页调整</button></div></div>`;
    }

    function allDispatchTaskItems() {
      const items = [];
      records.forEach(record => {
        const recordTasks = dispatchTasks[record.id] || {};
        Object.entries(recordTasks).forEach(([moduleKey, list]) => {
          list.forEach((task, index) => {

            items.push({ record, moduleKey, task, index, key: `${record.id}:${moduleKey}:${index}` });
          });
        });
      });
      return items;
    }

          ${taskStatusFilterButton("delayed", "延期中", delayed)}

          <div class="task-sort-filter">

              <span>任务紧急程度排序</span>

          </div>
          <div class="member-switch">
            <span>查看范围</span>
            <select class="select" data-task-scope>${taskScopeOptions.map(option => `<option value="${option.id}" ${state.taskScope === option.id ? "selected" : ""}>${option.label}</option>`).join("")}</select>
          </div>
          <div class="member-switch">
            <span>${state.taskScope === "mine" ? "成员视角" : "查看对象"}</span>
            ${state.taskScope === "mine" ? `<select class="select" data-task-user>${owners.filter(owner => owner !== "待分配").map(owner => `<option ${owner === state.taskUser ? "selected" : ""}>${owner}</option>`).join("")}</select>` : `<strong>${taskScopeTitle()}</strong>`}

          <input class="input task-search" value="${state.taskSearch}" placeholder="搜索任务..." data-task-search>
        </div>
      </div>
      <section class="stats">
